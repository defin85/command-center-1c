name: Deploy Native

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    timeout-minutes: 45
    concurrency:
      group: deploy-native
      cancel-in-progress: true

    env:
      RELEASE_ID: ${{ github.sha }}
      RELEASE_ARCHIVE: /var/tmp/cc1c-release-${{ github.sha }}.tar.gz

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate deploy secrets
        run: |
          set -euo pipefail
          DEPLOY_HOST="${{ secrets.DEPLOY_HOST }}"
          DEPLOY_USER="${{ secrets.DEPLOY_USER }}"
          DEPLOY_PORT="${{ secrets.DEPLOY_PORT }}"
          DEPLOY_KEY="${{ secrets.DEPLOY_SSH_KEY }}"

          if [[ -z "$DEPLOY_HOST" || -z "$DEPLOY_USER" || -z "$DEPLOY_KEY" ]]; then
            echo "Missing required secrets: DEPLOY_HOST, DEPLOY_USER, DEPLOY_SSH_KEY" >&2
            exit 1
          fi

          if [[ -z "$DEPLOY_PORT" ]]; then
            DEPLOY_PORT="22"
          fi

          if ! [[ "$DEPLOY_PORT" =~ ^[0-9]+$ ]]; then
            echo "DEPLOY_PORT must be numeric, got '$DEPLOY_PORT'" >&2
            exit 1
          fi

          echo "DEPLOY_HOST=$DEPLOY_HOST" >> "$GITHUB_ENV"
          echo "DEPLOY_USER=$DEPLOY_USER" >> "$GITHUB_ENV"
          echo "DEPLOY_PORT=$DEPLOY_PORT" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: orchestrator/requirements.txt

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.0"
          cache-dependency-path: |
            go-services/api-gateway/go.sum
            go-services/shared/go.sum
            go-services/worker/go.sum

      - name: Build frontend assets
        run: |
          set -euo pipefail
          cd frontend
          npm ci
          npm run generate:api
          npm run build:assets

      - name: Build Python wheelhouse
        run: |
          set -euo pipefail
          mkdir -p build/wheelhouse
          python -m pip download --only-binary=:all: -r orchestrator/requirements.txt -d build/wheelhouse

      - name: Build backend binaries
        run: |
          set -euo pipefail
          mkdir -p bin
          cd go-services/api-gateway
          go build -o ../../bin/cc1c-api-gateway ./cmd/main.go
          cd ../worker
          go build -o ../../bin/cc1c-worker ./cmd/main.go

      - name: Package release
        run: |
          set -euo pipefail
          rm -rf release
          mkdir -p release/bin release/frontend/dist release/infrastructure release/orchestrator/wheelhouse
          cp bin/cc1c-api-gateway release/bin/
          cp bin/cc1c-worker release/bin/
          rsync -a --delete \
            --exclude '.venv' \
            --exclude '__pycache__' \
            --exclude '.pytest_cache' \
            orchestrator/ release/orchestrator/
          rsync -a --delete build/wheelhouse/ release/orchestrator/wheelhouse/
          rsync -a --delete \
            --exclude '*.map' \
            frontend/dist/ release/frontend/dist/
          rsync -a --delete scripts/ release/scripts/
          rsync -a --delete infrastructure/monitoring/ release/infrastructure/monitoring/
          tar -C release -czf release.tar.gz .

      - name: Setup SSH key
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "${DEPLOY_PORT}" -H "${DEPLOY_HOST}" >> ~/.ssh/known_hosts

      - name: Cleanup stale remote release archives
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "find /tmp /var/tmp -maxdepth 1 -type f -name 'cc1c-release-*.tar.gz' -delete 2>/dev/null || true"

      - name: Upload release to server
        run: |
          set -euo pipefail
          scp -P "${DEPLOY_PORT}" release.tar.gz \
            "${DEPLOY_USER}@${DEPLOY_HOST}:${RELEASE_ARCHIVE}"

      - name: Activate release on server
        run: |
          set -euo pipefail
          ssh -p "${DEPLOY_PORT}" "${DEPLOY_USER}@${DEPLOY_HOST}" \
            "sudo /usr/local/bin/cc1c-deploy '${RELEASE_ARCHIVE}' '${RELEASE_ID}' && rm -f '${RELEASE_ARCHIVE}'"
