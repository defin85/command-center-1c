name: Agent Docs Validation

on:
  pull_request:
    paths:
      - 'AGENTS.md'
      - 'frontend/AGENTS.md'
      - 'orchestrator/AGENTS.md'
      - 'go-services/AGENTS.md'
      - 'docs/agent/**'
      - 'openspec/project.md'
      - 'DEBUG.md'
      - 'README.md'
      - 'scripts/dev/README.md'
      - 'docs/START_HERE.md'
      - 'docs/INDEX.md'
      - 'docs/DEBUG_WITH_AI.md'
      - 'CLAUDE.md'
      - '.claude/README.md'
      - '.claude/rules/**'
      - '.agents/skills/**'
      - '.codex/config.toml'
      - '.tool-versions'
      - 'debug/runtime-inventory.sh'
      - 'frontend/package.json'
      - 'scripts/dev/check-agent-doc-freshness.py'
      - 'scripts/dev/check-agent-doc-freshness.sh'
      - '.github/workflows/agent-docs-validation.yml'
  push:
    branches:
      - main
      - master
    paths:
      - 'AGENTS.md'
      - 'frontend/AGENTS.md'
      - 'orchestrator/AGENTS.md'
      - 'go-services/AGENTS.md'
      - 'docs/agent/**'
      - 'openspec/project.md'
      - 'DEBUG.md'
      - 'README.md'
      - 'scripts/dev/README.md'
      - 'docs/START_HERE.md'
      - 'docs/INDEX.md'
      - 'docs/DEBUG_WITH_AI.md'
      - 'CLAUDE.md'
      - '.claude/README.md'
      - '.claude/rules/**'
      - '.agents/skills/**'
      - '.codex/config.toml'
      - '.tool-versions'
      - 'debug/runtime-inventory.sh'
      - 'frontend/package.json'
      - 'scripts/dev/check-agent-doc-freshness.py'
      - 'scripts/dev/check-agent-doc-freshness.sh'
      - '.github/workflows/agent-docs-validation.yml'

jobs:
  agent-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Install OpenSpec CLI
        run: npm install -g @fission-ai/openspec@0.20.0

      - name: Install Beads CLI
        run: |
          set -euo pipefail
          BD_VERSION="0.63.3"
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/steveyegge/beads/releases/download/v${BD_VERSION}/beads_${BD_VERSION}_linux_amd64.tar.gz" \
            | tar -xzf - -C "$HOME/.local/bin" bd
          chmod +x "$HOME/.local/bin/bd"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Validate authoritative agent docs
        run: ./scripts/dev/check-agent-doc-freshness.sh

      - name: Validate OpenSpec metadata
        run: openspec validate add-codex-agent-productivity-foundation --strict --no-interactive
