[mcp_servers.claude-context]
command = "bash"
args = ["-lc", 'export NVM_DIR="$HOME/.nvm"; [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"; export OLLAMA_HOST="http://$(awk "/nameserver/{print \$2; exit}" /etc/resolv.conf):11434"; [ -f "/home/egor/code/claude-context/packages/mcp/dist/index.js" ] || { echo "Local MCP build not found: /home/egor/code/claude-context/packages/mcp/dist/index.js" >&2; echo "Run: /home/egor/code/claude-context/scripts/build-local-mcp.sh" >&2; exit 1; }; nvm exec --silent 22 -- node /home/egor/code/claude-context/packages/mcp/dist/index.js']
startup_timeout_sec = 60.0

[mcp_servers.claude-context.env]
EMBEDDING_MODEL = "bge-m3"
EMBEDDING_PROVIDER = "Ollama"
MILVUS_ADDRESS = "127.0.0.1:20530"
CUSTOM_EXTENSIONS = ".bsl"
CUSTOM_IGNORE_PATTERNS = ".git/**,.venv/**,.beads/**,.agent-browser/**,.ruff_cache/**,frontend/node_modules/**,frontend/dist/**,frontend/test-results/**,orchestrator/.pytest_cache/**,orchestrator/__pycache__/**,orchestrator/htmlcov/**,logs/**,pids/**,bin/**,openspec/changes/**,docs/archive/**,frontend/src/api/generated/**,generated/**,com._1c.v8.ibis.admin-1.6.7/**"

[mcp_servers.chrome-devtools]
command = "npx"
args = ["-y", "chrome-devtools-mcp@latest", "--executablePath=/usr/lib/chromium/chromium", "--isolated", "--headless", "--logFile=/tmp/chrome-devtools-mcp.log", "--chromeArg=--no-sandbox", "--chromeArg=--disable-setuid-sandbox", "--chromeArg=--no-first-run", "--chromeArg=--no-default-browser-check", "--chromeArg=--disable-dev-shm-usage"]
startup_timeout_sec = 30.0