apiVersion: 1

# Dashboard provisioning for CommandCenter1C
# IMPORTANT: Dashboards are managed via Git, NOT Grafana UI
# To modify dashboards, edit JSON files in infrastructure/monitoring/grafana/dashboards/
# and commit changes to the repository

providers:
  - name: 'CommandCenter1C'
    orgId: 1
    folder: ''
    type: file
    disableDeletion: true      # Prevent accidental deletion via UI
    updateIntervalSeconds: 10
    allowUiUpdates: false      # Changes must be made via Git, not UI
    options:
      path: /var/lib/grafana/dashboards
