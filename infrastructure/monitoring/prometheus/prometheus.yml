global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'commandcenter1c'
    environment: 'development'

rule_files:
  - "recording_rules.yml"

scrape_configs:
  # Application services running on WSL HOST machine
  # Use host.docker.internal (mapped to WSL gateway in docker-compose)

  # API Gateway (Go) - порт 8180
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8180']
    metrics_path: '/metrics'

  # Worker (Go) - порт 9091 (metrics endpoint)
  - job_name: 'worker'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # RAS Adapter (Go) - порт 8188
  # Пока отключено - RAS Adapter не экспортирует /metrics
  # - job_name: 'ras-adapter'
  #   static_configs:
  #     - targets: ['host.docker.internal:8188']
  #   metrics_path: '/metrics'

  # Orchestrator (Django) - требует django-prometheus middleware
  # Пока отключено - Django не экспортирует метрики по умолчанию
  # - job_name: 'orchestrator'
  #   static_configs:
  #     - targets: ['host.docker.internal:8200']
  #   metrics_path: '/metrics'

  # Infrastructure services in Docker (these don't have /metrics endpoints by default)
  # Uncomment and configure exporters if needed
  # - job_name: 'postgres'
  #   static_configs:
  #     - targets: ['postgres-exporter:9187']
  #
  # - job_name: 'redis'
  #   static_configs:
  #     - targets: ['redis-exporter:9121']
