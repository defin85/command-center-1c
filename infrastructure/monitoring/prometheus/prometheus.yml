global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'commandcenter1c'
    environment: 'development'

rule_files:
  - "recording_rules.yml"
  - "alerts/*.yml"

scrape_configs:
  # Application services running on WSL HOST machine
  # Use host.docker.internal (mapped to WSL gateway in docker-compose)

  # API Gateway (Go) - порт 8180
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8180']
    metrics_path: '/metrics'

  # Worker (Go) - порт 9091 (metrics endpoint)
  - job_name: 'worker'
    static_configs:
      - targets: ['host.docker.internal:9091']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # RAS Adapter (Go) - порт 8188
  - job_name: 'ras-adapter'
    static_configs:
      - targets: ['host.docker.internal:8188']
    metrics_path: '/metrics'

  # Batch Service (Go) - порт 8187
  - job_name: 'batch-service'
    static_configs:
      - targets: ['host.docker.internal:8187']
    metrics_path: '/metrics'

  # Designer Agent (Go) - порт 8190
  - job_name: 'designer-agent'
    static_configs:
      - targets: ['host.docker.internal:8190']
    metrics_path: '/metrics'

  # Orchestrator (Django) - требует django-prometheus middleware
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8200']
    metrics_path: '/metrics'

  # Infrastructure Exporters (running on WSL host)
  # PostgreSQL Exporter - порт 9187
  - job_name: 'postgresql'
    static_configs:
      - targets: ['host.docker.internal:9187']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql'

  # Redis Exporter - порт 9121
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # Blackbox Exporter - TCP probes for external dependencies (e.g., RAS Server)
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_tcp.yml
        refresh_interval: 30s
    relabel_configs:
      # Target from file_sd
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      # Send scrape to blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter:9115
