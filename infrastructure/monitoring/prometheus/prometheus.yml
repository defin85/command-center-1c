global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'commandcenter1c'
    environment: 'development'

rule_files:
  - "recording_rules.yml"
  - "alerts/*.yml"

scrape_configs:
  # Application services running on WSL HOST machine
  # Use host.docker.internal (mapped to WSL gateway in docker-compose)

  # API Gateway (Go) - порт 8180
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['host.docker.internal:8180']
    metrics_path: '/metrics'
    metric_relabel_configs:
      - source_labels: [path]
        regex: '/ws/service-mesh/.*'
        action: drop

  # Worker (Go, ops) - порт 9191 (metrics endpoint)
  - job_name: 'worker'
    static_configs:
      - targets: ['host.docker.internal:9191']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Worker Workflows (Go) - порт 9092 (metrics endpoint)
  - job_name: 'worker-workflows'
    static_configs:
      - targets: ['host.docker.internal:9092']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # Orchestrator (Django) - требует django-prometheus middleware
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['host.docker.internal:8200']
    metrics_path: '/metrics'

  # Infrastructure Exporters (running on WSL host)
  # PostgreSQL Exporter - порт 9187
  - job_name: 'postgresql'
    static_configs:
      - targets: ['host.docker.internal:9187']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'postgresql'

  # Redis Exporter - порт 9121
  - job_name: 'redis'
    static_configs:
      - targets: ['host.docker.internal:9121']
    metrics_path: '/metrics'
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'redis'

  # MinIO (S3) blackbox TCP probe (availability/liveness)
  - job_name: 'minio'
    static_configs:
      - targets: ['host.docker.internal:9000']
        labels:
          cc1c_service: 'minio'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Optional MinIO internals (works only when MINIO_PROMETHEUS_AUTH_TYPE=public)
  - job_name: 'minio-metrics'
    static_configs:
      - targets: ['host.docker.internal:9000']
    metrics_path: '/minio/v2/metrics/cluster'

  # Blackbox Exporter - TCP probes for external dependencies (e.g., RAS Server)
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_tcp.yml
        refresh_interval: 30s
    relabel_configs:
      # Target from file_sd
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      # Send scrape to blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # Blackbox Exporter - HTTP probes for frontend availability
  - job_name: 'blackbox-http'
    metrics_path: /probe
    params:
      module: [http_2xx]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_http.yml
        refresh_interval: 30s
    relabel_configs:
      # Target from file_sd
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      # Send scrape to blackbox exporter
      - target_label: __address__
        replacement: blackbox-exporter:9115
