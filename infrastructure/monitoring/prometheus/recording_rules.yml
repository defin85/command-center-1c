# Prometheus Recording Rules for CommandCenter1C
# Pre-computed aggregations for dashboard performance
#
# Based on REAL metrics from services:
# - cc1c_requests_total{method, path, status} - API Gateway
# - cc1c_request_duration_seconds - API Gateway
# - cc1c_scheduler_jobs_total{job_name, status} - Worker scheduler
# - cc1c_scheduler_job_duration_seconds - Worker scheduler
# - cc1c_batch_requests_total - Batch Service
# - cc1c_batch_operation_duration_seconds - Batch Service
# - events_messages_processed_total - Worker events
# - events_processing_duration_seconds - Worker events

groups:
  - name: cc1c_api_metrics
    interval: 15s
    rules:
      # Request rate per service (5-minute window)
      - record: cc1c:request_rate:5m
        expr: sum(rate(cc1c_requests_total[5m])) by (job)

      # Request rate by path (5-minute window)
      - record: cc1c:request_rate_by_path:5m
        expr: sum(rate(cc1c_requests_total[5m])) by (path)

      # Error rate - 5xx responses (5-minute window)
      # Division by zero protection: returns 0 when no requests
      - record: cc1c:error_rate:5m
        expr: |
          sum(rate(cc1c_requests_total{status=~"5.."}[5m])) by (job)
          /
          (sum(rate(cc1c_requests_total[5m])) by (job) > 0 or vector(0))

      # Error rate overall (5-minute window)
      # Division by zero protection: returns 0 when no requests
      - record: cc1c:error_rate_total:5m
        expr: |
          sum(rate(cc1c_requests_total{status=~"5.."}[5m]))
          /
          (sum(rate(cc1c_requests_total[5m])) > 0 or vector(0))

      # P50 latency (5-minute window)
      - record: cc1c:latency_p50:5m
        expr: histogram_quantile(0.50, sum(rate(cc1c_request_duration_seconds_bucket[5m])) by (le, job))

      # P95 latency (5-minute window)
      - record: cc1c:latency_p95:5m
        expr: histogram_quantile(0.95, sum(rate(cc1c_request_duration_seconds_bucket[5m])) by (le, job))

      # P99 latency (5-minute window)
      - record: cc1c:latency_p99:5m
        expr: histogram_quantile(0.99, sum(rate(cc1c_request_duration_seconds_bucket[5m])) by (le, job))

  - name: cc1c_scheduler_metrics
    interval: 15s
    rules:
      # Scheduler jobs success rate (5-minute window)
      # Division by zero protection: returns 0 when no jobs
      - record: cc1c:scheduler_success_rate:5m
        expr: |
          sum(rate(cc1c_scheduler_jobs_total{status="success"}[5m])) by (job_name)
          /
          (sum(rate(cc1c_scheduler_jobs_total[5m])) by (job_name) > 0 or vector(0))

      # Scheduler jobs throughput (5-minute window)
      - record: cc1c:scheduler_throughput:5m
        expr: sum(rate(cc1c_scheduler_jobs_total[5m])) by (job_name, status)

      # Scheduler job duration P95 (5-minute window)
      - record: cc1c:scheduler_duration_p95:5m
        expr: histogram_quantile(0.95, sum(rate(cc1c_scheduler_job_duration_seconds_bucket[5m])) by (le, job_name))

  - name: cc1c_events_metrics
    interval: 15s
    rules:
      # Events throughput (5-minute window)
      - record: cc1c:events_throughput:5m
        expr: sum(rate(events_messages_processed_total[5m])) by (event_type)

      # Events total throughput (5-minute window)
      - record: cc1c:events_throughput_total:5m
        expr: sum(rate(events_messages_processed_total[5m]))

      # Events processing duration P95 (5-minute window)
      - record: cc1c:events_duration_p95:5m
        expr: histogram_quantile(0.95, sum(rate(events_processing_duration_seconds_bucket[5m])) by (le))

  - name: cc1c_batch_metrics
    interval: 15s
    rules:
      # Batch requests rate (5-minute window)
      - record: cc1c:batch_request_rate:5m
        expr: sum(rate(cc1c_batch_requests_total[5m])) by (operation_type)

      # Batch operation duration P95 (5-minute window)
      - record: cc1c:batch_duration_p95:5m
        expr: histogram_quantile(0.95, sum(rate(cc1c_batch_operation_duration_seconds_bucket[5m])) by (le))

  # Hourly aggregations for long-term trends
  - name: cc1c_hourly_aggregations
    interval: 5m
    rules:
      # Hourly request rate
      - record: cc1c:request_rate:1h
        expr: sum(rate(cc1c_requests_total[1h])) by (job)

      # Hourly error rate
      # Division by zero protection: returns 0 when no requests
      - record: cc1c:error_rate:1h
        expr: |
          sum(rate(cc1c_requests_total{status=~"5.."}[1h])) by (job)
          /
          (sum(rate(cc1c_requests_total[1h])) by (job) > 0 or vector(0))

      # Hourly P99 latency
      - record: cc1c:latency_p99:1h
        expr: histogram_quantile(0.99, sum(rate(cc1c_request_duration_seconds_bucket[1h])) by (le, job))

      # Hourly events throughput
      - record: cc1c:events_throughput:1h
        expr: sum(rate(events_messages_processed_total[1h]))
