# Operational Alerts for CommandCenter1C
# Service health, availability, and performance alerts

groups:
  - name: service_availability
    interval: 30s
    rules:
      # API Gateway down
      - alert: APIGatewayDown
        expr: up{job="api-gateway"} == 0
        for: 1m
        labels:
          severity: critical
          component: api-gateway
        annotations:
          summary: "API Gateway is down"
          description: "API Gateway has been unreachable for more than 1 minute."

      # Worker down
      - alert: WorkerDown
        expr: up{job="worker"} == 0
        for: 1m
        labels:
          severity: critical
          component: worker
        annotations:
          summary: "Worker is down"
          description: "Worker has been unreachable for more than 1 minute."

      # Orchestrator down
      - alert: OrchestratorDown
        expr: up{job="orchestrator"} == 0
        for: 1m
        labels:
          severity: critical
          component: orchestrator
        annotations:
          summary: "Orchestrator is down"
          description: "Orchestrator has been unreachable for more than 1 minute."

      # Event Subscriber running without active consumers
      - alert: EventSubscriberNoConsumers
        expr: max(cc1c_orchestrator_event_subscriber_up{group="orchestrator-group"}) == 1 and max(cc1c_orchestrator_event_subscriber_consumers{group="orchestrator-group"}) < 1
        for: 2m
        labels:
          severity: warning
          component: event-subscriber
        annotations:
          summary: "Event Subscriber has no active consumers"
          description: "Consumer group exists, but no active consumers were reported for more than 2 minutes."

  - name: performance_alerts
    interval: 1m
    rules:
      # High number of active scheduler jobs (potential backlog)
      - alert: SchedulerBacklog
        expr: cc1c_scheduler_active_jobs > 100
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Scheduler job backlog detected"
          description: "{{ $value }} active scheduler jobs, which may indicate backlog."

      # High events processing concurrent handlers
      - alert: HighEventsConcurrency
        expr: events_concurrent_handlers > 100
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "High events concurrency"
          description: "{{ $value }} concurrent event handlers, which may indicate high load."

      # Slow lock acquisition
      - alert: SlowLockAcquisition
        expr: histogram_quantile(0.95, rate(cc1c_scheduler_lock_hold_duration_seconds_bucket[5m])) > 5
        for: 5m
        labels:
          severity: warning
          component: worker
        annotations:
          summary: "Slow scheduler lock acquisition"
          description: "P95 lock hold duration is {{ $value | humanizeDuration }}."

  - name: pool_master_data_sync_alerts
    interval: 1m
    rules:
      - alert: PoolMasterDataSyncLagHigh
        expr: cc1c_orchestrator_pool_master_data_sync_outbox_lag_seconds > 900
        for: 10m
        labels:
          severity: warning
          component: pool-master-data-sync
        annotations:
          summary: "Pool master-data sync lag is high"
          description: "Outbox lag is {{ $value | humanizeDuration }} for more than 10 minutes."

      - alert: PoolMasterDataSyncRetrySaturation
        expr: cc1c_orchestrator_pool_master_data_sync_outbox_retry_saturation_ratio > 0.25
        for: 10m
        labels:
          severity: warning
          component: pool-master-data-sync
        annotations:
          summary: "Pool master-data sync retry saturation is high"
          description: "Retry saturation ratio is {{ $value | humanizePercentage }} for more than 10 minutes."

      - alert: PoolMasterDataSyncConflictBacklogHigh
        expr: cc1c_orchestrator_pool_master_data_sync_conflicts_pending_total > 25
        for: 10m
        labels:
          severity: warning
          component: pool-master-data-sync
        annotations:
          summary: "Pool master-data sync conflict backlog is growing"
          description: "{{ $value }} pending conflicts for more than 10 minutes."

      - alert: PoolMasterDataSyncConflictSpike
        expr: delta(cc1c_orchestrator_pool_master_data_sync_conflicts_pending_total[15m]) > 10
        for: 5m
        labels:
          severity: warning
          component: pool-master-data-sync
        annotations:
          summary: "Pool master-data sync conflict spike detected"
          description: "Pending conflicts increased by more than 10 within 15 minutes."

  - name: infrastructure_alerts
    interval: 1m
    rules:
      # PostgreSQL down (requires postgres exporter)
      - alert: PostgreSQLDown
        expr: up{job="postgres"} == 0
        for: 1m
        labels:
          severity: critical
          component: database
        annotations:
          summary: "PostgreSQL is down"
          description: "PostgreSQL exporter is unreachable. Database may be down."

      # Redis down (requires redis exporter)
      - alert: RedisDown
        expr: up{job="redis"} == 0
        for: 1m
        labels:
          severity: critical
          component: cache
        annotations:
          summary: "Redis is down"
          description: "Redis exporter is unreachable. Redis may be down."

      # RAS external probe failed
      - alert: RASProbeFailed
        expr: max(probe_success{cc1c_service="ras-server"}) < 1
        for: 1m
        labels:
          severity: critical
          component: ras-server
        annotations:
          summary: "RAS probe failed"
          description: "Blackbox TCP probe for RAS has been failing for more than 1 minute."

      # MinIO liveness probe failed
      - alert: MinIOProbeFailed
        expr: max(probe_success{cc1c_service="minio"}) < 1
        for: 1m
        labels:
          severity: critical
          component: minio
        annotations:
          summary: "MinIO probe failed"
          description: "Blackbox TCP probe for MinIO has been failing for more than 1 minute."

      # High memory usage (requires node exporter)
      # Threshold 0.95 for WSL environments (higher baseline usage)
      - alert: HighMemoryUsage
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.95
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanizePercentage }}."

      # High disk usage (requires node exporter)
      - alert: HighDiskUsage
        expr: (1 - (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"})) > 0.85
        for: 5m
        labels:
          severity: warning
          component: infrastructure
        annotations:
          summary: "High disk usage"
          description: "Disk usage on root partition is {{ $value | humanizePercentage }}."
