# Prometheus configuration for native mode (without Docker)
# Use this when running services directly on host with USE_DOCKER=false
#
# Installation (Arch Linux):
#   pacman -S prometheus
#   sudo cp prometheus-native.yml /etc/prometheus/prometheus.yml
#   sudo systemctl enable prometheus
#   sudo systemctl start prometheus
#
# Blackbox Exporter (RAS TCP probe):
#   # Install / run blackbox_exporter separately (native)
#   # Then copy target file and restart Prometheus:
#   sudo mkdir -p /etc/prometheus/targets
#   sudo cp infrastructure/monitoring/prometheus/targets/blackbox_tcp.yml /etc/prometheus/targets/blackbox_tcp.yml
#   sudo systemctl restart prometheus

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'commandcenter1c'
    environment: 'development'

rule_files:
  - "recording_rules.yml"
  - "alerts/rollback_alerts.yml"
  - "alerts/operational.yml"
  - "alerts/api_alerts.yml"

scrape_configs:
  # Application services running on localhost (native mode)
  # All services are on localhost, no Docker networking required

  # API Gateway (Go) - port 8180
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['localhost:8180']
    metrics_path: '/metrics'

  # Worker (Go) - port 9091 (metrics endpoint)
  - job_name: 'worker'
    static_configs:
      - targets: ['localhost:9091']
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s

  # RAS Adapter (Go) - port 8188
  - job_name: 'ras-adapter'
    static_configs:
      - targets: ['localhost:8188']
    metrics_path: '/metrics'

  # Batch Service (Go) - port 8187
  - job_name: 'batch-service'
    static_configs:
      - targets: ['localhost:8187']
    metrics_path: '/metrics'

  # Designer Agent (Go) - port 8190
  - job_name: 'designer-agent'
    static_configs:
      - targets: ['localhost:8190']
    metrics_path: '/metrics'

  # Orchestrator (Django) - port 8200
  - job_name: 'orchestrator'
    static_configs:
      - targets: ['localhost:8200']
    metrics_path: '/metrics'

  # PostgreSQL exporter
  # Installation: pacman -S prometheus-postgres-exporter
  # Enable: sudo systemctl enable --now prometheus-postgres-exporter
  - job_name: 'postgres'
    static_configs:
      - targets: ['localhost:9187']

  # Redis exporter
  # Installation: pacman -S prometheus-redis-exporter
  # Enable: sudo systemctl enable --now prometheus-redis-exporter
  - job_name: 'redis'
    static_configs:
      - targets: ['localhost:9121']

  # Node exporter for system metrics
  # Installation: pacman -S prometheus-node-exporter
  # Enable: sudo systemctl enable --now prometheus-node-exporter
  - job_name: 'node'
    static_configs:
      - targets: ['localhost:9100']

  # Blackbox Exporter - TCP probes for external dependencies (e.g., RAS Server)
  # Exporter listens on 9115 by default.
  - job_name: 'blackbox-tcp'
    metrics_path: /probe
    params:
      module: [tcp_connect]
    file_sd_configs:
      - files:
          - /etc/prometheus/targets/blackbox_tcp.yml
        refresh_interval: 30s
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: localhost:9115

# Frontend (React:5173) не скрапится - React SPA не экспортирует Prometheus метрики.
# Для мониторинга frontend используйте:
# - Browser DevTools / Lighthouse для performance
# - Sentry / LogRocket для error tracking
# - Real User Monitoring (RUM) решения
