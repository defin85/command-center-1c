$schema: "https://json-schema.org/draft/2020-12/schema"
title: OData Compatibility Profile
type: object
additionalProperties: false
required:
  - profile_version
  - generated_at
  - owner
  - kb_references
  - entries
  - rollout_gate
properties:
  profile_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(-[a-z0-9.-]+)?$"
  generated_at:
    type: string
    format: date-time
  owner:
    type: string
    minLength: 1
  kb_references:
    type: array
    minItems: 1
    items:
      type: string
      format: uri
  entries:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - configuration_id
        - configuration_version_range
        - document_upsert_endpoint_pattern
        - document_posting_operation
        - document_identity_fields_priority
        - external_run_key_field
        - profile_entry_version
        - source_references
        - verification_status
        - media_type_policy
      properties:
        configuration_id:
          type: string
        configuration_version_range:
          type: string
        document_upsert_endpoint_pattern:
          type: string
        document_posting_operation:
          type: string
        document_identity_fields_priority:
          type: array
          minItems: 1
          items:
            type: string
        external_run_key_field:
          type: string
        known_limitations:
          type: string
        profile_entry_version:
          type: string
        source_references:
          type: array
          minItems: 1
          items:
            type: string
        verification_status:
          type: string
          enum:
            - draft
            - verified
            - approved
        verified_at:
          type: string
          format: date
        verified_by:
          type: string
        media_type_policy:
          type: object
          additionalProperties: false
          required:
            - default_write_content_type
            - legacy_mode_le_8_3_7
          properties:
            default_write_content_type:
              type: string
            accepts:
              type: array
              items:
                type: string
            rejects:
              type: array
              items:
                type: string
            legacy_mode_le_8_3_7:
              type: object
              additionalProperties: false
              required:
                - supported
              properties:
                supported:
                  type: boolean
                required_policy_note:
                  type: string
  rollout_gate:
    type: object
    additionalProperties: false
    required:
      - require_approved_entry
      - require_profile_version_in_release
      - block_on_incompatible_media_type_policy
    properties:
      require_approved_entry:
        type: boolean
      require_profile_version_in_release:
        type: boolean
      block_on_incompatible_media_type_policy:
        type: boolean
      ci_check_id:
        type: string
