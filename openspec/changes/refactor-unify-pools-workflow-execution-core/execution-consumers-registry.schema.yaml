$schema: "https://json-schema.org/draft/2020-12/schema"
title: Execution Consumers Registry
type: object
additionalProperties: false
required:
  - registry_version
  - generated_at
  - owner
  - consumers
properties:
  registry_version:
    type: string
    pattern: "^[0-9]+\\.[0-9]+\\.[0-9]+(-[a-z0-9.-]+)?$"
  generated_at:
    type: string
    format: date-time
  owner:
    type: string
    minLength: 1
  consumers:
    type: array
    minItems: 1
    items:
      type: object
      additionalProperties: false
      required:
        - consumer
        - migrated
        - migration_owner
        - migration_target
        - updated_at
      properties:
        consumer:
          type: string
          pattern: "^[a-z0-9_-]+$"
        migrated:
          type: boolean
        migration_owner:
          type: string
          minLength: 1
        migration_target:
          type: string
          minLength: 1
        migration_eta:
          type: string
        notes:
          type: string
        updated_at:
          type: string
          format: date-time
  decommission_policy:
    type: object
    additionalProperties: false
    required:
      - block_if_unmigrated
      - required_report
    properties:
      block_if_unmigrated:
        type: boolean
      required_report:
        type: string
      escalation_channel:
        type: string
