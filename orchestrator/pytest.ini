[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
testpaths = apps
markers =
    django_db: Mark test as requiring database access
asyncio_mode = auto
