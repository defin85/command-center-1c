[pytest]
DJANGO_SETTINGS_MODULE = config.settings.development
python_files = test*.py
python_classes = Test*
python_functions = test_*
pythonpath = .
addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    --ignore=test_1c_connection.py
    --ignore=test_cluster_endpoints.py
    --ignore=test_cluster_service.py
    --ignore=test_installation_service_client.py
    --ignore=test_patents.py
testpaths = apps
markers =
    django_db: Mark test as requiring database access
asyncio_mode = auto
