post:
  operationId: token_refresh_create
  description: |-
    Takes a refresh type JSON web token and returns an access type JSON web
    token if the refresh token is valid.
  tags:
    - token
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TokenRefresh.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/TokenRefresh.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/TokenRefresh.yaml
    required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TokenRefresh.yaml
      description: ''
