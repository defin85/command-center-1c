post:
  operationId: v2_workflows_execute_workflow_create
  description: >-
    Execute a workflow template. Supports sync (blocking) and async (Go Worker
    if enabled, else in-process background runner) modes.
  summary: Execute workflow
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExecuteWorkflowRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExecuteWorkflowRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExecuteWorkflowRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExecuteWorkflowResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '500':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
