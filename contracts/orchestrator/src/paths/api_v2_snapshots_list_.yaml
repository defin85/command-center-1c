get:
  operationId: v2_snapshots_list_retrieve
  description: List snapshots for current tenant (RBAC-scoped to accessible databases).
  summary: List command result snapshots
  parameters:
    - in: query
      name: command_id
      schema:
        type: string
    - in: query
      name: database_id
      schema:
        type: string
    - in: query
      name: limit
      schema:
        type: integer
      description: Max items (default 50, max 500)
    - in: query
      name: offset
      schema:
        type: integer
      description: Offset (default 0)
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SnapshotListResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
