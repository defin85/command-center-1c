post:
  operationId: v2_settings_command_schemas_preview_create
  description: |-
    Build argv/argv_masked for a single command using effective catalog.

    If catalog is provided in request body, uses draft overrides without saving.
  summary: Preview command argv (v2)
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CommandSchemasPreviewRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CommandSchemasPreviewRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CommandSchemasPreviewRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasPreviewResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
