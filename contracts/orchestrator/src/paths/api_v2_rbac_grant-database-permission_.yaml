post:
  operationId: v2_rbac_grant_database_permission_create
  summary: Grant database permission
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/GrantDatabasePermissionRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/GrantDatabasePermissionRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/GrantDatabasePermissionRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabasePermissionUpsertResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RbacErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RbacErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
