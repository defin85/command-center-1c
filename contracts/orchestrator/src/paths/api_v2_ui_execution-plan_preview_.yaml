post:
  operationId: v2_ui_execution_plan_preview_create
  description: Build safe Execution Plan + Binding Provenance (staff-only).
  summary: Preview execution plan
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExecutionPlanPreviewRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExecutionPlanPreviewRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExecutionPlanPreviewRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExecutionPlanWithBindings.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
