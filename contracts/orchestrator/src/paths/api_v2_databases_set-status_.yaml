post:
  operationId: v2_databases_set_status_create
  description: >-
    Set status for one or more databases (staff-only). Intended for operator
    control (exclude from ops, maintenance windows, etc.).
  summary: Set database status
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SetDatabaseStatusRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/SetDatabaseStatusRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/SetDatabaseStatusRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SetDatabaseStatusResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
