post:
  operationId: v2_operations_stream_unsubscribe_create
  summary: Unsubscribe from multiplex stream operations
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OperationMuxUnsubscribe.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/OperationMuxUnsubscribe.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/OperationMuxUnsubscribe.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      description: Subscription updated
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
