get:
  operationId: v2_operations_stream_mux_retrieve
  summary: Operation SSE multiplex stream
  description: >-
    SSE endpoint for multiplex operation updates. Use ticket from
    /operations/stream-mux-ticket/.
  tags:
    - v2
  parameters:
    - name: ticket
      in: query
      required: true
      schema:
        type: string
      description: Short-lived SSE ticket from /operations/stream-mux-ticket/.
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '200':
      description: SSE stream (text/event-stream)
    '401':
      description: Unauthorized
    '429':
      description: Stream already active
