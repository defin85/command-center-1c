patch:
  operationId: v2_settings_runtime_partial_update
  description: Update a runtime-configurable setting.
  summary: Update runtime setting
  parameters:
    - in: path
      name: key
      schema:
        type: string
      required: true
    - in: query
      name: key
      schema:
        type: string
      description: Setting key
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PatchedRuntimeSettingUpdate.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PatchedRuntimeSettingUpdate.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PatchedRuntimeSettingUpdate.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RuntimeSetting.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
