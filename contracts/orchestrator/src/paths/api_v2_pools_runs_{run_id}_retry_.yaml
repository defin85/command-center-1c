post:
  operationId: v2_pools_runs_retry
  summary: Retry failed publication targets for pool run
  parameters:
    - in: path
      name: run_id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolRunRetryRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolRunRetryRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolRunRetryRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '202':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolRunRetryAcceptedResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolRunSafeCommandConflict.yaml
      description: ''
