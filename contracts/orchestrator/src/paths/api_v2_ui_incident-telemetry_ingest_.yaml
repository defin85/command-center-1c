post:
  operationId: v2_ui_incident_telemetry_ingest
  summary: Ingest redacted UI incident telemetry batch
  tags:
    - v2
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UiIncidentTelemetryIngestRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/UiIncidentTelemetryIngestRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/UiIncidentTelemetryIngestRequest.yaml
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: >-
        Required tenant context selector for UI incident telemetry ingest and
        staff diagnostics queries.
    - name: X-CC1C-Locale
      in: header
      required: false
      schema:
        type: string
        enum:
          - ru
          - en
      description: >-
        Optional operator locale override. If omitted, locale is resolved from
        browser language signal and then falls back to the deployment default.
  responses:
    '202':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UiIncidentTelemetryIngestResponse.yaml
    '400':
      description: ''
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
    '401':
      description: Unauthorized
    '404':
      description: ''
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
