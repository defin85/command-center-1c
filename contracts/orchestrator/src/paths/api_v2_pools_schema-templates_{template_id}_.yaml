put:
  operationId: v2_pools_schema_templates_update
  summary: Update pool schema template
  tags:
    - v2
  parameters:
    - in: path
      name: template_id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolSchemaTemplateCreateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolSchemaTemplateCreateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolSchemaTemplateCreateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolSchemaTemplateCreateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
