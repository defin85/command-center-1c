get:
  operationId: v2_pools_master_data_chart_import_jobs_list
  summary: List chart import jobs
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
    - name: chart_source_id
      in: query
      required: false
      schema:
        type: string
    - name: mode
      in: query
      required: false
      schema:
        type: string
        enum:
          - preflight
          - dry_run
          - materialize
          - verify_followers
          - backfill_bindings
    - name: status
      in: query
      required: false
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChartJobListResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
post:
  operationId: v2_pools_master_data_chart_import_jobs_create
  summary: Create chart import job
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ChartJobCreateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ChartJobCreateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ChartJobCreateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChartJobResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''

