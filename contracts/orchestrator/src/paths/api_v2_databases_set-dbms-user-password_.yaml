post:
  operationId: v2_databases_set_dbms_user_password_create
  description: Set password for a manual DBMS user mapping.
  summary: Set DBMS user password
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DbmsUserPasswordSet.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DbmsUserPasswordSet.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DbmsUserPasswordSet.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DbmsUserMapping.yaml
      description: ''
    '400':
      description: Invalid request
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
