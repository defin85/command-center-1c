get:
  operationId: v2_settings_runtime_overrides_list
  description: >-
    List runtime setting overrides for current tenant. Staff or tenant-admin
    only.
  summary: List runtime setting overrides for tenant
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../components/schemas/RuntimeSettingOverride.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
