patch:
  operationId: v2_system_runtime_control_desired_state_partial_update
  description: Update desired scheduler state for a runtime-control target.
  summary: Patch runtime desired state
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: runtime_id
      schema:
        type: string
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/RuntimeDesiredStatePatch.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/RuntimeDesiredStatePatch.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/RuntimeDesiredStatePatch.yaml
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RuntimeDesiredStateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: Forbidden
