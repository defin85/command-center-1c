post:
  operationId: v2_workflows_update_workflow_create
  description: >-
    Update an existing workflow template. Supports partial updates. Cannot
    update if workflow has running executions.
  summary: Update workflow template
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/UpdateWorkflowRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/UpdateWorkflowRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/UpdateWorkflowRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WorkflowUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
