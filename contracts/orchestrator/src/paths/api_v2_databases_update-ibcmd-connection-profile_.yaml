post:
  operationId: v2_databases_update_ibcmd_connection_profile_create
  description: >-
    Set or reset per-database IBCMD connection profile stored in
    Database.metadata.
  summary: Update database IBCMD connection profile
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: >-
            ../components/schemas/DatabaseIbcmdConnectionProfileUpdateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: >-
            ../components/schemas/DatabaseIbcmdConnectionProfileUpdateRequest.yaml
      multipart/form-data:
        schema:
          $ref: >-
            ../components/schemas/DatabaseIbcmdConnectionProfileUpdateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: >-
              ../components/schemas/DatabaseIbcmdConnectionProfileUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
