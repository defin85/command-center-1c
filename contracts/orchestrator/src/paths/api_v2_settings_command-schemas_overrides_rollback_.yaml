post:
  operationId: v2_settings_command_schemas_overrides_rollback_create
  description: >-
    Move overrides alias active to a specific version (staff-only). Requires
    reason.
  summary: Rollback command schema overrides (v2)
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesRollbackRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesRollbackRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesRollbackRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasOverridesRollbackResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '409':
      description: Conflict
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
