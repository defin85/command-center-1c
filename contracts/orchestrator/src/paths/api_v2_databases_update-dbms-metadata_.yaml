post:
  operationId: v2_databases_update_dbms_metadata_create
  description: >-
    Set or reset database DBMS metadata (dbms, db_server, db_name) stored in
    Database.metadata.
  summary: Update database DBMS metadata
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DatabaseDbmsMetadataUpdateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DatabaseDbmsMetadataUpdateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DatabaseDbmsMetadataUpdateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseDbmsMetadataUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
