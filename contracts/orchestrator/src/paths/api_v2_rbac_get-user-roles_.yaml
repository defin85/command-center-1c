get:
  operationId: v2_rbac_get_user_roles_retrieve
  summary: Get user roles (groups)
  parameters:
    - in: query
      name: user_id
      schema:
        type: integer
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserRolesGetResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RbacErrorResponse.yaml
      description: ''
