get:
  operationId: v2_decisions_detail
  summary: Get decision table detail
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: decision_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: database_id
      in: query
      required: false
      schema:
        type: string
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DecisionTableDetailResponse.yaml
    '401':
      description: Unauthorized
    '404':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
