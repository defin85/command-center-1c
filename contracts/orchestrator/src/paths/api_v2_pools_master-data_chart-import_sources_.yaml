get:
  operationId: v2_pools_master_data_chart_import_sources_list
  summary: List chart import authoritative sources
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
    - name: chart_identity
      in: query
      required: false
      schema:
        type: string
    - name: config_name
      in: query
      required: false
      schema:
        type: string
    - name: config_version
      in: query
      required: false
      schema:
        type: string
    - name: database_id
      in: query
      required: false
      schema:
        type: string
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChartSourceListResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized

