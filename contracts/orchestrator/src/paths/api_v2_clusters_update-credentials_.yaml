post:
  operationId: v2_clusters_update_credentials_create
  description: Set or reset cluster admin credentials.
  summary: Update cluster credentials
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ClusterCredentialsUpdateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ClusterCredentialsUpdateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ClusterCredentialsUpdateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterCredentialsUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
