get:
  operationId: v2_system_runtime_control_catalog_list
  description: List allowlisted runtime-control catalog entries for privileged operators.
  summary: List runtime-control catalog
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RuntimeControlCatalogResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
