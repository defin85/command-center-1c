post:
  operationId: v2_artifacts_aliases_upsert_create
  summary: Upsert artifact alias
  parameters:
    - in: path
      name: artifact_id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ArtifactAliasUpsertRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ArtifactAliasUpsertRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ArtifactAliasUpsertRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ArtifactAlias.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
