post:
  operationId: v2_workflows_clone_workflow_create
  description: >-
    Clone a workflow template. If new_name is provided, creates as new workflow
    (v1). Otherwise, creates as new version.
  summary: Clone workflow template
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CloneWorkflowRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CloneWorkflowRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CloneWorkflowRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/WorkflowCloneResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
