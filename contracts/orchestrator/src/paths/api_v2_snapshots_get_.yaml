get:
  operationId: v2_snapshots_get_retrieve
  summary: Get snapshot details
  parameters:
    - in: query
      name: snapshot_id
      schema:
        type: integer
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SnapshotGetResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
