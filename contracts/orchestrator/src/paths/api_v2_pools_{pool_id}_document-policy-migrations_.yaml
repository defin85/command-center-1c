post:
  operationId: v2_pools_document_policy_migrate
  summary: Materialize legacy edge document policy into a decision revision
  parameters:
    - in: path
      name: pool_id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolDocumentPolicyMigrationRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolDocumentPolicyMigrationRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolDocumentPolicyMigrationRequest.yaml
  responses:
    '200':
      description: Legacy policy reused an existing decision revision and updated bindings.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolDocumentPolicyMigrationResponse.yaml
    '201':
      description: Legacy policy materialized a new decision revision and updated bindings.
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolDocumentPolicyMigrationResponse.yaml
    '400':
      description: Validation or metadata resolution error.
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
    '401':
      description: Unauthorized
    '404':
      description: Pool or edge not found in current tenant context.
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
    '409':
      description: Metadata refresh or migration conflict.
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
