post:
  operationId: v2_clusters_reset_sync_status_create
  description: >-
    Reset sync status for stuck clusters (pending -> failed). Can reset a
    specific cluster or all stuck clusters.
  summary: Reset sync status
  parameters:
    - in: query
      name: cluster_id
      schema:
        type: string
      description: Cluster UUID (optional, resets specific cluster)
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ResetSyncStatusRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ResetSyncStatusRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ResetSyncStatusRequest.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ResetSyncStatusResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
