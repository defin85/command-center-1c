post:
  operationId: v2_settings_command_schemas_import_its_create
  description: >-
    Parse ITS JSON into driver command schema catalog and optionally save
    (staff-only).


    driver=cli: uploads v2 base catalog artifact.

    driver=ibcmd: generates schema-driven catalog v2 and uploads it as a
    versioned artifact.
  summary: Import ITS command schemas (v2)
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CommandSchemasImportRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CommandSchemasImportRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CommandSchemasImportRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasImportResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
