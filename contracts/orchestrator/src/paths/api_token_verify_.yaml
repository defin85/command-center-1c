post:
  operationId: token_verify_create
  description: |-
    Takes a token and indicates if it is valid.  This view provides no
    information about a token's fitness for a particular use.
  tags:
    - token
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/TokenVerify.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/TokenVerify.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/TokenVerify.yaml
    required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TokenVerify.yaml
      description: ''
