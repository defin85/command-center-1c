get:
  operationId: v2_tenants_list_my_tenants_retrieve
  description: List tenants available for the current user (membership scoped).
  summary: List my tenants
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ListMyTenantsResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
