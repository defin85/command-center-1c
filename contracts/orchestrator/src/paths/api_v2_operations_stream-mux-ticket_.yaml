post:
  operationId: v2_operations_stream_mux_ticket_create
  summary: Get multiplex SSE stream ticket
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OperationMuxTicketRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/OperationMuxTicketRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/OperationMuxTicketRequest.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SSETicketResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '429':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
