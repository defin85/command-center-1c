post:
  operationId: v2_operations_delete_command_shortcut_create
  description: Delete a per-user command shortcut by id.
  summary: Delete driver command shortcut
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DeleteDriverCommandShortcutRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DeleteDriverCommandShortcutRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DeleteDriverCommandShortcutRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      description: OK
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
