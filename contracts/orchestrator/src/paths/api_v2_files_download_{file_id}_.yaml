get:
  operationId: v2_files_download_retrieve
  description: Download a previously uploaded file.
  summary: Download file
  parameters:
    - in: path
      name: file_id
      schema:
        type: string
      description: File UUID
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      description: File content
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '410':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
