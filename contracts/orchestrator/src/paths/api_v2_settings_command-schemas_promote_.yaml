post:
  operationId: v2_settings_command_schemas_promote_create
  description: >-
    Move base alias (approved/latest) to a specific version (staff-only).
    Requires reason.
  summary: Promote command schemas base alias (v2)
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CommandSchemasPromoteRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CommandSchemasPromoteRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CommandSchemasPromoteRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasPromoteResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
