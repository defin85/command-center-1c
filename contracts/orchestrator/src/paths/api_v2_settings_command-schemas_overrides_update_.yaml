post:
  operationId: v2_settings_command_schemas_overrides_update_create
  description: >-
    Upload new overrides catalog version and move alias active (staff-only).
    Requires reason.


    Supports optimistic concurrency via If-Match header or expected_etag in
    request body.
  summary: Update command schema overrides (v2)
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesUpdateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesUpdateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CommandSchemasOverridesUpdateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasOverridesUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '409':
      description: Conflict
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
