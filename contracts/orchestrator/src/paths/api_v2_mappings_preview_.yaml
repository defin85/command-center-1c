post:
  operationId: v2_mappings_preview_create
  description: Apply mapping to saved snapshot and validate canonical schema.
  summary: Preview mapping against snapshot
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PreviewMappingRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PreviewMappingRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PreviewMappingRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PreviewMappingResponse.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
