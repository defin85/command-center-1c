post:
  operationId: v2_extensions_apply_create
  description: Apply extensions manual operation for planned databases with drift check.
  summary: Extensions manual-operation apply
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExtensionsApplyRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExtensionsApplyRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExtensionsApplyRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '202':
      content:
        application/json:
          schema:
            type: object
            additionalProperties: {}
            description: Unspecified response body
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExtensionsApplyConflict.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
