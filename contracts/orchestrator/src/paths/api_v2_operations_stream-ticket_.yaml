post:
  operationId: v2_operations_stream_ticket_create
  description: |2-

        Obtain a short-lived, single-use ticket for SSE stream authentication.

        The ticket is valid for 30 seconds and can only be used once.
        This allows secure SSE connections without exposing JWT tokens in URLs.
        
  summary: Get SSE stream ticket
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/SSETicketRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/SSETicketRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/SSETicketRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/SSETicketResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
