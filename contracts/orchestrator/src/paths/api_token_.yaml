post:
  operationId: token_create
  description: |-
    Custom TokenObtainPairView that uses CustomTokenObtainPairSerializer.

    Generates JWT tokens with custom claims (username, roles) compatible
    with Go API Gateway authentication middleware.
  tags:
    - token
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CustomTokenObtainPair.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CustomTokenObtainPair.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CustomTokenObtainPair.yaml
    required: true
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CustomTokenObtainPair.yaml
      description: ''
