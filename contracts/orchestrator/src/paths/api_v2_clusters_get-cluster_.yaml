get:
  operationId: v2_clusters_get_cluster_retrieve
  description: >-
    Get detailed information about a specific cluster including databases and
    statistics.
  summary: Get cluster details
  parameters:
    - in: query
      name: cluster_id
      schema:
        type: string
      description: Cluster UUID
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterDetailResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
