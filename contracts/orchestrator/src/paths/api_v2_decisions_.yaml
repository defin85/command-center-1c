get:
  operationId: v2_decisions_collection
  summary: List decision tables
  parameters:
    - in: query
      name: database_id
      schema:
        type: string
      required: false
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DecisionTableListResponse.yaml
    '401':
      description: Unauthorized
post:
  operationId: v2_decisions_collection_create
  summary: Create decision table revision
  tags:
    - v2
  security:
    - bearerAuth: []
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DecisionTableWriteRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DecisionTableWriteRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DecisionTableWriteRequest.yaml
  responses:
    '201':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DecisionTableDetailResponse.yaml
    '400':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
    '401':
      description: Unauthorized
    '403':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
