post:
  operationId: v2_pools_binding_profiles_deactivate
  summary: Deactivate reusable binding profile
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: binding_profile_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '200':
      description: ''
      content:
        application/json:
          schema:
            $ref: ../components/schemas/BindingProfileMutationResponse.yaml
    '400':
      description: ''
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
    '401':
      description: Unauthorized
    '404':
      description: ''
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
