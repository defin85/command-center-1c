put:
  operationId: v2_extensions_flags_policy_update
  description: Upsert flags policy for a single extension name.
  summary: Extensions flags policy upsert
  parameters:
    - in: path
      name: extension_name
      schema:
        type: string
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyUpsertRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyUpsertRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyUpsertRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExtensionsFlagsPolicy.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
