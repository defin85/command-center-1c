get:
  operationId: v2_pools_master_data_chart_import_discovery_retrieve
  summary: Discover chart import candidates for a reference database
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: database_id
      in: query
      required: true
      schema:
        type: string
        maxLength: 64
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ChartDiscoveryResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
