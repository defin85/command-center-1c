get:
  operationId: v2_pools_batches_list
  summary: List pool batches
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolBatchListResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
    - name: pool_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    - name: batch_kind
      in: query
      required: false
      schema:
        type: string
        enum:
          - receipt
          - sale
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
post:
  operationId: v2_pools_batches_create
  summary: Create canonical pool batch and start downstream processing
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolBatchCreateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolBatchCreateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolBatchCreateRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolBatchCreateResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
