get:
  operationId: v2_operation_catalog_exposures_retrieve
  summary: List operation exposures
  parameters:
    - in: query
      name: alias
      schema:
        type: string
    - in: query
      name: capability
      schema:
        type: string
    - in: query
      name: filters
      schema:
        type: string
      description: JSON object with server-side filters
    - in: query
      name: include
      schema:
        type: string
      description: Comma-separated include list, e.g. definitions
    - in: query
      name: limit
      schema:
        type: integer
    - in: query
      name: offset
      schema:
        type: integer
    - in: query
      name: search
      schema:
        type: string
    - in: query
      name: sort
      schema:
        type: string
      description: JSON object with server-side sort config
    - in: query
      name: status
      schema:
        type: string
    - in: query
      name: surface
      schema:
        type: string
      description: template. Any other value is rejected.
    - in: query
      name: tenant_id
      schema:
        type: string
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationCatalogExposureListResponse.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
post:
  operationId: v2_operation_catalog_exposures_create
  summary: Upsert operation exposure
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/OperationCatalogExposureUpsertRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/OperationCatalogExposureUpsertRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/OperationCatalogExposureUpsertRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationCatalogExposureDetailResponse.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ErrorResponse.yaml
      description: Conflict
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
