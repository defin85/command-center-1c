get:
  operationId: v2_pools_factual_workspace
  summary: Get pool factual workspace read model
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolFactualWorkspaceResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
    - name: pool_id
      in: query
      required: true
      schema:
        type: string
        format: uuid
    - name: quarter_start
      in: query
      required: false
      schema:
        type: string
        format: date
