post:
  operationId: v2_operations_get_operation_timeline_create
  description: |2-

        Get the execution timeline for an operation.

        **Authentication:** Requires valid JWT token.

        **Authorization:** User must own the operation (created_by matches username)
        or be staff.

        **Response format:**
        - Timeline events are sorted chronologically (ascending)
        - Each event includes timestamp, event name, service, and optional metadata
        - Duration is calculated from first to last event (null if < 2 events)

        **Graceful degradation:**
        - If Redis is unavailable, returns empty timeline (not 500 error)
        
  summary: Get operation timeline
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/GetOperationTimelineRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/GetOperationTimelineRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/GetOperationTimelineRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/GetOperationTimelineResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TimelineErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TimelineErrorResponse.yaml
      description: ''
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/TimelineErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
