get:
  operationId: v2_pools_odata_metadata_catalog_get
  summary: Get normalized OData metadata catalog for selected database
  parameters:
    - in: query
      name: database_id
      schema:
        type: string
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolODataMetadataCatalogResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: >-
        Validation/auth/configuration error. Possible `code` values include
        `VALIDATION_ERROR`, `ODATA_MAPPING_NOT_CONFIGURED`,
        `ODATA_MAPPING_AMBIGUOUS`, `POOL_METADATA_FETCH_FAILED`,
        `POOL_METADATA_PARSE_FAILED`, `POOL_METADATA_PROFILE_UNAVAILABLE`,
        `POOL_METADATA_SNAPSHOT_UNAVAILABLE`.
    '401':
      description: Unauthorized
    '403':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: Database view permission denied (`PERMISSION_DENIED`).
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: Metadata refresh lock conflict (`POOL_METADATA_REFRESH_IN_PROGRESS`).
