get:
  operationId: v2_operations_cli_commands_retrieve
  description: List supported DESIGNER batch commands for designer_cli.
  summary: Get CLI command catalog
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CliCommandCatalogResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
