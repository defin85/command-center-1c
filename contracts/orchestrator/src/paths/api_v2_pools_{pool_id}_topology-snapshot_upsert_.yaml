post:
  operationId: v2_pools_topology_snapshot_upsert
  summary: Create or update topology snapshot for a pool
  parameters:
    - in: path
      name: pool_id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolTopologySnapshotUpsertRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolTopologySnapshotUpsertRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolTopologySnapshotUpsertRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolTopologySnapshotUpsertResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: >-
        Validation error. Referential metadata validation uses
        `POOL_METADATA_REFERENCE_INVALID` and `POOL_METADATA_SNAPSHOT_UNAVAILABLE`;
        `errors` may contain an array of `{code, path, detail}` entries.
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
