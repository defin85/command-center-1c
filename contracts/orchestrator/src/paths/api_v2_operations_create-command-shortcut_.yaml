post:
  operationId: v2_operations_create_command_shortcut_create
  description: Create a per-user shortcut to a schema-driven driver command (command_id).
  summary: Create driver command shortcut
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/CreateDriverCommandShortcutRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/CreateDriverCommandShortcutRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/CreateDriverCommandShortcutRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DriverCommandShortcut.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/OperationErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
