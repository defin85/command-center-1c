post:
  operationId: v2_extensions_plan_create
  description: >-
    Build plan for extensions manual operation (captures base snapshot hashes
    per database).
  summary: Extensions manual-operation plan
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExtensionsPlanRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExtensionsPlanRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExtensionsPlanRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExtensionsPlanResponse.yaml
      description: ''
    '400':
      description: Validation/configuration error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
