get:
  operationId: v2_pools_master_data_sync_status_list
  summary: List master-data sync status
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
    - name: database_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    - name: entity_type
      in: query
      required: false
      schema:
        type: string
        enum:
          - party
          - item
          - contract
          - tax_profile
    - name: priority
      in: query
      required: false
      schema:
        type: string
        enum:
          - p0
          - p1
          - p2
          - p3
    - name: role
      in: query
      required: false
      schema:
        type: string
        enum:
          - inbound
          - outbound
          - reconcile
          - manual_remediation
    - name: server_affinity
      in: query
      required: false
      schema:
        type: string
        maxLength: 128
    - name: deadline_state
      in: query
      required: false
      schema:
        type: string
        enum:
          - none
          - pending
          - met
          - missed
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataSyncStatusListResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
