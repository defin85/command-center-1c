get:
  operationId: v2_pools_master_data_sync_launches_retrieve
  summary: List master-data sync launches
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 20
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataSyncLaunchListResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
post:
  operationId: v2_pools_master_data_sync_launches_create
  summary: Create master-data sync launch
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolMasterDataSyncLaunchCreateRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolMasterDataSyncLaunchCreateRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolMasterDataSyncLaunchCreateRequest.yaml
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataSyncLaunchResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
