post:
  operationId: v2_pools_odata_metadata_catalog_refresh
  summary: Refresh OData metadata catalog snapshot for selected database
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolODataMetadataCatalogRefreshRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolODataMetadataCatalogRefreshRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolODataMetadataCatalogRefreshRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolODataMetadataCatalogResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: >-
        Validation/auth/configuration error. Possible `code` values include
        `VALIDATION_ERROR`, `ODATA_MAPPING_NOT_CONFIGURED`,
        `ODATA_MAPPING_AMBIGUOUS`, `POOL_METADATA_FETCH_FAILED`,
        `POOL_METADATA_PARSE_FAILED`.
    '401':
      description: Unauthorized
    '403':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: Database operate permission denied (`PERMISSION_DENIED`).
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '409':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: Metadata refresh lock conflict (`POOL_METADATA_REFRESH_IN_PROGRESS`).
