post:
  operationId: v2_events_store_failed_create
  description: Internal endpoint to store events that failed to publish to Redis.
  summary: Store failed event
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/StoreFailedEventRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/StoreFailedEventRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/StoreFailedEventRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/StoreFailedEventResponse.yaml
      description: ''
    '400':
      description: Bad request
    '403':
      description: Forbidden
    '500':
      description: Internal server error
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
