get:
  operationId: v2_rbac_ref_workflow_templates_retrieve
  summary: List workflow templates (RBAC ref)
  parameters:
    - in: query
      name: limit
      schema:
        type: integer
    - in: query
      name: offset
      schema:
        type: integer
    - in: query
      name: search
      schema:
        type: string
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RefWorkflowTemplatesResponse.yaml
      description: ''
