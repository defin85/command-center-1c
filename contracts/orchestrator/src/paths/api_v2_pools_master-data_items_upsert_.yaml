post:
  operationId: v2_pools_master_data_items_upsert
  summary: Create or update master-data item
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolMasterDataItemUpsertRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolMasterDataItemUpsertRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolMasterDataItemUpsertRequest.yaml
    required: true
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataItemUpsertResponse.yaml
      description: ''
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataItemUpsertResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''

