post:
  operationId: v2_clusters_create_cluster_create
  description: >-
    Create a new cluster. Requires name, ras_host, ras_port, rmngr_host,
    rmngr_port, and cluster_service_url.
  summary: Create a new cluster
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Cluster.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/Cluster.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/Cluster.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '201':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterCreateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
