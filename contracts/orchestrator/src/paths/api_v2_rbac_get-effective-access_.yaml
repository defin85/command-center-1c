get:
  operationId: v2_rbac_get_effective_access_retrieve
  summary: Get effective access
  parameters:
    - in: query
      name: include_artifacts
      schema:
        type: boolean
        default: false
    - in: query
      name: include_clusters
      schema:
        type: boolean
        default: true
    - in: query
      name: include_databases
      schema:
        type: boolean
        default: true
    - in: query
      name: include_templates
      schema:
        type: boolean
        default: false
    - in: query
      name: include_workflows
      schema:
        type: boolean
        default: false
    - in: query
      name: limit
      schema:
        type: integer
      description: Optional pagination for databases
    - in: query
      name: offset
      schema:
        type: integer
      description: Optional pagination for databases
    - in: query
      name: user_id
      schema:
        type: integer
      description: >-
        Optional (default: current user). Requires databases.manage_rbac for
        other users.
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/EffectiveAccessResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
