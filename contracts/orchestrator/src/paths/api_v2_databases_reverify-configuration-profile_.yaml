post:
  operationId: v2_databases_reverify_configuration_profile_create
  description: Queue async business configuration profile verification for the selected database.
  summary: Queue configuration identity re-verification
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DatabaseMetadataManagementActionRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DatabaseMetadataManagementActionRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DatabaseMetadataManagementActionRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '202':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseMetadataManagementReverifyResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: >-
        Re-verify is currently unavailable. Possible `error.code` values include
        `IBCMD_CONNECTION_PROFILE_REQUIRED` and
        `BUSINESS_CONFIGURATION_DRIVER_UNAVAILABLE`.
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
