get:
  operationId: v2_pools_master_data_dedupe_review_list
  summary: List master-data dedupe review items
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
    - name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    - name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0
    - name: status
      in: query
      required: false
      schema:
        type: string
        enum:
          - pending_review
          - resolved_auto
          - resolved_manual
          - superseded
    - name: entity_type
      in: query
      required: false
      schema:
        type: string
        enum:
          - party
          - item
          - contract
          - tax_profile
          - gl_account
    - name: reason_code
      in: query
      required: false
      schema:
        type: string
    - name: cluster_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
    - name: database_id
      in: query
      required: false
      schema:
        type: string
        format: uuid
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataDedupeReviewListResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
