get:
  operationId: v2_pools_master_data_gl_account_sets_get
  summary: Get reusable GL account set detail
  tags:
    - v2
  security:
    - bearerAuth: []
  parameters:
    - in: path
      name: id
      schema:
        type: string
        format: uuid
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolMasterDataGLAccountSetDetailResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
