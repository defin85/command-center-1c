post:
  operationId: v2_extensions_flags_policy_adopt_create
  description: >-
    Adopt flags policy for a single extension name from a database observed
    snapshot.
  summary: Extensions flags policy adopt
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyAdoptRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyAdoptRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/ExtensionsFlagsPolicyAdoptRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ExtensionsFlagsPolicy.yaml
      description: ''
    '400':
      description: Validation error
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
    '404':
      description: Not found
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
