post:
  operationId: v2_clusters_update_cluster_create
  description: Update cluster information. Supports partial updates.
  summary: Update cluster
  parameters:
    - in: query
      name: cluster_id
      schema:
        type: string
      description: Cluster UUID (can also be in request body)
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/Cluster.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/Cluster.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/Cluster.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterUpdateResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
