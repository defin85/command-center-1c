post:
  operationId: v2_clusters_discover_clusters_create
  description: >-
    Trigger cluster discovery on a RAS server. Creates or updates Cluster
    records for all found clusters.
  summary: Discover clusters on RAS server
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DiscoverClustersRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DiscoverClustersRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DiscoverClustersRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DiscoverClustersResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '409':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
    '500':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/ClusterErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
