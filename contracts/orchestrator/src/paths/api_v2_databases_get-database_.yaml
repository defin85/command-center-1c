get:
  operationId: v2_databases_get_database_retrieve
  description: Get detailed information about a specific database including cluster info.
  summary: Get database details
  parameters:
    - in: query
      name: database_id
      schema:
        type: string
      description: Database UUID
      required: true
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseDetailResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
