post:
  operationId: v2_pools_factual_review_actions
  summary: Apply manual review action in factual workspace
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/PoolFactualReviewActionRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/PoolFactualReviewActionRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/PoolFactualReviewActionRequest.yaml
    required: true
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/PoolFactualReviewActionResponse.yaml
      description: ''
    '400':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
    '401':
      description: Unauthorized
    '404':
      content:
        application/problem+json:
          schema:
            $ref: ../components/schemas/ProblemDetailsError.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
