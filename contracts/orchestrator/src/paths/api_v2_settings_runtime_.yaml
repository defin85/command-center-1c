get:
  operationId: v2_settings_runtime_retrieve
  description: List runtime-configurable settings for SPA and operations.
  summary: List runtime settings
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/RuntimeSettingsResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
