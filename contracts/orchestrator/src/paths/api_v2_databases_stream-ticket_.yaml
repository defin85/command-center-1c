post:
  operationId: v2_databases_stream_ticket_create
  description: |2-

        Obtain a short-lived, single-use ticket for database SSE stream authentication.

        The ticket is valid for 30 seconds and can only be used once.
        
  summary: Get database SSE stream ticket
  tags:
    - v2
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../components/schemas/DatabaseStreamTicketRequest.yaml
      application/x-www-form-urlencoded:
        schema:
          $ref: ../components/schemas/DatabaseStreamTicketRequest.yaml
      multipart/form-data:
        schema:
          $ref: ../components/schemas/DatabaseStreamTicketRequest.yaml
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseStreamTicketResponse.yaml
      description: ''
    '400':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
    '429':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseStreamConflictResponse.yaml
      description: Stream lease already active for this client session
    '401':
      description: Unauthorized
    '404':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/DatabaseErrorResponse.yaml
      description: ''
  parameters:
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
