get:
  operationId: v2_users_list_retrieve
  description: List users for admin UI (staff only).
  summary: List users
  parameters:
    - in: query
      name: id
      schema:
        type: integer
      description: Filter by user id
    - in: query
      name: email
      schema:
        type: string
      description: Filter by email
    - in: query
      name: is_active
      schema:
        type: boolean
      description: Filter by active flag
    - in: query
      name: is_staff
      schema:
        type: boolean
      description: Filter by staff flag
    - in: query
      name: limit
      schema:
        type: integer
      description: 'Maximum results (default: 100, max: 1000)'
    - in: query
      name: offset
      schema:
        type: integer
      description: 'Pagination offset (default: 0)'
    - in: query
      name: search
      schema:
        type: string
      description: Search by username or name
    - in: query
      name: username
      schema:
        type: string
      description: Filter by username
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/UserListResponse.yaml
      description: ''
    '401':
      description: Unauthorized
    '403':
      description: Forbidden
