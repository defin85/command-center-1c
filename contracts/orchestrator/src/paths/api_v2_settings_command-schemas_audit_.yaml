get:
  operationId: v2_settings_command_schemas_audit_retrieve
  summary: List command schemas audit log entries
  parameters:
    - in: query
      name: driver
      schema:
        type: string
      description: Driver name (cli/ibcmd)
    - in: query
      name: limit
      schema:
        type: integer
    - in: query
      name: offset
      schema:
        type: integer
    - name: X-CC1C-Tenant-ID
      in: header
      required: false
      schema:
        type: string
        format: uuid
      description: >-
        Optional tenant context selector. If omitted, tenant is resolved via
        user preference or first membership. For staff users, omission may
        return cross-tenant results on some endpoints.
  tags:
    - v2
  security:
    - bearerAuth: []
  responses:
    '200':
      content:
        application/json:
          schema:
            $ref: ../components/schemas/CommandSchemasAuditListResponse.yaml
      description: ''
