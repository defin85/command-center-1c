type: object
properties:
  id:
    type: string
    format: uuid
  tenant_id:
    type: string
    format: uuid
  job_id:
    type: string
    format: uuid
  snapshot_id:
    type: string
    format: uuid
    nullable: true
  database_id:
    type: string
