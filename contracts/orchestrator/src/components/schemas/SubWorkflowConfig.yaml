type: object
description: Serializer for SubWorkflowConfig Pydantic model.
properties:
  subworkflow_id:
    type: string
    description: Subworkflow template ID
  subworkflow_ref:
    allOf:
      - $ref: ./SubWorkflowRef.yaml
    nullable: true
    description: Pinned binding metadata for analyst-authored subworkflow calls
  input_mapping:
    type: object
    additionalProperties:
      type: string
  output_mapping:
    type: object
    additionalProperties:
      type: string
  max_depth:
    type: integer
    maximum: 20
    minimum: 1
    default: 10
required:
  - subworkflow_id
