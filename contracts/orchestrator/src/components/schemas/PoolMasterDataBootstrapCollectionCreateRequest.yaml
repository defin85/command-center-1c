allOf:
  - $ref: ./PoolMasterDataBootstrapCollectionScopeRequest.yaml
  - type: object
    properties:
      collection_id:
        type: string
        format: uuid
        description: Required when promoting an existing batch collection from preflight to dry_run or execute.
      mode:
        type: string
        enum:
          - dry_run
          - execute
      chunk_size:
        type: integer
        minimum: 1
        maximum: 1000
        default: 200
    required:
      - mode
