type: object
properties:
  database_id:
    type: string
  snapshot_id:
    type: string
  source:
    type: string
  fetched_at:
    type: string
    format: date-time
  catalog_version:
    type: string
  config_name:
    type: string
  config_version:
    type: string
  config_generation_id:
    type: string
  extensions_fingerprint:
    type: string
  metadata_hash:
    type: string
  observed_metadata_hash:
    type: string
  publication_drift:
    type: boolean
  resolution_mode:
    type: string
  is_shared_snapshot:
    type: boolean
  provenance_database_id:
    type: string
  provenance_confirmed_at:
    type: string
    format: date-time
  documents:
    type: array
    items:
      $ref: ./PoolODataMetadataCatalogDocument.yaml
required:
  - catalog_version
  - config_name
  - config_version
  - database_id
  - documents
  - extensions_fingerprint
  - fetched_at
  - is_shared_snapshot
  - metadata_hash
  - provenance_confirmed_at
  - provenance_database_id
  - resolution_mode
  - snapshot_id
  - source
