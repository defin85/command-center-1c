type: object
properties:
  database_id:
    type: string
  database_name:
    type: string
  cluster_id:
    type: string
    format: uuid
    nullable: true
  config_name:
    type: string
  config_version:
    type: string
  candidates:
    type: array
    items:
      $ref: ./ChartDiscoveryCandidate.yaml
  diagnostics:
    type: array
    items:
      type: object
      additionalProperties: true
required:
  - database_id
  - database_name
  - config_name
  - config_version
  - candidates
