type: object
properties:
  chart_identity:
    type: string
  name:
    type: string
  config_name:
    type: string
  config_version:
    type: string
  source_database_id:
    type: string
  source_database_name:
    type: string
  source_kind:
    type: string
  derivation_method:
    type: string
  confidence:
    type: string
  metadata_hash:
    type: string
  catalog_version:
    type: string
  source_evidence_fingerprint:
    type: string
  row_source_status:
    type: string
    description: Row-source readiness for initial load.
    enum:
      - ready
      - needs_probe
      - needs_mapping
      - unavailable
  row_source_kind:
    type: string
  row_source_entity_name:
    type: string
  row_source_field_mapping:
    type: object
    additionalProperties:
      type: string
  row_source_select_fields:
    type: array
    items:
      type: string
  row_source_evidence_fingerprint:
    type: string
  row_source_diagnostics:
    type: array
    items:
      type: object
      additionalProperties: true
  initial_load_ready:
    type: boolean
  diagnostics:
    type: array
    items:
      type: object
      additionalProperties: true
  warnings:
    type: array
    items:
      type: object
      additionalProperties: true
  is_complete:
    type: boolean
required:
  - chart_identity
  - name
  - config_name
  - config_version
  - source_database_id
  - source_database_name
  - source_kind
  - derivation_method
  - confidence
  - metadata_hash
  - catalog_version
  - source_evidence_fingerprint
  - row_source_status
  - row_source_kind
  - row_source_entity_name
  - row_source_field_mapping
  - row_source_select_fields
  - row_source_evidence_fingerprint
  - initial_load_ready
  - is_complete
