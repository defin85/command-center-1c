type: object
properties:
  quarter:
    type: string
  quarter_start:
    type: string
    format: date
  quarter_end:
    type: string
    format: date
  amount_with_vat:
    type: string
  amount_without_vat:
    type: string
  vat_amount:
    type: string
  incoming_amount:
    type: string
  outgoing_amount:
    type: string
  open_balance:
    type: string
  pending_review_total:
    type: integer
    minimum: 0
  attention_required_total:
    type: integer
    minimum: 0
  backlog_total:
    type: integer
    minimum: 0
  freshness_state:
    type: string
  source_availability:
    type: string
  source_availability_detail:
    type: string
  last_synced_at:
    type: string
    format: date-time
    nullable: true
  sync_status:
    type: string
  checkpoints_pending:
    type: integer
    minimum: 0
  checkpoints_running:
    type: integer
    minimum: 0
  checkpoints_failed:
    type: integer
    minimum: 0
  checkpoints_ready:
    type: integer
    minimum: 0
  activity:
    type: string
  polling_tier:
    type: string
  poll_interval_seconds:
    type: integer
    minimum: 0
  freshness_target_seconds:
    type: integer
    minimum: 0
  scope_fingerprint:
    type: string
  scope_contract_version:
    type: string
  gl_account_set_revision_id:
    type: string
  scope_contract:
    allOf:
      - $ref: ./PoolFactualScopeContract.yaml
    nullable: true
  settlement_total:
    type: integer
    minimum: 0
  checkpoint_total:
    type: integer
    minimum: 0
required:
  - attention_required_total
  - backlog_total
  - checkpoint_total
  - checkpoints_failed
  - checkpoints_pending
  - checkpoints_ready
  - checkpoints_running
  - freshness_state
  - freshness_target_seconds
  - amount_with_vat
  - amount_without_vat
  - gl_account_set_revision_id
  - incoming_amount
  - open_balance
  - outgoing_amount
  - pending_review_total
  - poll_interval_seconds
  - polling_tier
  - quarter
  - quarter_end
  - quarter_start
  - settlement_total
  - source_availability
  - sync_status
  - scope_contract_version
  - scope_fingerprint
  - vat_amount
