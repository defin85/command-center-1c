type: object
properties:
  party_id:
    type: string
    format: uuid
  canonical_id:
    type: string
    maxLength: 128
  name:
    type: string
    maxLength: 255
  full_name:
    type: string
    default: ''
  inn:
    type: string
    default: ''
  kpp:
    type: string
    default: ''
  is_our_organization:
    type: boolean
    default: false
  is_counterparty:
    type: boolean
    default: true
  metadata:
    type: object
    default: {}
    additionalProperties: true
required:
  - canonical_id
  - name

