type: object
description: Workflow binding attachment payload accepted by the canonical pool-scoped upsert endpoint.
properties:
  contract_version:
    type: string
    description: Pool workflow binding contract version.
  binding_id:
    type: string
    description: Stable binding identifier within the pool.
  pool_id:
    type: string
    format: uuid
    description: Enclosing organization pool identifier.
  revision:
    type: integer
    minimum: 1
    description: Server-managed optimistic concurrency revision for update/delete operations.
  binding_profile_revision_id:
    type: string
    description: Opaque pinned reusable binding profile revision identifier.
  selector:
    $ref: ./PoolWorkflowBindingSelector.yaml
  effective_from:
    type: string
    format: date
    description: Binding effective start date.
  effective_to:
    type: string
    format: date
    nullable: true
    description: Binding effective end date, inclusive.
  status:
    type: string
    enum:
      - draft
      - active
      - inactive
    description: Binding lifecycle status.
required:
  - binding_profile_revision_id
  - effective_from
