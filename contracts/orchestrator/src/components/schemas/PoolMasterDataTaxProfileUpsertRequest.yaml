type: object
properties:
  tax_profile_id:
    type: string
    format: uuid
  canonical_id:
    type: string
    maxLength: 128
  vat_rate:
    type: number
    minimum: 0
    maximum: 100
  vat_included:
    type: boolean
  vat_code:
    type: string
    maxLength: 64
  metadata:
    type: object
    default: {}
    additionalProperties: true
required:
  - canonical_id
  - vat_rate
  - vat_included
  - vat_code

