type: object
properties:
  pool_id:
    type: string
    format: uuid
  workflow_bindings:
    type: array
    items:
      $ref: ./PoolWorkflowBindingRead.yaml
  collection_etag:
    type: string
    description: Opaque optimistic concurrency token for the entire binding collection.
  blocking_remediation:
    allOf:
      - $ref: ./PoolWorkflowBindingBlockingRemediation.yaml
    nullable: true
required:
  - pool_id
  - workflow_bindings
  - collection_etag
