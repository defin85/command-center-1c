type: object
description: Compiled runtime projection snapshot for pool-run lineage and operator diagnostics.
properties:
  version:
    type: string
  run_id:
    type: string
    format: uuid
  pool_id:
    type: string
    format: uuid
  direction:
    type: string
  mode:
    type: string
  workflow_definition:
    type: object
    properties:
      plan_key:
        type: string
      template_version:
        type: string
      workflow_template_name:
        type: string
      workflow_type:
        type: string
    required:
      - plan_key
      - template_version
      - workflow_template_name
      - workflow_type
  workflow_binding:
    type: object
    properties:
      binding_mode:
        type: string
      binding_id:
        type: string
      binding_profile_id:
        type: string
      pool_id:
        type: string
        format: uuid
      binding_profile_revision_id:
        type: string
      binding_profile_revision_number:
        type: integer
        minimum: 1
      attachment_revision:
        type: integer
        minimum: 1
      workflow_definition_key:
        type: string
      workflow_revision_id:
        type: string
      workflow_revision:
        type: integer
      workflow_name:
        type: string
      decision_refs:
        type: array
        items:
          $ref: ./PoolWorkflowBindingDecisionRef.yaml
      selector:
        $ref: ./PoolWorkflowBindingSelector.yaml
      status:
        type: string
    required:
      - binding_mode
  document_policy_projection:
    type: object
    properties:
      source_mode:
        type: string
      policy_refs:
        type: array
        items:
          type: object
          properties:
            slot_key:
              type: string
              nullable: true
            edge_ref:
              type: object
              properties:
                parent_node_id:
                  type: string
                child_node_id:
                  type: string
              required:
                - parent_node_id
                - child_node_id
            policy_version:
              type: string
            source:
              type: string
          required:
            - slot_key
            - edge_ref
            - policy_version
            - source
      compiled_document_policy_slots:
        type: object
        description: Materialized publication slot projection keyed by binding slot_key.
        additionalProperties:
          type: object
          additionalProperties: true
      slot_coverage_summary:
        type: object
        description: Persisted slot coverage summary for run lineage and retry diagnostics.
        properties:
          total_edges:
            type: integer
          counts:
            type: object
            properties:
              resolved:
                type: integer
              missing_selector:
                type: integer
              missing_slot:
                type: integer
              ambiguous_slot:
                type: integer
              ambiguous_context:
                type: integer
              unavailable_context:
                type: integer
            required:
              - resolved
              - missing_selector
              - missing_slot
              - ambiguous_slot
              - ambiguous_context
              - unavailable_context
          items:
            type: array
            items:
              type: object
              properties:
                edge_id:
                  type: string
                edge_label:
                  type: string
                slot_key:
                  type: string
                coverage:
                  type: object
                  properties:
                    code:
                      type: string
                      nullable: true
                    status:
                      type: string
                      enum:
                        - resolved
                        - missing_selector
                        - missing_slot
                        - ambiguous_slot
                        - ambiguous_context
                        - unavailable_context
                    label:
                      type: string
                    detail:
                      type: string
                  required:
                    - code
                    - status
                    - label
                    - detail
              required:
                - edge_id
                - edge_label
                - slot_key
                - coverage
        required:
          - total_edges
          - counts
          - items
      policy_refs_count:
        type: integer
      targets_count:
        type: integer
    required:
      - source_mode
      - policy_refs
      - compiled_document_policy_slots
      - slot_coverage_summary
      - policy_refs_count
      - targets_count
  artifacts:
    type: object
    properties:
      document_plan_artifact_version:
        type: string
        nullable: true
      topology_version_ref:
        type: string
        nullable: true
      distribution_artifact_ref:
        type: object
        additionalProperties: true
        nullable: true
    required:
      - document_plan_artifact_version
      - topology_version_ref
      - distribution_artifact_ref
  compile_summary:
    type: object
    properties:
      steps_count:
        type: integer
      atomic_publication_steps_count:
        type: integer
      compiled_targets_count:
        type: integer
    required:
      - steps_count
      - atomic_publication_steps_count
      - compiled_targets_count
required:
  - version
  - run_id
  - pool_id
  - direction
  - mode
  - workflow_definition
  - workflow_binding
  - document_policy_projection
  - artifacts
  - compile_summary
