type: object
properties:
  workflow_run_id:
    type: string
    format: uuid
    nullable: true
  workflow_status:
    type: string
    nullable: true
  execution_backend:
    type: string
  retry_chain:
    type: array
    items:
      $ref: ./PoolRunRetryChainAttempt.yaml
  root_operation_id:
    type: string
    nullable: true
  execution_consumer:
    type: string
    nullable: true
  lane:
    type: string
    nullable: true
  legacy_reference:
    type: string
    nullable: true
required:
  - execution_backend
  - retry_chain
