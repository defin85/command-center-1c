type: object
description: Machine-readable metadata for an active database stream lease conflict.
properties:
  retry_after:
    type: integer
    minimum: 0
    description: Seconds until a new connect or recovery attempt should be retried.
  client_instance_id:
    type: string
    description: Browser/client instance identifier bound to the active lease.
  scope:
    type: string
    description: Stream scope associated with the active lease.
  active_session_id:
    type: string
    nullable: true
    description: Logical session identifier currently holding the lease.
  active_lease_id:
    type: string
    nullable: true
    description: Active lease identifier currently holding the stream.
  recovery_supported:
    type: boolean
    description: Indicates whether explicit recovery is supported for this conflict.
required:
  - retry_after
  - client_instance_id
  - scope
  - recovery_supported
