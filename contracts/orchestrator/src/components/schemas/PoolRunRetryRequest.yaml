type: object
properties:
  entity_name:
    type: string
    maxLength: 255
  documents_by_database:
    type: object
    additionalProperties:
      type: array
      items: {}
  max_attempts:
    type: integer
    maximum: 5
    minimum: 1
    default: 5
  retry_interval_seconds:
    type: integer
    maximum: 120
    minimum: 0
    default: 0
  external_key_field:
    type: string
    default: ExternalRunKey
  use_retry_subset_payload:
    type: boolean
    default: false
required:
  - documents_by_database
  - entity_name
