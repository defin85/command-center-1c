type: object
properties:
  version:
    type: string
  effective_from:
    type: string
    format: date
  effective_to:
    type: string
    format: date
    nullable: true
  nodes:
    type: array
    items:
      $ref: ./PoolTopologySnapshotNodeInput.yaml
  edges:
    type: array
    items:
      $ref: ./PoolTopologySnapshotEdgeInput.yaml
required:
  - effective_from
  - nodes
  - version
