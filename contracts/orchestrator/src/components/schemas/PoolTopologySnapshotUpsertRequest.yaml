type: object
properties:
  version:
    type: string
  effective_from:
    type: string
    format: date
  effective_to:
    type: string
    format: date
    nullable: true
  topology_template_revision_id:
    type: string
  slot_assignments:
    type: array
    items:
      $ref: ./PoolTopologyTemplateSlotAssignmentInput.yaml
  edge_selector_overrides:
    type: array
    items:
      $ref: ./PoolTopologyTemplateEdgeSelectorOverrideInput.yaml
  nodes:
    type: array
    items:
      $ref: ./PoolTopologySnapshotNodeInput.yaml
  edges:
    type: array
    items:
      $ref: ./PoolTopologySnapshotEdgeInput.yaml
required:
  - effective_from
  - version
