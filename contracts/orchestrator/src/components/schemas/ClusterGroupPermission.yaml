type: object
properties:
  group:
    $ref: ./RbacGroupRef.yaml
  cluster:
    $ref: ./ClusterRef.yaml
  level:
    type: string
  granted_by:
    allOf:
      - $ref: ./RbacUserRef.yaml
    nullable: true
  granted_at:
    type: string
    format: date-time
  notes:
    type: string
required:
  - cluster
  - granted_at
  - granted_by
  - group
  - level
