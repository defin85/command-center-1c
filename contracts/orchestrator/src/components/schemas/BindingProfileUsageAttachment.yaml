type: object
properties:
  pool_id:
    type: string
    format: uuid
  pool_code:
    type: string
  pool_name:
    type: string
  binding_id:
    type: string
  attachment_revision:
    type: integer
    minimum: 1
  binding_profile_revision_id:
    type: string
  binding_profile_revision_number:
    type: integer
    minimum: 1
    nullable: true
  status:
    type: string
  selector:
    $ref: ./PoolWorkflowBindingSelector.yaml
  effective_from:
    type: string
    format: date
  effective_to:
    type: string
    format: date
    nullable: true
required:
  - pool_id
  - pool_code
  - pool_name
  - binding_id
  - attachment_revision
  - binding_profile_revision_id
  - status
  - selector
  - effective_from
