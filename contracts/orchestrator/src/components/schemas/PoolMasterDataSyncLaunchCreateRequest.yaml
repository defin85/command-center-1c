type: object
properties:
  mode:
    type: string
    enum:
      - inbound
      - outbound
      - reconcile
  target_mode:
    type: string
    enum:
      - cluster_all
      - database_set
  cluster_id:
    type: string
    format: uuid
    nullable: true
  database_ids:
    type: array
    items:
      type: string
      maxLength: 64
  entity_scope:
    type: array
    items:
      type: string
      enum:
        - party
        - item
        - contract
        - tax_profile
required:
  - mode
  - target_mode
  - entity_scope
