type: object
properties:
  pool_id:
    type: string
    format: uuid
  batch_kind:
    type: string
    enum:
      - receipt
      - sale
  source_type:
    type: string
    enum:
      - schema_template_upload
      - integration
      - manual
  schema_template_id:
    type: string
    format: uuid
    nullable: true
  pool_workflow_binding_id:
    type: string
  start_organization_id:
    type: string
    format: uuid
    nullable: true
  period_start:
    type: string
    format: date
  period_end:
    type: string
    format: date
    nullable: true
  source_reference:
    type: string
  raw_payload_ref:
    type: string
  source_metadata: {}
  integration_reference:
    type: string
  json_payload: {}
  xlsx_base64:
    type: string
required:
  - batch_kind
  - period_start
  - pool_id
  - source_type
