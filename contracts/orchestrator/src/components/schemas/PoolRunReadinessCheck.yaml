type: object
properties:
  code:
    type: string
    enum:
      - master_data_coverage
      - organization_party_bindings
      - policy_completeness
      - odata_verify_readiness
  status:
    type: string
    enum:
      - ready
      - not_ready
  blocker_codes:
    type: array
    items:
      type: string
  blockers:
    type: array
    items:
      $ref: ./PoolRunReadinessBlocker.yaml
required:
  - code
  - status
  - blocker_codes
  - blockers
