type: object
properties:
  kind:
    type: string
  source_path:
    type: string
  pool_id:
    type: string
    format: uuid
  pool_code:
    type: string
  edge_version_id:
    type: string
    format: uuid
  parent_node_version_id:
    type: string
    format: uuid
  child_node_version_id:
    type: string
    format: uuid
  parent_organization_id:
    type: string
    format: uuid
  child_organization_id:
    type: string
    format: uuid
  parent_organization_name:
    type: string
  child_organization_name:
    type: string
  child_database_id:
    type: string
    format: uuid
