type: object
description: Workflow binding attachment read-model assigned to an organization pool.
properties:
  contract_version:
    type: string
    description: Pool workflow binding contract version.
  binding_id:
    type: string
    description: Stable binding identifier within the pool.
  pool_id:
    type: string
    format: uuid
    description: Enclosing organization pool identifier.
  revision:
    type: integer
    minimum: 1
    description: Server-managed optimistic concurrency revision for update/delete operations.
  binding_profile_id:
    type: string
    description: Reusable execution-pack identifier pinned by this attachment.
  binding_profile_revision_id:
    type: string
    description: Opaque pinned reusable execution-pack revision identifier.
  binding_profile_revision_number:
    type: integer
    minimum: 1
    description: Read-only display revision number of the pinned reusable execution-pack revision.
  selector:
    $ref: ./PoolWorkflowBindingSelector.yaml
  effective_from:
    type: string
    format: date
    description: Binding effective start date.
  effective_to:
    type: string
    format: date
    nullable: true
    description: Binding effective end date, inclusive.
  status:
    type: string
    enum:
      - draft
      - active
      - inactive
    description: Binding lifecycle status.
  resolved_profile:
    $ref: ./PoolWorkflowBindingResolvedProfile.yaml
  profile_lifecycle_warning:
    allOf:
      - $ref: ./PoolWorkflowBindingProfileLifecycleWarning.yaml
    nullable: true
required:
  - binding_id
  - pool_id
  - binding_profile_id
  - binding_profile_revision_id
  - binding_profile_revision_number
  - revision
  - effective_from
  - status
  - resolved_profile
