type: object
properties:
  type:
    type: string
    default: about:blank
  title:
    type: string
  status:
    type: integer
  detail:
    type: string
  code:
    type: string
  errors:
    description: >-
      Optional structured error details. For validation failures this is a
      field-errors map; for referential or topology compatibility validation
      this is an array of machine-readable diagnostic items.
    oneOf:
      - $ref: ./ProblemDetailsFieldErrors.yaml
      - type: array
        items:
          $ref: ./ProblemDetailsReferentialError.yaml
required:
  - code
  - detail
  - status
  - title
  - type
