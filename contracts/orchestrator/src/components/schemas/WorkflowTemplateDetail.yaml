type: object
description: |-
  Full serializer for WorkflowTemplate detail view.

  Includes dag_structure and config.
properties:
  id:
    type: string
    format: uuid
    readOnly: true
  name:
    type: string
    description: Workflow template name
    maxLength: 200
  description:
    type: string
    description: Workflow description
  workflow_type:
    enum:
      - sequential
      - conditional
      - parallel
      - complex
    type: string
    x-spec-enum-id: ed82a65c83be653d
    description: |-
      Workflow type: sequential, conditional, parallel, complex

      * `sequential` - Sequential
      * `conditional` - Conditional
      * `parallel` - Parallel
      * `complex` - Complex
  category:
    type: string
    description: Workflow category (for example `custom` or `system`).
    readOnly: true
  dag_structure:
    $ref: ./DAGStructure.yaml
  config:
    $ref: ./WorkflowConfig.yaml
  is_valid:
    type: boolean
    readOnly: true
    description: DAG structure is valid (cycles checked)
  is_active:
    type: boolean
    description: Template is active and can be executed
  is_system_managed:
    type: boolean
    readOnly: true
    description: Whether this workflow is a system-managed runtime projection.
  management_mode:
    type: string
    enum:
      - user_authored
      - system_managed
    readOnly: true
    description: Contract-level management mode for workflow authoring surfaces.
  visibility_surface:
    type: string
    enum:
      - workflow_library
      - runtime_diagnostics
    readOnly: true
    description: Primary UI surface where this workflow should be listed.
  read_only_reason:
    type: string
    nullable: true
    readOnly: true
    description: Read-only explanation for system-managed runtime projections.
  version_number:
    type: integer
    readOnly: true
    default: 1
    description: Version number (auto-incremented)
  parent_version:
    type: string
    format: uuid
    nullable: true
    description: Parent template if this is a new version
  parent_version_name:
    type: string
    readOnly: true
    nullable: true
  created_by:
    type: integer
    nullable: true
  created_by_username:
    type: string
    readOnly: true
    nullable: true
  execution_count:
    type: integer
    description: Return number of executions for this template.
    readOnly: true
  created_at:
    type: string
    format: date-time
    readOnly: true
  updated_at:
    type: string
    format: date-time
    readOnly: true
required:
  - category
  - created_at
  - created_by_username
  - dag_structure
  - execution_count
  - id
  - is_valid
  - is_system_managed
  - management_mode
  - name
  - parent_version_name
  - read_only_reason
  - updated_at
  - version_number
  - visibility_surface
