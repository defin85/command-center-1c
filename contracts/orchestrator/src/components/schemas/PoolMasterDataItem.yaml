type: object
properties:
  id:
    type: string
    format: uuid
  tenant_id:
    type: string
    format: uuid
  canonical_id:
    type: string
    maxLength: 128
  name:
    type: string
    maxLength: 255
  sku:
    type: string
    maxLength: 128
  unit:
    type: string
    maxLength: 64
  metadata:
    type: object
    additionalProperties: true
  created_at:
    type: string
    format: date-time
  updated_at:
    type: string
    format: date-time
required:
  - id
  - tenant_id
  - canonical_id
  - name

