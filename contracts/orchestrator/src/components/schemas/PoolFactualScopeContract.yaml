    type: string
  selector_key:
    type: string
  gl_account_set_id:
    type: string
    format: uuid
  gl_account_set_revision_id:
    type: string
  scope_fingerprint:
    type: string
  effective_members:
    type: array
    items:
      $ref: ./PoolFactualScopeMember.yaml
  resolved_bindings:
    type: array
