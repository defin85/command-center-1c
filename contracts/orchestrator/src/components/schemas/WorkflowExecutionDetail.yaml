type: object
description: |-
  Full serializer for WorkflowExecution detail view.

  Includes step_results and detailed node_statuses.
properties:
  id:
    type: string
    format: uuid
    readOnly: true
  workflow_template:
    type: string
    format: uuid
    readOnly: true
  template_name:
    type: string
    readOnly: true
  template_version:
    type: integer
    readOnly: true
  status:
    enum:
      - pending
      - running
      - completed
      - failed
      - cancelled
    type: string
    x-spec-enum-id: 1b7374f2553d22cc
    readOnly: true
    description: |-
      Current execution status (FSM-protected)

      * `pending` - Pending
      * `running` - Running
      * `completed` - Completed
      * `failed` - Failed
      * `cancelled` - Cancelled
  input_context:
    readOnly: true
    description: Initial input data for the workflow
  final_result:
    readOnly: true
    nullable: true
    description: Final workflow output data
  current_node_id:
    type: string
    readOnly: true
    description: Currently executing node ID
  completed_nodes:
    readOnly: true
    description: List of completed node IDs
  failed_nodes:
    readOnly: true
    description: List of failed node IDs
  node_statuses:
    readOnly: true
    description: Map of node_id -> status (pending/running/completed/failed/skipped)
  progress_percent:
    type: string
    format: decimal
    pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
    readOnly: true
  error_message:
    type: string
    readOnly: true
    description: Error message if failed
  error_node_id:
    type: string
    readOnly: true
    description: Node ID where error occurred
  trace_id:
    type: string
    readOnly: true
    description: OpenTelemetry trace ID (hex)
  started_at:
    type: string
    format: date-time
    readOnly: true
    nullable: true
  completed_at:
    type: string
    format: date-time
    readOnly: true
    nullable: true
  duration:
    type: number
    format: double
    readOnly: true
  step_results:
    type: array
    items:
      $ref: ./WorkflowStepResult.yaml
    readOnly: true
required:
  - completed_at
  - completed_nodes
  - current_node_id
  - duration
  - error_message
  - error_node_id
  - failed_nodes
  - final_result
  - id
  - input_context
  - node_statuses
  - progress_percent
  - started_at
  - status
  - step_results
  - template_name
  - template_version
  - trace_id
  - workflow_template
