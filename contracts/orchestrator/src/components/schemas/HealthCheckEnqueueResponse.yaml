type: object
description: Response for health_check endpoints (operation queued).
properties:
  operation_id:
    type: string
    description: ID of the created operation
  status:
    type: string
    description: Operation status (queued)
  total_tasks:
    type: integer
    description: Number of tasks created
  message:
    type: string
    description: Status message
required:
  - message
  - operation_id
  - status
  - total_tasks
