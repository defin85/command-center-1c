type: object
description: Configuration profile state for database metadata management UI.
properties:
  status:
    type: string
  config_name:
    type: string
  config_version:
    type: string
  config_generation_id:
    type: string
  config_root_name:
    type: string
  config_vendor:
    type: string
  config_name_source:
    type: string
  verification_operation_id:
    type: string
  verified_at:
    type: string
    format: date-time
    nullable: true
  generation_probe_requested_at:
    type: string
    format: date-time
    nullable: true
  generation_probe_checked_at:
    type: string
    format: date-time
    nullable: true
  observed_metadata_hash:
    type: string
  canonical_metadata_hash:
    type: string
  publication_drift:
    type: boolean
  reverify_available:
    type: boolean
  reverify_blocker_code:
    type: string
  reverify_blocker_message:
    type: string
  reverify_blocking_action:
    type: string
required:
  - status
  - config_name
  - config_version
  - config_generation_id
  - config_root_name
  - config_vendor
  - config_name_source
  - verification_operation_id
  - observed_metadata_hash
  - canonical_metadata_hash
  - publication_drift
  - reverify_available
  - reverify_blocker_code
  - reverify_blocker_message
  - reverify_blocking_action
