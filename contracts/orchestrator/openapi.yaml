          enum:
          - cancelled
          - completed
          - failed
          - pending
          - processing
          - queued
        description: |-
          * `pending` - Pending
          * `queued` - Queued
          * `processing` - Processing
          * `completed` - Completed
          * `failed` - Failed
          * `cancelled` - Cancelled
