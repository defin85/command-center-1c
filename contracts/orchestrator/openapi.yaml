components:
  schemas:
    BatchInstallItem:
      type: object
      description: Single item in batch installation result.
      properties:
        database_id:
          type: string
          description: Database UUID
        installation_id:
          type: string
          description: Installation UUID (if queued)
        status:
          type: string
          description: 'Status: pending or skipped'
        reason:
          type: string
          description: Skip reason (if skipped)
        existing_installation_id:
          type: string
          description: Existing installation ID (if skipped)
      required:
      - database_id
      - status
    BatchInstallRequest:
      type: object
      description: Request body for batch_install endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to install extension to
        extension_name:
          type: string
          default: ODataAutoConfig
          description: 'Extension name (default: ODataAutoConfig)'
        extension_path:
          type: string
          description: Path to extension file (optional)
      required:
      - database_ids
    BatchInstallResponse:
      type: object
      description: Response for batch_install endpoint.
      properties:
        batch_id:
          type: string
          description: Batch operation UUID
        total:
          type: integer
          description: Total number of databases in request
        queued:
          type: integer
          description: Number of installations queued
        skipped:
          type: integer
          description: Number of databases skipped
        installations:
          type: array
          items:
            $ref: '#/components/schemas/BatchInstallItem'
      required:
      - batch_id
      - installations
      - queued
      - skipped
      - total
    BatchOperation:
      type: object
      description: Serializer for BatchOperation model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        operation_type:
          $ref: '#/components/schemas/OperationTypeEnum'
        target_entity:
          type: string
          description: 1C entity name (e.g., Справочник_Пользователи)
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/BatchOperationStatusEnum'
          readOnly: true
        progress:
          type: integer
          readOnly: true
          description: Progress percentage (0-100)
        total_tasks:
          type: integer
          readOnly: true
          description: Total number of tasks
        completed_tasks:
          type: integer
          readOnly: true
          description: Number of completed tasks
        failed_tasks:
          type: integer
          readOnly: true
          description: Number of failed tasks
        payload:
          type: object
          additionalProperties: {}
          description: Operation payload/parameters
        config:
          type: object
          additionalProperties: {}
          description: Execution configuration (timeout, retries, etc.)
        task_id:
          type: string
          nullable: true
          maxLength: 255
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: string
          readOnly: true
        success_rate:
          type: string
          readOnly: true
        created_by:
          type: string
          description: User who created operation
          maxLength: 255
        metadata:
          type: object
          additionalProperties: {}
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        database_names:
          type: string
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - completed_tasks
      - created_at
      - database_names
      - duration_seconds
      - failed_tasks
      - id
      - name
      - operation_type
      - progress
      - status
      - success_rate
      - target_entity
      - tasks
      - total_tasks
      - updated_at
    BatchOperationStatusEnum:
      enum:
      - pending
      - queued
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `queued` - Queued
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    BulkHealthCheckRequest:
      type: object
      description: Request body for bulk_health_check endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to check
        cluster_id:
          type: string
          format: uuid
          description: Check all databases in this cluster
    BulkHealthCheckResponse:
      type: object
      description: Response for bulk_health_check endpoint.
      properties:
        results:
          type: array
          items:
