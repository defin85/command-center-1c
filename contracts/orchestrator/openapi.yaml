      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/delete-workflow/:
    post:
      operationId: v2_workflows_delete_workflow_create
      description: |-
        POST /api/v2/workflows/delete-workflow/

        Delete a workflow template (soft delete by default).

        Request Body:
            {
                "workflow_id": "uuid",
                "force": false
            }

        Response (200):
            {
                "workflow_id": "uuid",
                "deleted": true,
                "message": "Workflow deleted successfully"
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/execute-workflow/:
    post:
      operationId: v2_workflows_execute_workflow_create
      description: |-
        POST /api/v2/workflows/execute-workflow/

        Execute a workflow template.

        Request Body:
            {
                "workflow_id": "uuid",
                "input_context": {...},
                "mode": "async"  // "sync" or "async"
            }

        Response:
            {
                "execution_id": "uuid",
                "status": "pending|running",
                "mode": "async",
                "message": "Workflow execution started"
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/get-execution/:
    get:
      operationId: v2_workflows_get_execution_retrieve
      description: |-
        GET /api/v2/workflows/get-execution/?execution_id=X

        Get detailed information about a specific workflow execution.

        Query Parameters:
            - execution_id: Execution UUID (required)

        Response:
            {
                "execution": {...},
                "steps": [...]
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/get-execution-steps/:
    get:
      operationId: v2_workflows_get_execution_steps_retrieve
      description: |-
        GET /api/v2/workflows/get-execution-steps/?execution_id=X

        Get all step results for a workflow execution.

        Query Parameters:
            - execution_id: Execution UUID (required)
            - status: Filter by step status (optional)

        Response:
            {
                "steps": [...],
                "count": 5
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/get-workflow/:
    get:
      operationId: v2_workflows_get_workflow_retrieve
      description: |-
        GET /api/v2/workflows/get-workflow/?workflow_id=X

        Get detailed information about a specific workflow template.

        Query Parameters:
            - workflow_id: Workflow template UUID (required)
            - include_executions: Include recent executions (default: true)

        Response:
            {
                "workflow": {...},
                "executions": [...],
                "statistics": {
                    "total_executions": 100,
                    "successful": 90,
                    "failed": 10,
                    "average_duration": 120.5
                }
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/list-executions/:
    get:
      operationId: v2_workflows_list_executions_retrieve
      description: |-
        GET /api/v2/workflows/list-executions/

        List workflow executions with optional filtering.

        Query Parameters:
            - workflow_id: Filter by workflow template UUID (optional)
            - status: Filter by status (pending, running, completed, failed, cancelled)
            - limit: Maximum results (default: 50, max: 1000)
            - offset: Pagination offset (default: 0)

        Response:
            {
                "executions": [...],
                "count": 50,
                "total": 100
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/list-workflows/:
    get:
      operationId: v2_workflows_list_workflows_retrieve
      description: |-
        GET /api/v2/workflows/list-workflows/

        List all workflow templates with optional filtering.

        Query Parameters:
            - workflow_type: Filter by type (general, user_management, database_ops, etc.)
            - is_active: Filter by active status (true/false)
            - is_valid: Filter by valid status (true/false)
            - search: Search by name or description
            - limit: Maximum results (default: 50)
            - offset: Pagination offset (default: 0)

        Response:
            {
                "workflows": [...],
                "count": 50,
                "total": 100
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/update-workflow/:
    post:
      operationId: v2_workflows_update_workflow_create
      description: |-
        POST /api/v2/workflows/update-workflow/

        Update an existing workflow template.

        Request Body:
            {
                "workflow_id": "uuid",
                "name": "Updated Name",
                "description": "Updated description",
                "dag_structure": {...},
                "is_active": true
            }

        Response (200):
            {
                "workflow": {...},
                "updated_fields": [...],
                "message": "Workflow updated successfully"
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/workflows/validate-workflow/:
    post:
      operationId: v2_workflows_validate_workflow_create
      description: |-
        POST /api/v2/workflows/validate-workflow/

        Validate a workflow DAG structure.

        Request Body:
            {
                "workflow_id": "uuid"
            }
            OR
            {
                "dag_structure": {...}
            }

        Response (200):
            {
                "valid": true/false,
                "errors": [...],
                "warnings": [...],
                "metadata": {...}
            }
      tags:
      - v2
      security:
      - cookieAuth: []
      responses:
        '200':
          description: No response body
components:
  schemas:
    BatchOperation:
      type: object
      description: Serializer for BatchOperation model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        operation_type:
          $ref: '#/components/schemas/OperationTypeEnum'
        target_entity:
          type: string
          description: 1C entity name (e.g., Справочник_Пользователи)
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/BatchOperationStatusEnum'
          readOnly: true
        progress:
          type: integer
          readOnly: true
          description: Progress percentage (0-100)
        total_tasks:
          type: integer
          readOnly: true
          description: Total number of tasks
        completed_tasks:
          type: integer
          readOnly: true
          description: Number of completed tasks
        failed_tasks:
          type: integer
          readOnly: true
          description: Number of failed tasks
        payload:
          type: object
          additionalProperties: {}
          description: Operation payload/parameters
        config:
          type: object
          additionalProperties: {}
          description: Execution configuration (timeout, retries, etc.)
        celery_task_id:
          type: string
          nullable: true
          maxLength: 255
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: string
          readOnly: true
        success_rate:
          type: string
          readOnly: true
        created_by:
          type: string
          description: User who created operation
          maxLength: 255
        metadata:
          type: object
          additionalProperties: {}
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        database_names:
          type: string
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - completed_tasks
      - created_at
      - database_names
      - duration_seconds
      - failed_tasks
      - id
      - name
      - operation_type
      - progress
      - status
      - success_rate
      - target_entity
      - tasks
      - total_tasks
      - updated_at
    BatchOperationStatusEnum:
      enum:
      - pending
      - queued
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `queued` - Queued
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    Cluster:
      type: object
      description: Serializer для Cluster model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Cluster UUID (auto-generated or from 1C)
        name:
          type: string
          description: Cluster name from 1C
          maxLength: 255
        description:
          type: string
          description: Optional description
        ras_server:
          type: string
          description: RAS server address (host:port)
          maxLength: 255
        cluster_service_url:
          type: string
          format: uri
          description: URL of installation-service managing this cluster
          maxLength: 512
        cluster_user:
          type: string
          description: Cluster admin username (if required)
          maxLength: 255
        cluster_pwd:
          type: string
          writeOnly: true
        status:
          $ref: '#/components/schemas/StatusD4eEnum'
        status_display:
          type: string
          readOnly: true
        last_sync:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last sync timestamp
        metadata:
          type: object
          additionalProperties: {}
          description: Additional cluster metadata
        databases_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cluster_service_url
      - created_at
      - databases_count
      - id
      - last_sync
      - name
      - status_display
      - updated_at
    CustomTokenObtainPair:
      type: object
      description: |-
        Custom TokenObtainPairSerializer that adds username and roles to JWT claims.

        Go API Gateway expects:
        - user_id: string (Django sends int, we convert)
        - username: string
        - roles: []string

        This ensures compatibility between Django-generated tokens and Go JWT validation.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    DAGStructure:
      type: object
      description: Serializer for DAGStructure Pydantic model.
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
          description: List of workflow nodes
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
          description: List of directed edges
      required:
      - nodes
    Database:
