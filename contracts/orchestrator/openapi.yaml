        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
    delete:
      operationId: v2_clusters_delete_cluster_destroy
      description: Delete a cluster. Use force=true to delete cluster with existing databases.
      summary: Delete cluster
      parameters:
        - in: query
          name: cluster_id
          schema:
            type: string
          description: Cluster UUID (can also be in request body)
        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
