              `unblock_sessions`, `terminate_sessions`
            - OData: `create`, `update`, `delete`, `query`
            - CLI: `designer_cli`

            **Config notes:**
            - RAS block_sessions: `message`, `permission_code`, `denied_from`, `denied_to`, `parameter`
            - OData query: `entity`, `filter`, `select`, `top`, `skip`
