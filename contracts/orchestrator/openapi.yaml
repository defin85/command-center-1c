    WorkflowExecutionList:
      type: object
      description: |-
        Lightweight serializer for WorkflowExecution list view.

        Excludes step_results and detailed node_statuses for performance.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        workflow_template:
          type: string
          format: uuid
          readOnly: true
        template_name:
          type: string
          readOnly: true
        template_version:
          type: integer
          readOnly: true
        status:
          allOf:
          - $ref: '#/components/schemas/OperationStatusEnum'
          readOnly: true
          description: |-
            Current execution status (FSM-protected)

            * `pending` - Pending
            * `running` - Running
            * `completed` - Completed
            * `failed` - Failed
            * `cancelled` - Cancelled
        progress_percent:
          type: string
          format: decimal
          pattern: ^-?\d{0,3}(?:\.\d{0,2})?$
          readOnly: true
        current_node_id:
          type: string
          readOnly: true
          description: Currently executing node ID
        error_message:
          type: string
          readOnly: true
          description: Error message if failed
        error_node_id:
          type: string
          readOnly: true
          description: Node ID where error occurred
        trace_id:
          type: string
          readOnly: true
          description: OpenTelemetry trace ID (hex)
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration:
          type: number
          format: double
          readOnly: true
      required:
      - completed_at
      - current_node_id
      - duration
      - error_message
      - error_node_id
      - id
      - progress_percent
      - started_at
      - status
      - template_name
      - template_version
      - trace_id
      - workflow_template
    WorkflowListResponse:
      type: object
      description: Response for list_workflows endpoint.
      properties:
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTemplateList'
        count:
          type: integer
          description: Number of workflows in current page
        total:
          type: integer
          description: Total number of workflows
      required:
      - count
      - total
      - workflows
    WorkflowNode:
      type: object
      description: Serializer for WorkflowNode Pydantic model.
      properties:
        id:
          type: string
          description: Unique node identifier
          maxLength: 100
          minLength: 1
        name:
          type: string
          description: Human-readable name
          maxLength: 200
          minLength: 1
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          description: |-
            Node type

            * `operation` - operation
            * `condition` - condition
            * `parallel` - parallel
            * `loop` - loop
            * `subworkflow` - subworkflow
        template_id:
          type: string
          nullable: true
          description: Template ID for Operation nodes
        config:
          $ref: '#/components/schemas/NodeConfig'
        parallel_config:
          allOf:
          - $ref: '#/components/schemas/ParallelConfig'
          nullable: true
        loop_config:
          allOf:
          - $ref: '#/components/schemas/LoopConfig'
          nullable: true
        subworkflow_config:
          allOf:
          - $ref: '#/components/schemas/SubWorkflowConfig'
