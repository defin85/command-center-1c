      - trace_id
      - workflow_template
    WorkflowListResponse:
      type: object
      description: Response for list_workflows endpoint.
      properties:
        workflows:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowTemplateList'
        count:
          type: integer
          description: Number of workflows in current page
        total:
          type: integer
          description: Total number of workflows
      required:
      - count
      - total
      - workflows
    WorkflowNode:
      type: object
      description: Serializer for WorkflowNode Pydantic model.
      properties:
        id:
          type: string
          description: Unique node identifier
          maxLength: 100
          minLength: 1
        name:
          type: string
          description: Human-readable name
          maxLength: 200
          minLength: 1
        type:
          allOf:
          - $ref: '#/components/schemas/TypeEnum'
          description: |-
            Node type

            * `operation` - operation
            * `condition` - condition
            * `parallel` - parallel
            * `loop` - loop
            * `subworkflow` - subworkflow
        template_id:
          type: string
          nullable: true
          description: Template ID for Operation nodes
        config:
          $ref: '#/components/schemas/NodeConfig'
        parallel_config:
          allOf:
          - $ref: '#/components/schemas/ParallelConfig'
          nullable: true
        loop_config:
          allOf:
          - $ref: '#/components/schemas/LoopConfig'
          nullable: true
        subworkflow_config:
          allOf:
          - $ref: '#/components/schemas/SubWorkflowConfig'
          nullable: true
      required:
      - id
      - name
      - type
    WorkflowStatistics:
      type: object
      description: Statistics for a workflow template.
      properties:
        total_executions:
          type: integer
        successful:
          type: integer
        failed:
          type: integer
        cancelled:
          type: integer
        running:
          type: integer
        average_duration:
          type: number
          format: double
          nullable: true
      required:
      - average_duration
      - cancelled
      - failed
      - running
      - successful
      - total_executions
    WorkflowStepResult:
      type: object
      description: Serializer for WorkflowStepResult model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        node_id:
          type: string
          readOnly: true
          description: Node ID from DAG structure
        node_name:
          type: string
          readOnly: true
          description: Human-readable node name
        node_type:
          type: string
          readOnly: true
          description: Node type (operation/condition/etc)
        status:
          allOf:
          - $ref: '#/components/schemas/WorkflowStepResultStatusEnum'
          readOnly: true
        input_data:
          type: object
          additionalProperties: {}
          readOnly: true
          description: Input data for this node
        output_data:
          type: object
          additionalProperties: {}
          readOnly: true
          nullable: true
          description: Output data from this node
        error_message:
          type: string
          readOnly: true
          description: Error message if failed
        started_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        completed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        duration_seconds:
          type: number
          format: double
          readOnly: true
        trace_id:
          type: string
          readOnly: true
          description: OpenTelemetry trace ID (hex)
        span_id:
          type: string
          readOnly: true
          description: OpenTelemetry span ID (hex)
      required:
      - completed_at
      - duration_seconds
      - error_message
      - id
      - input_data
      - node_id
      - node_name
      - node_type
      - output_data
      - span_id
      - started_at
      - status
      - trace_id
    WorkflowStepResultStatusEnum:
      enum:
      - pending
      - running
      - completed
      - failed
      - skipped
      type: string
      description: |-
        * `pending` - Pending
        * `running` - Running
        * `completed` - Completed
        * `failed` - Failed
        * `skipped` - Skipped
    WorkflowTemplateDetail:
      type: object
      description: |-
        Full serializer for WorkflowTemplate detail view.

        Includes dag_structure and config.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Workflow template name
          maxLength: 200
        description:
          type: string
          description: Workflow description
        workflow_type:
          allOf:
          - $ref: '#/components/schemas/WorkflowTypeEnum'
          description: |-
            Workflow type: sequential, conditional, parallel, complex

            * `sequential` - Sequential
            * `conditional` - Conditional
            * `parallel` - Parallel
            * `complex` - Complex
        dag_structure:
          $ref: '#/components/schemas/DAGStructure'
        config:
          $ref: '#/components/schemas/WorkflowConfig'
        is_valid:
          type: boolean
          readOnly: true
          description: DAG structure is valid (cycles checked)
        is_active:
          type: boolean
          description: Template is active and can be executed
        version_number:
          type: integer
          readOnly: true
          description: Version number (auto-incremented)
        parent_version:
          type: string
          format: uuid
          nullable: true
          description: Parent template if this is a new version
        parent_version_name:
          type: string
          readOnly: true
          nullable: true
        created_by:
          type: integer
          nullable: true
        created_by_username:
          type: string
          readOnly: true
          nullable: true
        execution_count:
          type: integer
          description: Return number of executions for this template.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by_username
      - dag_structure
      - execution_count
      - id
      - is_valid
      - name
      - parent_version_name
      - updated_at
      - version_number
    WorkflowTemplateList:
      type: object
      description: |-
        Lightweight serializer for WorkflowTemplate list view.

        Excludes dag_structure for performance in list endpoints.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        name:
          type: string
          description: Workflow template name
          maxLength: 200
        description:
          type: string
          description: Workflow description
        workflow_type:
          allOf:
          - $ref: '#/components/schemas/WorkflowTypeEnum'
          description: |-
            Workflow type: sequential, conditional, parallel, complex

            * `sequential` - Sequential
            * `conditional` - Conditional
            * `parallel` - Parallel
            * `complex` - Complex
        is_valid:
          type: boolean
          readOnly: true
          description: DAG structure is valid (cycles checked)
        is_active:
          type: boolean
          description: Template is active and can be executed
        version_number:
          type: integer
          readOnly: true
          description: Version number (auto-incremented)
        parent_version:
          type: string
          format: uuid
          nullable: true
          description: Parent template if this is a new version
        created_by:
          type: integer
          nullable: true
        created_by_username:
          type: string
          readOnly: true
          nullable: true
        node_count:
          type: integer
          description: Return number of nodes in DAG.
          readOnly: true
        execution_count:
          type: integer
          description: |-
            Return number of executions for this template.

            Uses annotated _execution_count from ViewSet queryset to avoid N+1 queries.
            Falls back to count() query if annotation is not present.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - created_at
      - created_by_username
      - execution_count
      - id
      - is_valid
      - name
      - node_count
      - updated_at
      - version_number
    WorkflowTypeEnum:
      enum:
      - sequential
      - conditional
      - parallel
      - complex
      type: string
      description: |-
        * `sequential` - Sequential
        * `conditional` - Conditional
        * `parallel` - Parallel
        * `complex` - Complex
    WorkflowUpdateResponse:
      type: object
      description: Response for update_workflow endpoint.
      properties:
