              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/workflows/validate-workflow/:
    post:
      operationId: v2_workflows_validate_workflow_create
      description: Validate a workflow DAG structure. Can validate by workflow_id
        or by providing dag_structure directly.
      summary: Validate workflow DAG
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ValidateWorkflowRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ValidateWorkflowRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ValidateWorkflowRequest'
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/WorkflowValidateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
components:
  schemas:
    BatchInstallItem:
      type: object
      description: Single item in batch installation result.
      properties:
        database_id:
          type: string
          description: Database UUID
        installation_id:
          type: string
          description: Installation UUID (if queued)
        status:
          type: string
          description: 'Status: pending or skipped'
        reason:
          type: string
          description: Skip reason (if skipped)
        existing_installation_id:
          type: string
          description: Existing installation ID (if skipped)
      required:
      - database_id
      - status
    BatchInstallRequest:
      type: object
      description: Request body for batch_install endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to install extension to
        extension_name:
          type: string
          default: ODataAutoConfig
          description: 'Extension name (default: ODataAutoConfig)'
        extension_path:
          type: string
          description: Path to extension file (optional)
      required:
      - database_ids
    BatchInstallResponse:
      type: object
      description: Response for batch_install endpoint.
      properties:
        batch_id:
          type: string
          description: Batch operation UUID
        total:
          type: integer
          description: Total number of databases in request
        queued:
          type: integer
          description: Number of installations queued
        skipped:
          type: integer
          description: Number of databases skipped
        installations:
          type: array
          items:
            $ref: '#/components/schemas/BatchInstallItem'
      required:
      - batch_id
      - installations
      - queued
      - skipped
      - total
    BatchOperation:
      type: object
      description: Serializer for BatchOperation model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        operation_type:
          $ref: '#/components/schemas/BatchOperationOperationTypeEnum'
        target_entity:
          type: string
          description: 1C entity name (e.g., Справочник_Пользователи)
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/BatchOperationStatusEnum'
          readOnly: true
        progress:
          type: integer
          readOnly: true
          description: Progress percentage (0-100)
        total_tasks:
          type: integer
          readOnly: true
          description: Total number of tasks
        completed_tasks:
          type: integer
          readOnly: true
          description: Number of completed tasks
        failed_tasks:
          type: integer
          readOnly: true
          description: Number of failed tasks
        payload:
          type: object
          additionalProperties: {}
          description: Operation payload/parameters
        config:
          type: object
          additionalProperties: {}
          description: Execution configuration (timeout, retries, etc.)
        task_id:
          type: string
          nullable: true
          maxLength: 255
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: string
          readOnly: true
        success_rate:
          type: string
          readOnly: true
        created_by:
          type: string
          description: User who created operation
          maxLength: 255
        metadata:
          type: object
          additionalProperties: {}
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        database_names:
          type: string
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - completed_tasks
      - created_at
      - database_names
      - duration_seconds
      - failed_tasks
      - id
      - name
      - operation_type
      - progress
      - status
      - success_rate
      - target_entity
      - tasks
      - total_tasks
      - updated_at
    BatchOperationOperationTypeEnum:
      enum:
      - create
      - update
      - delete
      - query
      - install_extension
      - lock_scheduled_jobs
      - unlock_scheduled_jobs
      - terminate_sessions
      - block_sessions
      - unblock_sessions
      - sync_cluster
      - discover_clusters
      type: string
      description: |-
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `query` - Query
        * `install_extension` - Install Extension
        * `lock_scheduled_jobs` - Lock Scheduled Jobs
        * `unlock_scheduled_jobs` - Unlock Scheduled Jobs
        * `terminate_sessions` - Terminate Sessions
        * `block_sessions` - Block Sessions
        * `unblock_sessions` - Unblock Sessions
        * `sync_cluster` - Sync Cluster
        * `discover_clusters` - Discover Clusters
    BatchOperationStatusEnum:
      enum:
      - pending
      - queued
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `queued` - Queued
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    BulkHealthCheckRequest:
      type: object
      description: Request body for bulk_health_check endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to check
        cluster_id:
          type: string
          format: uuid
          description: Check all databases in this cluster
    BulkHealthCheckResponse:
      type: object
      description: Response for bulk_health_check endpoint.
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckResult'
        summary:
          $ref: '#/components/schemas/HealthCheckSummary'
      required:
      - results
      - summary
    CancelOperationRequest:
      type: object
      description: Request body for cancel_operation endpoint.
      properties:
        operation_id:
          type: string
          description: ID of the operation to cancel (UUID)
      required:
      - operation_id
    CloneWorkflowRequest:
      type: object
      description: Request for clone_workflow endpoint.
      properties:
        workflow_id:
          type: string
          format: uuid
        new_name:
          type: string
          maxLength: 200
      required:
      - workflow_id
    Cluster:
      type: object
      description: Serializer для Cluster model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Cluster UUID (auto-generated or from 1C)
        name:
          type: string
          description: Cluster name from 1C
          maxLength: 255
        description:
          type: string
          description: Optional description
        ras_server:
          type: string
          description: RAS server address (host:port)
          maxLength: 255
        cluster_service_url:
          type: string
          format: uri
          description: URL of installation-service managing this cluster
          maxLength: 512
        cluster_user:
          type: string
          description: Cluster admin username (if required)
          maxLength: 255
        cluster_pwd:
          type: string
          writeOnly: true
        status:
          $ref: '#/components/schemas/StatusD4eEnum'
        status_display:
          type: string
          readOnly: true
        last_sync:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last sync timestamp
        metadata:
          type: object
          additionalProperties: {}
          description: Additional cluster metadata
        databases_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cluster_service_url
      - created_at
      - databases_count
      - id
      - last_sync
      - name
      - status_display
      - updated_at
    ClusterCreateResponse:
      type: object
      description: Response for create_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        message:
          type: string
      required:
      - cluster
      - message
    ClusterDatabasesResponse:
      type: object
      description: Response for get_cluster_databases endpoint.
      properties:
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
        count:
          type: integer
        filters:
          $ref: '#/components/schemas/ClusterFilters'
      required:
      - cluster_id
      - cluster_name
      - count
      - databases
      - filters
    ClusterDeleteResponse:
      type: object
      description: Response for delete_cluster endpoint.
      properties:
        message:
          type: string
        cluster_id:
          type: string
          format: uuid
      required:
      - cluster_id
      - message
    ClusterDetailResponse:
      type: object
      description: Response for get_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
        statistics:
          $ref: '#/components/schemas/ClusterStatistics'
      required:
      - cluster
      - databases
      - statistics
    ClusterFilters:
      type: object
      description: Applied filters.
      properties:
        status:
          type: string
        health_status:
          type: string
    ClusterListResponse:
      type: object
      description: Response for list_clusters endpoint.
      properties:
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
        count:
          type: integer
          description: Total number of clusters
      required:
      - clusters
      - count
    ClusterPermission:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/UserRef'
        cluster:
          $ref: '#/components/schemas/ClusterRef'
        level:
          type: string
        granted_by:
          allOf:
          - $ref: '#/components/schemas/UserRef'
          nullable: true
        granted_at:
          type: string
          format: date-time
        notes:
          type: string
      required:
      - cluster
      - granted_at
      - granted_by
      - level
      - user
    ClusterPermissionListResponse:
      type: object
      properties:
        permissions:
          type: array
          items:
            $ref: '#/components/schemas/ClusterPermission'
        count:
          type: integer
        total:
          type: integer
      required:
      - count
      - permissions
      - total
    ClusterPermissionUpsertResponse:
      type: object
      properties:
        created:
          type: boolean
        permission:
          $ref: '#/components/schemas/ClusterPermission'
      required:
      - created
      - permission
    ClusterRef:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
      required:
      - id
      - name
    ClusterStatistics:
      type: object
      description: Statistics for a cluster.
      properties:
        total_databases:
          type: integer
        healthy_databases:
          type: integer
        databases_by_status:
          type: object
          additionalProperties:
            type: integer
      required:
      - databases_by_status
      - healthy_databases
      - total_databases
    ClusterSyncResponse:
      type: object
      description: Response for sync_cluster endpoint.
      properties:
        cluster_id:
          type: string
          format: uuid
        operation_id:
          type: string
          description: BatchOperation ID for tracking
        status:
          type: string
          description: 'Sync status: syncing, success'
        task_id:
          type: string
          description: Task ID (if async)
        message:
          type: string
        databases_found:
          type: integer
        created:
          type: integer
        updated:
          type: integer
        errors:
          type: array
          items:
            type: string
      required:
      - cluster_id
      - message
      - status
    ClusterUpdateResponse:
      type: object
      description: Response for update_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        message:
          type: string
      required:
      - cluster
      - message
    CreateWorkflowRequest:
      type: object
      description: Request for create_workflow endpoint.
      properties:
        name:
          type: string
          maxLength: 200
        description:
          type: string
          default: ''
        workflow_type:
          type: string
          default: general
        dag_structure:
          type: object
          additionalProperties: {}
          description: DAG structure with nodes and edges
        is_active:
          type: boolean
          default: true
      required:
      - dag_structure
      - name
    CurrentUser:
      type: object
      description: Minimal identity payload for SPA.
      properties:
        id:
          type: integer
        username:
          type: string
        is_staff:
          type: boolean
        is_superuser:
          type: boolean
      required:
      - id
      - is_staff
      - is_superuser
      - username
    CustomTokenObtainPair:
      type: object
      description: |-
        Custom TokenObtainPairSerializer that adds username and roles to JWT claims.

        Go API Gateway expects:
        - user_id: string (Django sends int, we convert)
        - username: string
        - roles: []string

        This ensures compatibility between Django-generated tokens and Go JWT validation.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
      - password
      - username
    DAGStructure:
      type: object
      description: Serializer for DAGStructure Pydantic model.
      properties:
        nodes:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowNode'
          description: List of workflow nodes
        edges:
          type: array
          items:
            $ref: '#/components/schemas/WorkflowEdge'
          description: List of directed edges
      required:
      - nodes
    DLQListResponse:
      type: object
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/DLQMessage'
        count:
          type: integer
        total:
          type: integer
      required:
      - count
      - messages
      - total
    DLQMessage:
      type: object
      properties:
        dlq_message_id:
          type: string
          description: Redis Stream entry ID
        original_message_id:
          type: string
        correlation_id:
          type: string
        operation_id:
          type: string
        event_type:
          type: string
        error_code:
          type: string
        error_message:
          type: string
        worker_id:
          type: string
        failed_at:
          type: string
      required:
      - dlq_message_id
    DLQRetryRequest:
      type: object
      properties:
        original_message_id:
          type: string
        operation_id:
          type: string
        reason:
          type: string
    DLQRetryResponse:
      type: object
      properties:
        enqueued:
          type: boolean
        operation_id:
          type: string
        message:
          type: string
      required:
      - enqueued
      - message
    Database:
      type: object
      description: Serializer для Database model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        host:
          type: string
          maxLength: 255
        port:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
        base_name:
          type: string
          description: Infobase name from 1C cluster
          maxLength: 255
        odata_url:
          type: string
          format: uri
          maxLength: 512
        username:
          type: string
          maxLength: 255
        password:
          type: string
          writeOnly: true
        server_address:
          type: string
          description: 'Адрес сервера 1С (например: localhost, srv1c, 192.168.1.100)'
          maxLength: 255
        server_port:
          type: integer
          maximum: 2147483647
          minimum: -2147483648
          description: Порт сервера 1С (обычно 1540 или 1541)
        infobase_name:
          type: string
          description: Имя информационной базы на сервере 1С (если отличается от name)
          maxLength: 255
        status:
          $ref: '#/components/schemas/StatusD4eEnum'
        status_display:
          type: string
          readOnly: true
        version:
          type: string
          maxLength: 50
        last_check:
          type: string
          format: date-time
