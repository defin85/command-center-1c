openapi: 3.0.3
info:
  title: CommandCenter1C API
  version: 1.0.0
  description: API для управления операциями в 700+ базах 1С
paths:
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Custom TokenObtainPairView that uses CustomTokenObtainPairSerializer.

        Generates JWT tokens with custom claims (username, roles) compatible
        with Go API Gateway authentication middleware.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/token/verify/:
    post:
      operationId: token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v2/artifacts/:
    get:
      operationId: v2_artifacts_retrieve
      summary: List artifacts
      parameters:
      - in: query
        name: kind
        schema:
          type: string
      - in: query
        name: name
        schema:
          type: string
      - in: query
        name: tag
        schema:
          type: string
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/:
    delete:
      operationId: v2_artifacts_destroy
      summary: Delete artifact (soft)
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/artifacts/{artifact_id}/aliases/:
    get:
      operationId: v2_artifacts_aliases_retrieve
      summary: List artifact aliases
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactAliasListResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/aliases/upsert/:
    post:
      operationId: v2_artifacts_aliases_upsert_create
      summary: Upsert artifact alias
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactAliasUpsertRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArtifactAliasUpsertRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtifactAliasUpsertRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactAlias'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/restore/:
    post:
      operationId: v2_artifacts_restore_create
      summary: Restore artifact
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Artifact'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/artifacts/{artifact_id}/versions/:
    get:
      operationId: v2_artifacts_versions_retrieve
      summary: List artifact versions
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersionListResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/versions/{version}/download/:
    get:
      operationId: v2_artifacts_versions_download_retrieve
      summary: Download artifact version
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      - in: path
        name: version
        schema:
          type: string
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: File download
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/versions/upload/:
    post:
      operationId: v2_artifacts_versions_upload_create
      summary: Upload artifact version
      parameters:
      - in: path
        name: artifact_id
        schema:
          type: string
          format: uuid
        required: true
      tags:
      - v2
      requestBody:
        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtifactVersionUploadRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersion'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/artifacts/create/:
    post:
      operationId: v2_artifacts_create_create
      summary: Create artifact
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/audit/log-compensation/:
    post:
      operationId: v2_audit_log_compensation_create
      description: |-
        POST /api/v2/audit/log-compensation/

        Internal endpoint for Go Worker to log compensation results.

        Request body:
        {
            "operation_id": "op-123",
            "results": [
                {
                    "name": "unlock_infobase",
                    "success": true,
                    "attempts": 2,
                    "total_duration": 3.5,
                    "error": "",
                    "executed_at": "2025-11-28T12:00:00Z"
                }
            ]
        }
      summary: Log compensation results
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompensationLogRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CompensationLogRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CompensationLogRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompensationLogResponse'
          description: ''
        '400':
          description: Bad request
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          description: Internal server error
  /api/v2/clusters/create-cluster/:
    post:
      operationId: v2_clusters_create_cluster_create
      description: Create a new cluster. Requires name, ras_server, and cluster_service_url.
      summary: Create a new cluster
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/delete-cluster/:
    post:
      operationId: v2_clusters_delete_cluster_create
      description: Delete a cluster. Use force=true to delete cluster with existing
        databases.
      summary: Delete cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDeleteResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
    delete:
      operationId: v2_clusters_delete_cluster_destroy
      description: Delete a cluster. Use force=true to delete cluster with existing
        databases.
      summary: Delete cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDeleteResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/discover-clusters/:
    post:
      operationId: v2_clusters_discover_clusters_create
      description: Trigger cluster discovery on a RAS server. Creates or updates Cluster
        records for all found clusters.
      summary: Discover clusters on RAS server
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverClustersResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/get-cluster/:
    get:
      operationId: v2_clusters_get_cluster_retrieve
      description: Get detailed information about a specific cluster including databases
        and statistics.
      summary: Get cluster details
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/get-cluster-databases/:
    get:
      operationId: v2_clusters_get_cluster_databases_retrieve
      description: Get all databases for a specific cluster with optional filtering
        by status.
      summary: Get cluster databases
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID
        required: true
      - in: query
        name: health_status
        schema:
          type: string
        description: Filter by health check status
      - in: query
        name: status
        schema:
          type: string
        description: Filter by database status
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDatabasesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/list-clusters/:
    get:
      operationId: v2_clusters_list_clusters_retrieve
      description: List all clusters with database counts. Supports filtering by status
        and RAS server.
      summary: List all clusters
      parameters:
      - in: query
        name: filters
        schema:
          type: string
        description: JSON object with filter conditions
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Maximum results (default: 100, max: 1000)'
      - in: query
        name: offset
        schema:
          type: integer
        description: 'Pagination offset (default: 0)'
      - in: query
        name: ras_server
        schema:
          type: string
        description: Filter by RAS server address
      - in: query
        name: search
        schema:
          type: string
        description: Search by name or RAS server
      - in: query
        name: sort
        schema:
          type: string
        description: JSON object with sort configuration
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (active, inactive, error, maintenance)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterListResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/clusters/reset-sync-status/:
    post:
      operationId: v2_clusters_reset_sync_status_create
      description: Reset sync status for stuck clusters (pending -> failed). Can reset
        a specific cluster or all stuck clusters.
      summary: Reset sync status
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (optional, resets specific cluster)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetSyncStatusRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ResetSyncStatusRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ResetSyncStatusRequest'
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetSyncStatusResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/sync-cluster/:
    post:
      operationId: v2_clusters_sync_cluster_create
      description: Trigger synchronization of a cluster with RAS. The sync runs asynchronously
        via Celery if available.
      summary: Sync cluster with RAS
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterSyncResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/update-cluster/:
    post:
      operationId: v2_clusters_update_cluster_create
      description: Update cluster information. Supports partial updates.
      summary: Update cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
    put:
      operationId: v2_clusters_update_cluster_update
      description: Update cluster information. Supports partial updates.
      summary: Update cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/update-credentials/:
    post:
      operationId: v2_clusters_update_credentials_create
      description: Set or reset cluster admin credentials.
      summary: Update cluster credentials
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClusterCredentialsUpdateRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ClusterCredentialsUpdateRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ClusterCredentialsUpdateRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterCredentialsUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
