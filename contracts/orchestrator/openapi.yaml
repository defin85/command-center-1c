openapi: 3.0.3
info:
  title: CommandCenter1C API
  version: 1.0.0
  description: API для управления операциями в 700+ базах 1С
paths:
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Custom TokenObtainPairView that uses CustomTokenObtainPairSerializer.

        Generates JWT tokens with custom claims (username, roles) compatible
        with Go API Gateway authentication middleware.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/token/verify/:
    post:
      operationId: token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v1/clusters/:
    get:
      operationId: v1_clusters_list
      description: |-
        ViewSet для управления кластерами 1С.

        Endpoints:
        - GET /api/v1/clusters/ - список кластеров
        - POST /api/v1/clusters/ - создать кластер
        - GET /api/v1/clusters/{id}/ - получить кластер
        - PUT/PATCH /api/v1/clusters/{id}/ - обновить кластер
        - DELETE /api/v1/clusters/{id}/ - удалить кластер
        - POST /api/v1/clusters/{id}/sync/ - синхронизировать с RAS
        - GET /api/v1/clusters/{id}/databases/ - базы конкретного кластера
      parameters:
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - error
          - inactive
          - maintenance
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `error` - Error
          * `maintenance` - Maintenance
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedClusterList'
          description: ''
    post:
      operationId: v1_clusters_create
      description: |-
        ViewSet для управления кластерами 1С.

        Endpoints:
        - GET /api/v1/clusters/ - список кластеров
        - POST /api/v1/clusters/ - создать кластер
        - GET /api/v1/clusters/{id}/ - получить кластер
        - PUT/PATCH /api/v1/clusters/{id}/ - обновить кластер
        - DELETE /api/v1/clusters/{id}/ - удалить кластер
        - POST /api/v1/clusters/{id}/sync/ - синхронизировать с RAS
        - GET /api/v1/clusters/{id}/databases/ - базы конкретного кластера
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
          description: ''
  /api/v1/clusters/{id}/:
    get:
      operationId: v1_clusters_retrieve
      description: |-
        ViewSet для управления кластерами 1С.

