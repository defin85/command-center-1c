  /api/v2/operations/execute/:
    post:
      operationId: v2_operations_execute_create
      description: "\n    Queue an operation for execution on selected databases.\n\
        \n    **Supported operation types:**\n    - RAS: `lock_scheduled_jobs`, `unlock_scheduled_jobs`,\
        \ `block_sessions`,\n      `unblock_sessions`, `terminate_sessions`\n    -\
        \ OData: `create`, `update`, `delete`, `query`\n    - CLI: `install_extension`,\
        \ `remove_extension`, `config_update`, `config_load`, `config_dump`\n    -\
        \ IBCMD: `ibcmd_backup`, `ibcmd_restore`, `ibcmd_replicate`, `ibcmd_create`\n\
        \n    **Config notes:**\n    - RAS block_sessions: `message`, `permission_code`,\
        \ `denied_from`, `denied_to`, `parameter`\n    - OData query: `entity`, `filter`,\
        \ `select`, `top`, `skip`\n    - OData update/delete: `entity`, `entity_id`\n\
        \    - CLI install_extension: `artifact_id` + (`artifact_version` or `artifact_alias`)\n\
        \      or legacy `extension_filename` / `extension_path` + `extension_name`\n\
        \    - CLI operations: driver-specific fields (e.g. `extension_name`, `source_path`,\
        \ `target_path`)\n    "
      summary: Execute RAS operation
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteOperationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationErrorResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/operations/execute-ibcmd/:
    post:
