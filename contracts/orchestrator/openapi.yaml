          type: string
          readOnly: true
          nullable: true
        created_by:
          type: integer
          nullable: true
        created_by_username:
          type: string
          readOnly: true
          nullable: true
        execution_count:
          type: integer
          description: Return number of executions for this template.
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
