          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ArtifactAliasUpsertRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtifactAliasUpsertRequest'
        required: true
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactAlias'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
