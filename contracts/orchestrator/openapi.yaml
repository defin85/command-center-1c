              $ref: '#/components/schemas/ArtifactCreateRequest'
        required: true
      security:
        - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: Conflict
      parameters:
        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tenant context selector. If omitted, tenant is resolved via user preference or first membership. For staff users, omission may return cross-tenant results on some endpoints.
  /api/v2/artifacts/purge-jobs/{job_id}/:
