openapi: 3.0.3
info:
  title: CommandCenter1C API
  version: 1.0.0
  description: API для управления операциями в 700+ базах 1С
paths:
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Custom TokenObtainPairView that uses CustomTokenObtainPairSerializer.

        Generates JWT tokens with custom claims (username, roles) compatible
        with Go API Gateway authentication middleware.
      tags:
        - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
        - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/token/verify/:
    post:
      operationId: token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
        - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v2/artifacts/:
    get:
      operationId: v2_artifacts_retrieve
      summary: List artifacts
      parameters:
        - in: query
          name: kind
          schema:
            type: string
        - in: query
          name: name
          schema:
            type: string
        - in: query
          name: tag
          schema:
            type: string
        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tenant context selector. If omitted, tenant is resolved via user preference or first membership. For staff users, omission may return cross-tenant results on some endpoints.
      tags:
        - v2
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactListResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/:
    delete:
      operationId: v2_artifacts_destroy
      summary: Delete artifact (soft)
      parameters:
        - in: path
          name: artifact_id
          schema:
            type: string
            format: uuid
          required: true
        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tenant context selector. If omitted, tenant is resolved via user preference or first membership. For staff users, omission may return cross-tenant results on some endpoints.
      tags:
        - v2
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Deleted
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
