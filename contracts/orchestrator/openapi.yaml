      description: "\n    Get the execution timeline for an operation.\n\n    **Authentication:**\
        \ Requires valid JWT token.\n\n    **Authorization:** User must own the operation\
        \ (created_by matches username)\n    or be a superuser.\n\n    **Response\
        \ format:**\n    - Timeline events are sorted chronologically (ascending)\n\
        \    - Each event includes timestamp, event name, service, and optional metadata\n\
        \    - Duration is calculated from first to last event (null if < 2 events)\n\
        \n    **Graceful degradation:**\n    - If Redis is unavailable, returns empty\
        \ timeline (not 500 error)\n    "
      summary: Get operation timeline
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GetOperationTimelineRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/GetOperationTimelineRequest'
