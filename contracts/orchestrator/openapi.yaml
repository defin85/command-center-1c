openapi: 3.0.3
info:
  title: CommandCenter1C API
  version: 1.0.0
  description: API для управления операциями в 700+ базах 1С
paths:
  /api/token/:
    post:
      operationId: token_create
      description: |-
        Custom TokenObtainPairView that uses CustomTokenObtainPairSerializer.

        Generates JWT tokens with custom claims (username, roles) compatible
        with Go API Gateway authentication middleware.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/CustomTokenObtainPair'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CustomTokenObtainPair'
          description: ''
  /api/token/refresh/:
    post:
      operationId: token_refresh_create
      description: |-
        Takes a refresh type JSON web token and returns an access type JSON web
        token if the refresh token is valid.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenRefresh'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenRefresh'
          description: ''
  /api/token/verify/:
    post:
      operationId: token_verify_create
      description: |-
        Takes a token and indicates if it is valid.  This view provides no
        information about a token's fitness for a particular use.
      tags:
      - token
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenVerify'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/TokenVerify'
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenVerify'
          description: ''
  /api/v2/audit/log-compensation/:
    post:
      operationId: v2_audit_log_compensation_create
      description: |-
        POST /api/v2/audit/log-compensation/

        Internal endpoint for Go Worker to log compensation results.

        Request body:
        {
            "operation_id": "op-123",
            "results": [
                {
                    "name": "unlock_infobase",
                    "success": true,
                    "attempts": 2,
                    "total_duration": 3.5,
                    "error": "",
                    "executed_at": "2025-11-28T12:00:00Z"
                }
            ]
        }
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/clusters/create-cluster/:
    post:
      operationId: v2_clusters_create_cluster_create
      description: Create a new cluster. Requires name, ras_server, and cluster_service_url.
      summary: Create a new cluster
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterCreateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/delete-cluster/:
    post:
      operationId: v2_clusters_delete_cluster_create
      description: Delete a cluster. Use force=true to delete cluster with existing
        databases.
      summary: Delete cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDeleteResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    delete:
      operationId: v2_clusters_delete_cluster_destroy
      description: Delete a cluster. Use force=true to delete cluster with existing
        databases.
      summary: Delete cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDeleteResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/discover-clusters/:
    post:
      operationId: v2_clusters_discover_clusters_create
      description: Trigger cluster discovery on a RAS server. Creates or updates Cluster
        records for all found clusters.
      summary: Discover clusters on RAS server
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DiscoverClustersRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DiscoverClustersResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/get-cluster/:
    get:
      operationId: v2_clusters_get_cluster_retrieve
      description: Get detailed information about a specific cluster including databases
        and statistics.
      summary: Get cluster details
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/get-cluster-databases/:
    get:
      operationId: v2_clusters_get_cluster_databases_retrieve
      description: Get all databases for a specific cluster with optional filtering
        by status.
      summary: Get cluster databases
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID
        required: true
      - in: query
        name: health_status
        schema:
          type: string
        description: Filter by health check status
      - in: query
        name: status
        schema:
          type: string
        description: Filter by database status
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDatabasesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/list-clusters/:
    get:
      operationId: v2_clusters_list_clusters_retrieve
      description: List all clusters with database counts. Supports filtering by status
        and RAS server.
      summary: List all clusters
      parameters:
      - in: query
        name: ras_server
        schema:
          type: string
        description: Filter by RAS server address
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (active, inactive, error, maintenance)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterListResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/clusters/reset-sync-status/:
    post:
      operationId: v2_clusters_reset_sync_status_create
      description: Reset sync status for stuck clusters (pending -> idle). Can reset
        specific cluster or all stuck clusters.
      summary: Reset sync status
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (optional, resets specific cluster)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResetSyncStatusResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/sync-cluster/:
    post:
      operationId: v2_clusters_sync_cluster_create
      description: Trigger synchronization of a cluster with RAS. The sync runs asynchronously
        via Celery if available.
      summary: Sync cluster with RAS
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterSyncResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/clusters/update-cluster/:
    post:
      operationId: v2_clusters_update_cluster_create
      description: Update cluster information. Supports partial updates.
      summary: Update cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
    put:
      operationId: v2_clusters_update_cluster_update
      description: Update cluster information. Supports partial updates.
      summary: Update cluster
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Cluster UUID (can also be in request body)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterUpdateResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '409':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/databases/bulk-health-check/:
    post:
      operationId: v2_databases_bulk_health_check_create
      description: Perform health check on multiple databases in parallel. Provide
        either database_ids or cluster_id. Max 50 databases per request.
      summary: Bulk health check databases
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BulkHealthCheckRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BulkHealthCheckRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BulkHealthCheckRequest'
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BulkHealthCheckResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/databases/get-database/:
    get:
      operationId: v2_databases_get_database_retrieve
      description: Get detailed information about a specific database including cluster
        info.
      summary: Get database details
      parameters:
      - in: query
        name: database_id
        schema:
          type: string
        description: Database UUID
        required: true
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseDetailResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/databases/health-check/:
    post:
      operationId: v2_databases_health_check_create
      description: Perform OData health check on a specific database. Checks connectivity
        and response time.
      summary: Health check database
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/HealthCheckRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/HealthCheckRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/HealthCheckRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthCheckResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/databases/list-databases/:
    get:
      operationId: v2_databases_list_databases_retrieve
      description: List all databases with optional filtering by cluster, status,
        health status, and search term. Supports pagination.
      summary: List all databases
      parameters:
      - in: query
        name: cluster_id
        schema:
          type: string
        description: Filter by cluster UUID
      - in: query
        name: health_status
        schema:
          type: string
        description: Filter by health status (ok, degraded, down, unknown)
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Maximum results (default: 100, max: 1000)'
      - in: query
        name: offset
        schema:
          type: integer
        description: 'Pagination offset (default: 0)'
      - in: query
        name: search
        schema:
          type: string
        description: Search by name or description
      - in: query
        name: status
        schema:
          type: string
        description: Filter by status (active, inactive, error, maintenance)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DatabaseListResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/dlq/get/:
    get:
      operationId: v2_dlq_get_retrieve
      description: Fetch a single DLQ entry by stream entry id or original_message_id.
        Staff-only.
      summary: Get DLQ message
      parameters:
      - in: query
        name: dlq_message_id
        schema:
          type: string
        description: Redis Stream entry ID
      - in: query
        name: original_message_id
        schema:
          type: string
        description: Original stream message ID
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DLQMessage'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/dlq/list/:
    get:
      operationId: v2_dlq_list_retrieve
      description: List recent DLQ entries from Redis Stream `commands:worker:dlq`.
        Staff-only.
      summary: List DLQ messages
      parameters:
      - in: query
        name: error_code
        schema:
          type: string
      - in: query
        name: limit
        schema:
          type: integer
        description: 1..200 (default 50)
      - in: query
        name: offset
        schema:
          type: integer
        description: Offset within the fetched window
      - in: query
        name: operation_id
        schema:
          type: string
      - in: query
        name: since
        schema:
          type: string
        description: RFC3339 timestamp filter
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DLQListResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/dlq/retry/:
    post:
      operationId: v2_dlq_retry_create
      description: Retry an operation associated with a DLQ entry by re-enqueueing
        it to worker stream. Staff-only.
      summary: Retry DLQ message
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DLQRetryRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DLQRetryRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/DLQRetryRequest'
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DLQRetryResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/events/pending/:
    get:
      operationId: v2_events_pending_retrieve
      description: |-
        GET /api/v2/events/pending/

        Returns count and list of pending events (for monitoring).
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: No response body
  /api/v2/events/store-failed/:
    post:
      operationId: v2_events_store_failed_create
      description: |-
        POST /api/v2/events/store-failed/

        Internal endpoint for Go services to store events that failed to publish to Redis.

        Request body:
        {
            "channel": "events:orchestrator:operation:completed",
            "event_type": "orchestrator.operation.completed",
            "correlation_id": "corr-456",
            "payload": {"operation_id": "op-123", "success": true},
            "source_service": "worker",
            "original_timestamp": "2025-11-28T12:00:00Z"
        }
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          description: No response body
  /api/v2/extensions/batch-install/:
    post:
      operationId: v2_extensions_batch_install_create
      description: Batch install extension to multiple databases. Skips databases
        that already have installation in progress.
      summary: Batch install extension
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BatchInstallRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/BatchInstallRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/BatchInstallRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BatchInstallResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/extensions/delete-extension/:
    delete:
      operationId: v2_extensions_delete_extension_destroy
