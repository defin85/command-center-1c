components:
  schemas:
    BatchInstallItem:
      type: object
      description: Single item in batch installation result.
      properties:
        database_id:
          type: string
          description: Database UUID
        installation_id:
          type: string
          description: Installation UUID (if queued)
        status:
          type: string
          description: 'Status: pending or skipped'
        reason:
          type: string
          description: Skip reason (if skipped)
        existing_installation_id:
          type: string
          description: Existing installation ID (if skipped)
      required:
      - database_id
      - status
    BatchInstallRequest:
      type: object
      description: Request body for batch_install endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to install extension to
        extension_name:
          type: string
          default: ODataAutoConfig
          description: 'Extension name (default: ODataAutoConfig)'
        extension_path:
          type: string
          description: Path to extension file (optional)
      required:
      - database_ids
    BatchInstallResponse:
      type: object
      description: Response for batch_install endpoint.
      properties:
        batch_id:
          type: string
          description: Batch operation UUID
        total:
          type: integer
          description: Total number of databases in request
        queued:
          type: integer
          description: Number of installations queued
        skipped:
          type: integer
          description: Number of databases skipped
        installations:
          type: array
          items:
            $ref: '#/components/schemas/BatchInstallItem'
      required:
      - batch_id
      - installations
      - queued
      - skipped
      - total
    BatchOperation:
      type: object
      description: Serializer for BatchOperation model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        operation_type:
          $ref: '#/components/schemas/OperationTypeEnum'
        target_entity:
          type: string
          description: 1C entity name (e.g., Справочник_Пользователи)
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/BatchOperationStatusEnum'
          readOnly: true
        progress:
          type: integer
          readOnly: true
          description: Progress percentage (0-100)
        total_tasks:
          type: integer
          readOnly: true
          description: Total number of tasks
        completed_tasks:
          type: integer
          readOnly: true
          description: Number of completed tasks
        failed_tasks:
          type: integer
          readOnly: true
          description: Number of failed tasks
        payload:
          type: object
          additionalProperties: {}
          description: Operation payload/parameters
        config:
          type: object
          additionalProperties: {}
          description: Execution configuration (timeout, retries, etc.)
        celery_task_id:
          type: string
          nullable: true
          maxLength: 255
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: string
          readOnly: true
        success_rate:
          type: string
          readOnly: true
        created_by:
          type: string
          description: User who created operation
          maxLength: 255
        metadata:
          type: object
          additionalProperties: {}
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        database_names:
          type: string
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - completed_tasks
      - created_at
      - database_names
      - duration_seconds
      - failed_tasks
      - id
      - name
      - operation_type
      - progress
      - status
      - success_rate
      - target_entity
      - tasks
      - total_tasks
      - updated_at
    BatchOperationStatusEnum:
      enum:
      - pending
      - queued
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `queued` - Queued
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    BulkHealthCheckRequest:
      type: object
      description: Request body for bulk_health_check endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to check
        cluster_id:
          type: string
          format: uuid
          description: Check all databases in this cluster
    BulkHealthCheckResponse:
      type: object
      description: Response for bulk_health_check endpoint.
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/HealthCheckResult'
        summary:
          $ref: '#/components/schemas/HealthCheckSummary'
      required:
      - results
      - summary
    CancelOperationRequest:
      type: object
      description: Request body for cancel_operation endpoint.
      properties:
        operation_id:
          type: string
          description: ID of the operation to cancel (UUID)
      required:
      - operation_id
    CloneWorkflowRequest:
      type: object
      description: Request for clone_workflow endpoint.
      properties:
        workflow_id:
          type: string
          format: uuid
        new_name:
          type: string
          maxLength: 200
      required:
      - workflow_id
    Cluster:
      type: object
      description: Serializer для Cluster model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Cluster UUID (auto-generated or from 1C)
        name:
          type: string
          description: Cluster name from 1C
          maxLength: 255
        description:
          type: string
          description: Optional description
        ras_server:
          type: string
          description: RAS server address (host:port)
          maxLength: 255
        cluster_service_url:
          type: string
          format: uri
          description: URL of installation-service managing this cluster
          maxLength: 512
        cluster_user:
          type: string
          description: Cluster admin username (if required)
          maxLength: 255
        cluster_pwd:
          type: string
          writeOnly: true
        status:
          $ref: '#/components/schemas/StatusD4eEnum'
        status_display:
          type: string
          readOnly: true
        last_sync:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last sync timestamp
        metadata:
          type: object
          additionalProperties: {}
          description: Additional cluster metadata
        databases_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cluster_service_url
      - created_at
      - databases_count
      - id
      - last_sync
      - name
      - status_display
      - updated_at
    ClusterCreateResponse:
      type: object
      description: Response for create_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        message:
          type: string
      required:
      - cluster
      - message
    ClusterDatabasesResponse:
      type: object
      description: Response for get_cluster_databases endpoint.
      properties:
