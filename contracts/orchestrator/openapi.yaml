  /api/v1/databases/{id}/cluster-info/:
    get:
      operationId: v1_databases_cluster_info_retrieve
      description: |-
        GET /api/v1/databases/{id}/cluster-info/

        Returns cluster_id and infobase_id для RAS workflow operations.
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: A unique value identifying this 1C Database.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Database'
          description: ''
  /api/v1/databases/{id}/credentials/:
    get:
      operationId: v1_databases_credentials_retrieve
      description: Возвращает OData URL и credentials для базы данных
      summary: Получить credentials для базы (для Go Worker)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: A unique value identifying this 1C Database.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  database_id:
                    type: string
                  odata_url:
                    type: string
                  username:
                    type: string
                  password:
                    type: string
          description: Credentials returned
        '404':
          description: Database not found
  /api/v1/databases/{id}/extension-installation-status/:
    patch:
      operationId: v1_databases_extension_installation_status_partial_update
      description: Endpoint для Go Worker чтобы обновлять статус установки расширения
      summary: Обновить статус установки расширения (для Go Worker)
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: A unique value identifying this 1C Database.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum:
                  - pending
                  - in_progress
                  - completed
                  - failed
                  description: Новый статус установки
                error_message:
                  type: string
                  description: Сообщение об ошибке (если status=failed)
                progress_percent:
                  type: integer
                  description: Процент выполнения (0-100)
              required:
              - status
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: Status updated successfully
        '404':
          description: No pending installation found
  /api/v1/databases/{id}/extension-status/:
    get:
      operationId: v1_databases_extension_status_retrieve
      description: Возвращает статус установки расширения для данной базы
      summary: Получить статус установки расширения
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: A unique value identifying this 1C Database.
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtensionInstallation'
          description: Extension status
        '404':
          description: Installation not found
  /api/v1/databases/{id}/health-check/:
    post:
      operationId: v1_databases_health_check_create
      description: Проверяет доступность и работоспособность базы 1С через OData
      summary: Health check для одной базы
      parameters:
      - in: path
        name: id
        schema:
          type: string
        description: A unique value identifying this 1C Database.
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Database'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Database'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Database'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
