        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchedCluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/PatchedCluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/PatchedCluster'
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cluster'
          description: ''
    delete:
      operationId: v1_clusters_destroy
      description: |-
        ViewSet для управления кластерами 1С.

        Endpoints:
        - GET /api/v1/clusters/ - список кластеров
        - POST /api/v1/clusters/ - создать кластер
        - GET /api/v1/clusters/{id}/ - получить кластер
        - PUT/PATCH /api/v1/clusters/{id}/ - обновить кластер
        - DELETE /api/v1/clusters/{id}/ - удалить кластер
        - POST /api/v1/clusters/{id}/sync/ - синхронизировать с RAS
        - GET /api/v1/clusters/{id}/databases/ - базы конкретного кластера
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Cluster UUID (auto-generated or from 1C)
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '204':
          description: No response body
  /api/v1/clusters/{id}/databases/:
    get:
      operationId: v1_clusters_databases_retrieve
      description: Возвращает список баз данных в конкретном кластере
      summary: Получить базы кластера
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Cluster UUID (auto-generated or from 1C)
        required: true
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDatabaseList'
          description: Список баз
  /api/v1/clusters/{id}/sync/:
    post:
      operationId: v1_clusters_sync_create
      description: Синхронизирует список баз данных из RAS через cluster-service
      summary: Синхронизация баз из RAS
      parameters:
      - in: path
        name: id
        schema:
          type: string
          format: uuid
          description: Cluster UUID (auto-generated or from 1C)
        required: true
      tags:
      - v1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Cluster'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/Cluster'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/Cluster'
        required: true
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                  message:
                    type: string
                  databases_found:
                    type: integer
          description: Синхронизация запущена
        '404':
          description: Кластер не найден
  /api/v1/databases/:
    get:
      operationId: v1_databases_list
      description: |-
        ViewSet для управления базами данных 1С.

        Endpoints:
        - GET /api/v1/databases/ - список баз
        - POST /api/v1/databases/ - создать базу
        - GET /api/v1/databases/{id}/ - получить базу
        - PUT/PATCH /api/v1/databases/{id}/ - обновить базу
        - DELETE /api/v1/databases/{id}/ - удалить базу
        - POST /api/v1/databases/{id}/health-check/ - проверить здоровье
        - POST /api/v1/databases/bulk-health-check/ - проверить все базы
        - POST /api/v1/databases/{id}/install-extension/ - установить расширение
      parameters:
      - in: query
        name: last_check_status
        schema:
          type: string
          enum:
          - degraded
          - down
          - ok
          - unknown
        description: |-
          * `ok` - OK
          * `degraded` - Degraded
          * `down` - Down
          * `unknown` - Unknown
      - name: page
        required: false
        in: query
        description: A page number within the paginated result set.
        schema:
          type: integer
      - in: query
        name: status
        schema:
          type: string
          enum:
          - active
          - error
          - inactive
          - maintenance
        description: |-
          * `active` - Active
          * `inactive` - Inactive
          * `error` - Error
          * `maintenance` - Maintenance
      tags:
      - v1
      security:
      - cookieAuth: []
      - {}
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedDatabaseList'
          description: ''
    post:
      operationId: v1_databases_create
      description: |-
        ViewSet для управления базами данных 1С.

        Endpoints:
        - GET /api/v1/databases/ - список баз
        - POST /api/v1/databases/ - создать базу
        - GET /api/v1/databases/{id}/ - получить базу
        - PUT/PATCH /api/v1/databases/{id}/ - обновить базу
        - DELETE /api/v1/databases/{id}/ - удалить базу
        - POST /api/v1/databases/{id}/health-check/ - проверить здоровье
        - POST /api/v1/databases/bulk-health-check/ - проверить все базы
        - POST /api/v1/databases/{id}/install-extension/ - установить расширение
