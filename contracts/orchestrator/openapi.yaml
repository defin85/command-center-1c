        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tenant context selector. If omitted, tenant is resolved via user preference or first membership. For staff users, omission may return cross-tenant results on some endpoints.
      tags:
        - v2
      security:
        - bearerAuth: []
      responses:
        '200':
          description: File download
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
  /api/v2/artifacts/{artifact_id}/versions/upload/:
    post:
