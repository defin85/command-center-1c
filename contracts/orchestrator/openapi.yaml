components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    CustomTokenObtainPair:
      type: object
      description: |-
        Custom TokenObtainPairSerializer that adds username and roles to JWT claims.

        Go API Gateway expects:
        - user_id: string (Django sends int, we convert)
        - username: string
        - roles: []string

        This ensures compatibility between Django-generated tokens and Go JWT validation.
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
      required:
        - password
        - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
      required:
        - access
        - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
        - token
    ArtifactPurgeBlocker:
      type: object
      properties:
        type:
          enum:
            - batch_operation
            - workflow_execution
          type: string
          description: |-
            * `batch_operation` - batch_operation
            * `workflow_execution` - workflow_execution
          x-spec-enum-id: a58e5a11bda4f638
        id:
          type: string
        status:
          type: string
        name:
          type: string
          default: ''
        details:
          type: string
          default: ''
      required:
        - id
        - status
        - type
    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
        is_versioned:
          type: boolean
        tags:
          type: array
          items:
            type: string
        is_deleted:
          type: boolean
        deleted_at:
          type: string
          format: date-time
          nullable: true
        purge_state:
          type: string
        purge_after:
          type: string
          format: date-time
          nullable: true
        purge_blocked_until:
          type: string
          format: date-time
          nullable: true
        purge_blockers:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactPurgeBlocker'
        created_at:
          type: string
          format: date-time
      required:
        - created_at
        - id
        - is_deleted
        - is_versioned
        - kind
        - name
        - purge_state
    ArtifactListResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        count:
          type: integer
      required:
        - artifacts
        - count
    ErrorDetail:
      type: object
      description: Error detail structure.
      properties:
        code:
          type: string
          description: Error code (e.g., MISSING_PARAMETER)
        message:
          type: string
          description: Human-readable error message
      required:
        - code
        - message
    ErrorResponse:
      type: object
      description: Standard error response.
      properties:
        success:
          type: boolean
          default: false
        error:
          $ref: '#/components/schemas/ErrorDetail'
      required:
        - error
    ArtifactAlias:
      type: object
      properties:
        id:
          type: string
          format: uuid
        alias:
          type: string
        version:
          type: string
        version_id:
          type: string
          format: uuid
        updated_at:
          type: string
          format: date-time
      required:
        - alias
        - id
        - updated_at
        - version
        - version_id
    ArtifactAliasListResponse:
      type: object
      properties:
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactAlias'
        count:
          type: integer
      required:
        - aliases
        - count
    ArtifactAliasUpsertRequest:
      type: object
      properties:
        alias:
          type: string
        version:
          type: string
        version_id:
          type: string
          format: uuid
      required:
        - alias
    ArtifactPurgeRequest:
      type: object
      properties:
        reason:
          type: string
          nullable: true
        dry_run:
          type: boolean
          default: false
