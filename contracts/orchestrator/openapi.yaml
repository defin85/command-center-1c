  /api/v2/clusters/get-cluster-databases/:
    get:
      operationId: v2_clusters_get_cluster_databases_retrieve
      description: Get all databases for a specific cluster with optional filtering by status.
      summary: Get cluster databases
      parameters:
        - in: query
          name: cluster_id
          schema:
            type: string
          description: Cluster UUID
          required: true
        - in: query
          name: health_status
          schema:
            type: string
          description: Filter by health check status
        - in: query
          name: status
          schema:
            type: string
          description: Filter by database status
        - name: X-CC1C-Tenant-ID
          in: header
          required: false
          schema:
            type: string
            format: uuid
          description: Optional tenant context selector. If omitted, tenant is resolved via user preference or first membership. For staff users, omission may return cross-tenant results on some endpoints.
      tags:
        - v2
      security:
        - bearerAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterDatabasesResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterErrorResponse'
          description: ''
  /api/v2/clusters/list-clusters/:
    get:
      operationId: v2_clusters_list_clusters_retrieve
      description: List all clusters with database counts. Supports filtering by status and RAS server.
      summary: List all clusters
      parameters:
        - in: query
          name: filters
          schema:
            type: string
          description: JSON object with filter conditions
        - in: query
          name: limit
          schema:
            type: integer
          description: 'Maximum results (default: 100, max: 1000)'
        - in: query
          name: offset
          schema:
            type: integer
          description: 'Pagination offset (default: 0)'
        - in: query
          name: ras_server
          schema:
            type: string
          description: Filter by RAS server address
        - in: query
          name: search
          schema:
            type: string
          description: Search by name or RAS server
        - in: query
