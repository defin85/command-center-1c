components:
  schemas:
    Artifact:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        kind:
          type: string
        is_versioned:
          type: boolean
        tags:
          type: array
          items:
            type: string
        created_at:
          type: string
          format: date-time
      required:
      - created_at
      - id
      - is_versioned
      - kind
      - name
    ArtifactAlias:
      type: object
      properties:
        id:
          type: string
          format: uuid
        alias:
          type: string
        version:
          type: string
        version_id:
          type: string
          format: uuid
        updated_at:
          type: string
          format: date-time
      required:
      - alias
      - id
      - updated_at
      - version
      - version_id
    ArtifactAliasListResponse:
      type: object
      properties:
        aliases:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactAlias'
        count:
          type: integer
      required:
      - aliases
      - count
    ArtifactAliasUpsertRequest:
      type: object
      properties:
        alias:
          type: string
        version:
          type: string
        version_id:
          type: string
          format: uuid
      required:
      - alias
    ArtifactCreateRequest:
      type: object
      properties:
        name:
          type: string
        kind:
          $ref: '#/components/schemas/ArtifactCreateRequestKindEnum'
        is_versioned:
          type: boolean
          default: true
        tags:
          type: array
          items:
            type: string
      required:
      - kind
      - name
    ArtifactCreateRequestKindEnum:
      enum:
      - extension
      - config_xml
      - dt_backup
      - epf
      - erf
      - ibcmd_package
      - ras_script
      - other
      type: string
      description: |-
        * `extension` - Extension
        * `config_xml` - Config XML
        * `dt_backup` - DT Backup
        * `epf` - EPF
        * `erf` - ERF
        * `ibcmd_package` - IBCMD Package
        * `ras_script` - RAS Script
        * `other` - Other
    ArtifactCreateResponse:
      type: object
      properties:
        artifact:
          $ref: '#/components/schemas/Artifact'
        message:
          type: string
      required:
      - artifact
      - message
    ArtifactListResponse:
      type: object
      properties:
        artifacts:
          type: array
          items:
            $ref: '#/components/schemas/Artifact'
        count:
          type: integer
      required:
      - artifacts
      - count
    ArtifactVersion:
      type: object
      properties:
        id:
          type: string
          format: uuid
        version:
          type: string
        filename:
          type: string
        storage_key:
          type: string
        size:
          type: integer
        checksum:
          type: string
        content_type:
          type: string
        metadata:
          type: object
          additionalProperties: {}
        created_at:
          type: string
          format: date-time
      required:
      - checksum
      - content_type
      - created_at
      - filename
      - id
      - metadata
      - size
      - storage_key
      - version
    ArtifactVersionListResponse:
      type: object
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/ArtifactVersion'
        count:
          type: integer
      required:
      - count
      - versions
    ArtifactVersionUploadRequest:
      type: object
      properties:
        file:
          type: string
          format: uri
        version:
          type: string
        filename:
          type: string
        metadata:
          type: string
      required:
      - file
    AuthTypeEnum:
      enum:
      - local
      - ad
      - service
      - other
      type: string
      description: |-
        * `local` - Local
        * `ad` - Active Directory
        * `service` - Service
        * `other` - Other
    BatchInstallItem:
      type: object
      description: Single item in batch installation result.
      properties:
        database_id:
          type: string
          description: Database UUID
        installation_id:
          type: string
          description: Installation UUID (if queued)
        status:
          type: string
          description: 'Status: pending or skipped'
        reason:
          type: string
          description: Skip reason (if skipped)
        existing_installation_id:
          type: string
          description: Existing installation ID (if skipped)
      required:
      - database_id
      - status
    BatchInstallRequest:
      type: object
      description: Request body for batch_install endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to install extension to
        extension_name:
          type: string
          default: ODataAutoConfig
          description: 'Extension name (default: ODataAutoConfig)'
        extension_path:
          type: string
          description: Path to extension file (optional)
      required:
      - database_ids
    BatchInstallResponse:
      type: object
      description: Response for batch_install endpoint.
      properties:
        batch_id:
          type: string
          description: Batch operation UUID
        total:
          type: integer
          description: Total number of databases in request
        queued:
          type: integer
          description: Number of installations queued
        skipped:
          type: integer
          description: Number of databases skipped
        installations:
          type: array
          items:
            $ref: '#/components/schemas/BatchInstallItem'
      required:
      - batch_id
      - installations
      - queued
      - skipped
      - total
    BatchOperation:
      type: object
      description: Serializer for BatchOperation model.
      properties:
        id:
          type: string
          readOnly: true
        name:
          type: string
          maxLength: 255
        description:
          type: string
        operation_type:
          $ref: '#/components/schemas/BatchOperationOperationTypeEnum'
        target_entity:
          type: string
          description: 1C entity name (e.g., Справочник_Пользователи)
          maxLength: 255
        status:
          allOf:
          - $ref: '#/components/schemas/BatchOperationStatusEnum'
          readOnly: true
        progress:
          type: integer
          readOnly: true
          description: Progress percentage (0-100)
        total_tasks:
          type: integer
          readOnly: true
          description: Total number of tasks
        completed_tasks:
          type: integer
          readOnly: true
          description: Number of completed tasks
        failed_tasks:
          type: integer
          readOnly: true
          description: Number of failed tasks
        payload:
          type: object
          additionalProperties: {}
          description: Operation payload/parameters
        config:
          type: object
          additionalProperties: {}
          description: Execution configuration (timeout, retries, etc.)
        task_id:
          type: string
          nullable: true
          maxLength: 255
        started_at:
          type: string
          format: date-time
          nullable: true
        completed_at:
          type: string
          format: date-time
          nullable: true
        duration_seconds:
          type: number
          format: double
          nullable: true
          description: Calculate operation duration in seconds.
          readOnly: true
        success_rate:
          type: number
          format: double
          nullable: true
          description: Calculate success rate percentage.
          readOnly: true
        created_by:
          type: string
          description: User who created operation
          maxLength: 255
        metadata:
          type: object
          additionalProperties: {}
          description: Additional metadata
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
        database_names:
          type: array
          items:
            type: string
          description: Get list of database names for this operation.
          readOnly: true
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/Task'
          readOnly: true
      required:
      - completed_tasks
      - created_at
      - database_names
      - duration_seconds
      - failed_tasks
      - id
      - name
      - operation_type
      - progress
      - status
      - success_rate
      - target_entity
      - tasks
      - total_tasks
      - updated_at
    BatchOperationOperationTypeEnum:
      enum:
      - create
      - update
      - delete
      - query
      - install_extension
      - lock_scheduled_jobs
      - unlock_scheduled_jobs
      - terminate_sessions
      - block_sessions
      - unblock_sessions
      - sync_cluster
      - discover_clusters
      - health_check
      - ibcmd_backup
      - ibcmd_restore
      - ibcmd_replicate
      - ibcmd_create
      - remove_extension
      - config_update
      - config_load
      - config_dump
      type: string
      description: |-
        * `create` - Create
        * `update` - Update
        * `delete` - Delete
        * `query` - Query
        * `install_extension` - Install Extension
        * `lock_scheduled_jobs` - Lock Scheduled Jobs
        * `unlock_scheduled_jobs` - Unlock Scheduled Jobs
        * `terminate_sessions` - Terminate Sessions
        * `block_sessions` - Block Sessions
        * `unblock_sessions` - Unblock Sessions
        * `sync_cluster` - Sync Cluster
        * `discover_clusters` - Discover Clusters
        * `health_check` - Health Check
        * `ibcmd_backup` - IBCMD Backup
        * `ibcmd_restore` - IBCMD Restore
        * `ibcmd_replicate` - IBCMD Replicate
        * `ibcmd_create` - IBCMD Create
        * `remove_extension` - Remove Extension
        * `config_update` - Update Configuration
        * `config_load` - Load Configuration
        * `config_dump` - Dump Configuration
    BatchOperationStatusEnum:
      enum:
      - pending
      - queued
      - processing
      - completed
      - failed
      - cancelled
      type: string
      description: |-
        * `pending` - Pending
        * `queued` - Queued
        * `processing` - Processing
        * `completed` - Completed
        * `failed` - Failed
        * `cancelled` - Cancelled
    BulkHealthCheckRequest:
      type: object
      description: Request body for bulk_health_check endpoint.
      properties:
        database_ids:
          type: array
          items:
            type: string
          description: List of database UUIDs to check
        cluster_id:
          type: string
          format: uuid
          description: Check all databases in this cluster
    CancelOperationRequest:
      type: object
      description: Request body for cancel_operation endpoint.
      properties:
        operation_id:
          type: string
          description: ID of the operation to cancel (UUID)
      required:
      - operation_id
    CloneWorkflowRequest:
      type: object
      description: Request for clone_workflow endpoint.
      properties:
        workflow_id:
          type: string
          format: uuid
        new_name:
          type: string
          maxLength: 200
      required:
      - workflow_id
    Cluster:
      type: object
      description: Serializer для Cluster model.
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
          description: Cluster UUID (auto-generated or from 1C)
        name:
          type: string
          description: Cluster name from 1C
          maxLength: 255
        description:
          type: string
          description: Optional description
        ras_server:
          type: string
          description: RAS server address (host:port)
          maxLength: 255
        cluster_service_url:
          type: string
          format: uri
          description: Legacy URL for cluster integrations (currently unused)
          maxLength: 512
        cluster_user:
          type: string
          description: Cluster admin username (if required)
          maxLength: 255
        cluster_pwd:
          type: string
          writeOnly: true
        cluster_pwd_configured:
          type: boolean
          readOnly: true
        status:
          $ref: '#/components/schemas/DatabaseStatusEnum'
        status_display:
          type: string
          readOnly: true
        last_sync:
          type: string
          format: date-time
          readOnly: true
          nullable: true
          description: Last sync timestamp
        metadata:
          type: object
          additionalProperties: {}
          description: Additional cluster metadata
        databases_count:
          type: integer
          readOnly: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
      - cluster_pwd_configured
      - cluster_service_url
      - created_at
      - databases_count
      - id
      - last_sync
      - name
      - status_display
      - updated_at
    ClusterCreateResponse:
      type: object
      description: Response for create_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        message:
          type: string
      required:
      - cluster
      - message
    ClusterCredentialsUpdateRequest:
      type: object
      description: Request body for update_cluster_credentials endpoint.
      properties:
        cluster_id:
          type: string
          format: uuid
        username:
          type: string
        password:
          type: string
          writeOnly: true
        reset:
          type: boolean
          default: false
      required:
      - cluster_id
    ClusterCredentialsUpdateResponse:
      type: object
      description: Response for update_cluster_credentials endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        message:
          type: string
      required:
      - cluster
      - message
    ClusterDatabasesResponse:
      type: object
      description: Response for get_cluster_databases endpoint.
      properties:
        cluster_id:
          type: string
          format: uuid
        cluster_name:
          type: string
        databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
        count:
          type: integer
        filters:
          $ref: '#/components/schemas/ClusterFilters'
      required:
      - cluster_id
      - cluster_name
      - count
      - databases
      - filters
    ClusterDeleteResponse:
      type: object
      description: Response for delete_cluster endpoint.
      properties:
        message:
          type: string
        cluster_id:
          type: string
          format: uuid
      required:
      - cluster_id
      - message
    ClusterDetailResponse:
      type: object
      description: Response for get_cluster endpoint.
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'
        databases:
          type: array
          items:
            $ref: '#/components/schemas/Database'
        statistics:
          $ref: '#/components/schemas/ClusterStatistics'
      required:
      - cluster
      - databases
      - statistics
    ClusterErrorDetail:
      type: object
      description: Error detail structure.
      properties:
        code:
          type: string
          description: Error code (e.g., MISSING_PARAMETER)
        message:
          type: string
          description: Human-readable error message
        details:
          type: object
          additionalProperties: {}
          description: Additional error details
      required:
      - code
      - message
    ClusterErrorResponse:
      type: object
      description: Standard error response.
      properties:
        success:
          type: boolean
          default: false
        error:
          $ref: '#/components/schemas/ClusterErrorDetail'
      required:
      - error
    ClusterFilters:
      type: object
      description: Applied filters.
      properties:
        status:
          type: string
        health_status:
          type: string
    ClusterListResponse:
      type: object
      description: Response for list_clusters endpoint.
      properties:
        clusters:
          type: array
          items:
