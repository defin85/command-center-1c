  /api/v2/operations/execute/:
    post:
      operationId: v2_operations_execute_create
      description: "\n    Queue an operation for execution on selected databases.\n\n
        \   **Supported operation types:**\n    - RAS: `lock_scheduled_jobs`, `unlock_scheduled_jobs`,
        `block_sessions`,\n      `unblock_sessions`, `terminate_sessions`\n    - OData:
        `create`, `update`, `delete`, `query`\n    - CLI: `designer_cli`\n    - IBCMD:
        legacy (DEPRECATED): `ibcmd_backup`, `ibcmd_restore`, `ibcmd_replicate`, `ibcmd_create`, `ibcmd_load_cfg`, `ibcmd_extension_update`\n\n
        Sunset for legacy IBCMD: 2026-04-01 (responses include `Deprecation`/`Sunset` headers).\n\n
        Prefer schema-driven endpoint: `POST /api/v2/operations/execute-ibcmd-cli/`.\n\n    **Config
        notes:**\n    - RAS block_sessions: `message`, `permission_code`, `denied_from`,
        `denied_to`, `parameter`\n    - OData query: `entity`, `filter`, `select`,
        `top`, `skip`\n    - OData update/delete: `entity`, `entity_id`\n    - CLI
        designer_cli: `command` + `args` + optional `options`\n    "
      summary: Execute RAS operation
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExecuteOperationRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteOperationResponse'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationErrorResponse'
          description: ''
        '401':
          description: Unauthorized
  /api/v2/operations/execute-ibcmd/:
    post:
      operationId: v2_operations_execute_ibcmd_create
      deprecated: true
      description: "\n    Queue an IBCMD operation for execution on selected databases.\n\n
        \   DEPRECATED: prefer schema-driven endpoint `POST /api/v2/operations/execute-ibcmd-cli/`.\n\n
        \   Sunset: 2026-04-01 (responses include `Deprecation`/`Sunset` headers).\n\n
        \   **Legacy operation types:**\n    - `ibcmd_backup` - Backup infobase\n
        \   - `ibcmd_restore` - Restore infobase from backup\n    - `ibcmd_replicate`
        - Replicate infobase to another server\n    - `ibcmd_create` - Create new
        infobase\n    - `ibcmd_load_cfg` - Load configuration (*.cf) or extension
        (*.cfe) into infobase\n    - `ibcmd_extension_update` - Update extension properties
        (safe-mode, scope, etc.)\n    "
      summary: Execute IBCMD operation (DEPRECATED)
      tags:
      - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ExecuteIbcmdOperationRequest'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ExecuteIbcmdOperationRequest'
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ExecuteIbcmdOperationRequest'
        required: true
      security:
      - bearerAuth: []
      - cookieAuth: []
      responses:
        '202':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExecuteOperationResponse'
          description: ''
          headers:
            Deprecation:
              schema:
                type: string
              description: Always "true" for this legacy endpoint.
            Sunset:
              schema:
                type: string
              description: 'HTTP-date: Wed, 01 Apr 2026 00:00:00 GMT.'
            X-CC1C-Legacy-Operation-Type:
              schema:
                type: string
              description: Legacy operation_type requested (e.g. ibcmd_backup).
            X-CC1C-Legacy-Endpoint:
              schema:
                type: string
              description: Endpoint name that returned this response.
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OperationErrorResponse'
          description: ''
          headers:
            Deprecation:
              schema:
                type: string
              description: Always "true" for this legacy endpoint.
            Sunset:
              schema:
                type: string
              description: 'HTTP-date: Wed, 01 Apr 2026 00:00:00 GMT.'
            X-CC1C-Legacy-Operation-Type:
              schema:
                type: string
              description: Legacy operation_type requested (e.g. ibcmd_backup).
            X-CC1C-Legacy-Endpoint:
              schema:
                type: string
              description: Endpoint name that returned this response.
        '401':
          description: Unauthorized
  /api/v2/operations/execute-ibcmd-cli/:
    post:
      operationId: v2_operations_execute_ibcmd_cli_create
      description: "\n    Queue schema-driven IBCMD command for execution.\n\n    Uses
        driver catalog v2 (base@approved + overrides@active) to validate `command_id`\n
        \   and build canonical `argv[]`.\n\n    Supports both scopes:\n    - per_database:
        executes per selected database\n    - global: executes once (requires `auth_database_id`
        for RBAC + IB user mapping)\n\n    Dangerous commands require `confirm_dangerous=true`.\n
        \   "
