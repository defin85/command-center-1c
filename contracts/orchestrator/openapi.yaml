        content:
          multipart/form-data:
            schema:
              $ref: '#/components/schemas/ArtifactVersionUploadRequest'
        required: true
      security:
        - bearerAuth: []
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ArtifactVersion'
          description: ''
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '500':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/artifacts/create/:
    post:
      operationId: v2_artifacts_create_create
      summary: Create artifact
      tags:
        - v2
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ArtifactCreateRequest'
          application/x-www-form-urlencoded:
            schema:
