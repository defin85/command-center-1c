  /api/v2/operations/stream/:
    get:
      operationId: v2_operations_stream_retrieve
      description: "\n    Real-time Server-Sent Events (SSE) stream for operation\
        \ progress updates.\n\n    **Authentication:** Use ticket from /stream-ticket/\
        \ endpoint (preferred) or\n    legacy token via query parameter.\n\n    **Event\
        \ format:**\n    ```\n    data: {\"state\": \"PROCESSING\", \"microservice\"\
        : \"worker\", \"message\": \"...\", \"timestamp\": \"...\"}\n    ```\n\n \
        \   **States flow:** PENDING -> QUEUED -> PROCESSING -> UPLOADING -> INSTALLING\
        \ -> VERIFYING -> SUCCESS/FAILED\n    "
      summary: Stream operation events (SSE)
      parameters:
      - in: query
        name: operation_id
        schema:
          type: string
        description: Operation ID (only needed with token auth, not with ticket)
      - in: query
        name: ticket
        schema:
          type: string
        description: Short-lived SSE ticket from /stream-ticket/ (preferred)
      - in: query
        name: token
        schema:
          type: string
        description: JWT access token (deprecated, use ticket instead)
      tags:
      - v2
      security:
      - bearerAuth: []
      - cookieAuth: []
      - {}
      responses:
        '200':
          description: SSE stream (text/event-stream)
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '401':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
          description: ''
  /api/v2/operations/stream-ticket/:
    post:
      operationId: v2_operations_stream_ticket_create
      description: "\n    Obtain a short-lived, single-use ticket for SSE stream authentication.\n\
        \n    The ticket is valid for 30 seconds and can only be used once.\n    This\
        \ allows secure SSE connections without exposing JWT tokens in URLs.\n    "
