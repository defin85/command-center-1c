# oapi-codegen v2 configuration for ras-adapter
# Generates Go server types and Gin handler interfaces from OpenAPI spec

package: generated
generate:
  gin-server: true
  embedded-spec: true
  models: true
  strict-server: false
output: ../../go-services/ras-adapter/internal/api/generated/server.go

# Compatibility options
compatibility:
  # Always prefix enum values (avoids naming conflicts)
  always-prefix-enum-values: true
