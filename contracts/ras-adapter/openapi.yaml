openapi: 3.0.3
info:
  title: RAS Adapter API
  description: |
    REST API для управления кластерами 1С через RAS (Remote Administration Server).

    ## API Versions

    ### v2 (Recommended)
    Action-based API с query параметрами. Все endpoints используют формат:
    - `GET /api/v2/<action>?param1=X&param2=Y`
    - `POST /api/v2/<action>?param1=X&param2=Y`

    v1 endpoints полностью удалены. Используйте v2.

    ## Операции

    - Управление кластерами
    - Управление информационными базами
    - Блокировка/разблокировка баз
    - Управление сессиями

    **КРИТИЧНО**: Используйте `cluster_id` (не `cluster`) для всех endpoints.
  version: 2.1.0
  contact:
    name: CommandCenter1C Team
    url: https://github.com/commandcenter1c/commandcenter

servers:
  - url: http://localhost:8188
    description: Local development server (port 8188 - outside Windows reserved range)
  - url: http://ras-adapter:8188
    description: Docker environment

tags:
  - name: health
    description: Health check endpoints
  - name: clusters-v2
    description: Cluster management (v2 API)
  - name: infobases-v2
    description: Infobase management (v2 API)
  - name: sessions-v2
    description: Session management (v2 API)

paths:
  # ============================================================================
  # HEALTH CHECK
  # ============================================================================
  /health:
    get:
      summary: Health check
      description: Returns service health status
      operationId: getHealth
      tags:
        - health
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  # ============================================================================
  # API V2 - CLUSTERS (Action-based)
  # ============================================================================
  /api/v2/list-clusters:
    get:
      summary: List clusters
      description: Returns list of all 1C clusters on specified RAS server
      operationId: listClustersV2
      tags:
        - clusters-v2
      parameters:
        - name: server
          in: query
          required: true
          description: RAS server address (e.g., localhost:1545)
          schema:
            type: string
            example: "localhost:1545"
      responses:
        '200':
          description: List of clusters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClustersResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/get-cluster:
    get:
      summary: Get cluster by ID
      description: Returns details of a specific cluster
      operationId: getClusterV2
      tags:
        - clusters-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: server
          in: query
          required: true
          description: RAS server address
          schema:
            type: string
            example: "localhost:1545"
      responses:
        '200':
          description: Cluster details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ClusterResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================================================
  # API V2 - INFOBASES (Action-based)
  # ============================================================================
  /api/v2/list-infobases:
    get:
      summary: List infobases
      description: Returns list of infobases for specified cluster
      operationId: listInfobasesV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of infobases
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfobasesResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/get-infobase:
    get:
      summary: Get infobase by ID
      description: Returns details of a specific infobase
      operationId: getInfobaseV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Infobase details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InfobaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/create-infobase:
    post:
      summary: Create infobase
      description: Creates a new infobase in specified cluster
      operationId: createInfobaseV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateInfobaseRequestV2'
      responses:
        '200':
          description: Infobase created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInfobaseResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/drop-infobase:
    post:
      summary: Drop infobase
      description: Removes infobase from cluster (optionally drops database)
      operationId: dropInfobaseV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DropInfobaseRequestV2'
      responses:
        '200':
          description: Infobase dropped successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/lock-infobase:
    post:
      summary: Lock infobase
      description: |
        Blocks scheduled jobs (регламентные задания) in the infobase.
        Does NOT block user sessions - use `/block-sessions` for that.
      operationId: lockInfobaseV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LockInfobaseRequestV2'
      responses:
        '200':
          description: Infobase locked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/unlock-infobase:
    post:
      summary: Unlock infobase
      description: Enables scheduled jobs (регламентные задания) in the infobase
      operationId: unlockInfobaseV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockInfobaseRequestV2'
      responses:
        '200':
          description: Infobase unlocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/block-sessions:
    post:
      summary: Block user sessions
      description: |
        Blocks new user connections to the infobase.
        Existing sessions continue working until manually terminated.
      operationId: blockSessionsV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/BlockSessionsRequestV2'
      responses:
        '200':
          description: Sessions blocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockSessionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/unblock-sessions:
    post:
      summary: Unblock user sessions
      description: Allows new user connections to the infobase
      operationId: unblockSessionsV2
      tags:
        - infobases-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnblockSessionsRequestV2'
      responses:
        '200':
          description: Sessions unblocked successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================================================
  # API V2 - SESSIONS (Action-based)
  # ============================================================================
  /api/v2/list-sessions:
    get:
      summary: List sessions
      description: Returns list of active user sessions for specified infobase
      operationId: listSessionsV2
      tags:
        - sessions-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/terminate-session:
    post:
      summary: Terminate single session
      description: |
        Terminates a specific user session by ID.
        **Idempotent**: Returns success even if session already terminated.
      operationId: terminateSessionV2
      tags:
        - sessions-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: session_id
          in: query
          required: true
          description: Session UUID to terminate
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Session terminated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminateSessionResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/v2/terminate-sessions:
    post:
      summary: Terminate multiple sessions
      description: |
        Terminates all sessions for specified infobase.
        If `session_ids` provided in body - terminates only those sessions (NOT YET IMPLEMENTED).
        If body is empty - terminates ALL sessions for the infobase.
      operationId: terminateSessionsV2
      tags:
        - sessions-v2
      parameters:
        - name: cluster_id
          in: query
          required: true
          description: Cluster UUID
          schema:
            type: string
            format: uuid
        - name: infobase_id
          in: query
          required: true
          description: Infobase UUID
          schema:
            type: string
            format: uuid
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TerminateSessionsRequestV2'
      responses:
        '200':
          description: Sessions terminated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TerminateSessionsResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '501':
          description: Selective termination not implemented (when session_ids provided)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'

  # ============================================================================
  # (v1 endpoints removed)
components:
  schemas:
    # ============================================================================
    # HEALTH
    # ============================================================================
    HealthResponse:
      type: object
      required:
        - status
        - service
      properties:
        status:
          type: string
          example: "healthy"
        service:
          type: string
          example: "ras-adapter"

    # ============================================================================
    # CLUSTER SCHEMAS
    # ============================================================================
    Cluster:
      type: object
      required:
        - uuid
        - name
        - host
        - port
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        host:
          type: string
        port:
          type: integer
          format: int32

    ClustersResponse:
      type: object
      required:
        - clusters
        - count
      properties:
        clusters:
          type: array
          items:
            $ref: '#/components/schemas/Cluster'
        count:
          type: integer

    ClusterResponse:
      type: object
      required:
        - cluster
      properties:
        cluster:
          $ref: '#/components/schemas/Cluster'

    # ============================================================================
    # INFOBASE SCHEMAS
    # ============================================================================
    Infobase:
      type: object
      required:
        - uuid
        - name
        - dbms
        - scheduled_jobs_deny
        - sessions_deny
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
        dbms:
          type: string
          example: "PostgreSQL"
        db_server:
          type: string
        db_name:
          type: string
        locale:
          type: string
        scheduled_jobs_deny:
          type: boolean
        sessions_deny:
          type: boolean
        denied_from:
          type: string
          format: date-time
        denied_to:
          type: string
          format: date-time
        denied_message:
          type: string
        permission_code:
          type: string
        denied_parameter:
          type: string

    InfobasesResponse:
      type: object
      required:
        - infobases
        - count
      properties:
        infobases:
          type: array
          items:
            $ref: '#/components/schemas/Infobase'
        count:
          type: integer

    InfobaseResponse:
      type: object
      required:
        - infobase
      properties:
        infobase:
          $ref: '#/components/schemas/Infobase'

    # V2 Request schemas (IDs in query params)
    CreateInfobaseRequestV2:
      type: object
      required:
        - name
        - dbms
        - db_name
      properties:
        name:
          type: string
          description: Infobase name
        dbms:
          type: string
          enum: [PostgreSQL, MSSQLServer, IBMDB2, OracleDatabase]
        db_server_name:
          type: string
          description: Database server address
        db_name:
          type: string
          description: Database name
        db_user:
          type: string
        db_password:
          type: string
        locale:
          type: string
          example: "ru_RU"

    DropInfobaseRequestV2:
      type: object
      properties:
        drop_database:
          type: boolean
          default: false

    LockInfobaseRequestV2:
      type: object
      properties:
        db_user:
          type: string
        db_password:
          type: string

    UnlockInfobaseRequestV2:
      type: object
      properties:
        db_user:
          type: string
        db_password:
          type: string

    BlockSessionsRequestV2:
      type: object
      properties:
        db_user:
          type: string
        db_password:
          type: string
        denied_from:
          type: string
          format: date-time
        denied_to:
          type: string
          format: date-time
        denied_message:
          type: string
        permission_code:
          type: string
        denied_parameter:
          type: string

    UnblockSessionsRequestV2:
      type: object
      properties:
        db_user:
          type: string
        db_password:
          type: string

    # V1 Request schemas (cluster_id in body)
    CreateInfobaseRequest:
      type: object
      required:
        - cluster_id
        - name
        - dbms
        - db_server
        - db_name
        - locale
      properties:
        cluster_id:
          type: string
          format: uuid
        name:
          type: string
        dbms:
          type: string
        db_server:
          type: string
        db_name:
          type: string
        db_user:
          type: string
        db_pwd:
          type: string
        locale:
          type: string

    DropInfobaseRequest:
      type: object
      required:
        - cluster_id
      properties:
        cluster_id:
          type: string
          format: uuid
        drop_database:
          type: boolean
          default: false

    LockInfobaseRequest:
      type: object
      required:
        - cluster_id
      properties:
        cluster_id:
          type: string
          format: uuid
        db_user:
          type: string
        db_pwd:
          type: string

    UnlockInfobaseRequest:
      type: object
      required:
        - cluster_id
      properties:
        cluster_id:
          type: string
          format: uuid
        db_user:
          type: string
        db_pwd:
          type: string

    BlockSessionsRequest:
      type: object
      required:
        - cluster_id
      properties:
        cluster_id:
          type: string
          format: uuid
        db_user:
          type: string
        db_pwd:
          type: string
        denied_from:
          type: string
          format: date-time
        denied_to:
          type: string
          format: date-time
        denied_message:
          type: string
        permission_code:
          type: string
        denied_parameter:
          type: string

    UnblockSessionsRequest:
      type: object
      required:
        - cluster_id
      properties:
        cluster_id:
          type: string
          format: uuid
        db_user:
          type: string
        db_pwd:
          type: string

    # ============================================================================
    # SESSION SCHEMAS
    # ============================================================================
    Session:
      type: object
      required:
        - uuid
        - user_name
        - application
      properties:
        uuid:
          type: string
          format: uuid
        session_id:
          type: string
          description: Legacy alias for UUID
        user_name:
          type: string
        application:
          type: string
        started_at:
          type: string

    SessionsResponse:
      type: object
      required:
        - sessions
        - count
      properties:
        sessions:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        count:
          type: integer

    TerminateSessionResponse:
      type: object
      required:
        - success
        - message
        - session_id
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Session terminated successfully"
        session_id:
          type: string
          format: uuid

    TerminateSessionsRequestV2:
      type: object
      properties:
        session_ids:
          type: array
          items:
            type: string
            format: uuid
          description: Optional list of specific session IDs (NOT YET IMPLEMENTED)

    TerminateSessionsRequest:
      type: object
      required:
        - cluster_id
        - infobase_id
      properties:
        cluster_id:
          type: string
          format: uuid
        infobase_id:
          type: string
          format: uuid
        session_ids:
          type: array
          items:
            type: string
          description: Currently ignored - terminates ALL sessions

    TerminateSessionsResponse:
      type: object
      required:
        - terminated_count
      properties:
        terminated_count:
          type: integer
        failed_count:
          type: integer
        failed_sessions:
          type: array
          items:
            type: string

    # ============================================================================
    # COMMON SCHEMAS
    # ============================================================================
    CreateInfobaseResponse:
      type: object
      required:
        - success
        - infobase_id
        - message
      properties:
        success:
          type: boolean
        infobase_id:
          type: string
          format: uuid
        message:
          type: string

    BlockSessionsResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
        message:
          type: string
        blocked_from:
          type: string
          format: date-time
        blocked_to:
          type: string
          format: date-time

    SuccessResponse:
      type: object
      required:
        - success
        - message
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: "Operation completed successfully"

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
        code:
          type: string
        details:
          type: string

  responses:
    BadRequest:
      description: Bad request - invalid parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

    InternalServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
