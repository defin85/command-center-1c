##############################################################################
# Monitoring & Observability Services for Local Development
##############################################################################
# Этот файл добавляет Prometheus, Grafana и Jaeger к локальной разработке
# Использование: docker-compose -f docker-compose.local.yml -f docker-compose.local.monitoring.yml up -d
##############################################################################

services:
  ##############################################################################
  # Prometheus - Metrics Collection
  ##############################################################################
  prometheus:
    image: prom/prometheus:latest
    container_name: cc1c-prometheus-local
    restart: unless-stopped
    extra_hosts:
      # WSL2: хост доступен через gateway IP
      - "host.docker.internal:172.20.16.1"
    ports:
      - "9090:9090"
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./infrastructure/monitoring/prometheus/recording_rules.yml:/etc/prometheus/recording_rules.yml
      - ./infrastructure/monitoring/prometheus/alerts:/etc/prometheus/alerts
      - prometheus_data_local:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - cc1c-local

  ##############################################################################
  # Grafana - Dashboards & Visualization
  ##############################################################################
  grafana:
    image: grafana/grafana:latest
    container_name: cc1c-grafana-local
    restart: unless-stopped
    ports:
      - "5000:3000"
    volumes:
      - grafana_data_local:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards
      - ./infrastructure/monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources
      - ./infrastructure/monitoring/grafana/dashboards:/var/lib/grafana/dashboards
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
    depends_on:
      - prometheus
    networks:
      - cc1c-local

  ##############################################################################
  # Jaeger - Distributed Tracing (OpenTelemetry)
  ##############################################################################
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: cc1c-jaeger-local
    restart: unless-stopped
    environment:
      - COLLECTOR_OTLP_ENABLED=true
      - LOG_LEVEL=info
      - SPAN_STORAGE_TYPE=memory
    ports:
      - "16686:16686"   # Jaeger UI
      - "14317:4317"    # OTLP gRPC receiver (remapped from 4317 - often conflicts in WSL2)
      - "14318:4318"    # OTLP HTTP receiver (remapped from 4318)
      - "6831:6831/udp" # Jaeger Thrift compact (legacy)
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:16686/"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cc1c-local

##############################################################################
# Networks (should match docker-compose.local.yml)
##############################################################################
networks:
  cc1c-local:
    external: true
    name: cc1c-local-network

##############################################################################
# Volumes
##############################################################################
volumes:
  prometheus_data_local:
    name: cc1c-prometheus-local-data
  grafana_data_local:
    name: cc1c-grafana-local-data
