# Installation Service Configuration Example
# Copy this file to config.yaml and adjust values for your environment

redis:
  host: "localhost"                      # Redis server host
  port: 6379                              # Redis server port
  password: ""                            # Redis password (leave empty if not required)
  queue: "installation_tasks"             # Queue name for installation tasks
  progress_channel: "installation_progress" # Pub/Sub channel for progress updates
  db: 0                                   # Redis database number
  max_retries: 3                          # Max retry attempts for Redis operations
  retry_delay_seconds: 5                  # Delay between retry attempts

onec:
  # Path to 1C platform executable
  # Windows example: "C:\\Program Files\\1cv8\\8.3.23.1912\\bin\\1cv8.exe"
  platform_path: "C:\\Program Files\\1cv8\\8.3.23.1912\\bin\\1cv8.exe"
  timeout_seconds: 300                    # Timeout for 1cv8.exe operations (5 minutes)
  server_name: "server1c"                 # 1C Server name for connection strings
  kill_timeout_seconds: 30                # Timeout for killing hung processes

executor:
  max_parallel: 10                        # Number of parallel worker goroutines
  retry_attempts: 3                       # Max retry attempts for failed tasks
  retry_delay_seconds: 30                 # Initial delay between retry attempts
  retry_backoff_multiplier: 2             # Backoff multiplier (30s, 60s, 120s)
  task_timeout_seconds: 600               # Overall task timeout (10 minutes)

orchestrator:
  api_url: "http://localhost:8000"        # Django Orchestrator API URL
  api_token: "your-token-here"            # API token for authentication
  timeout_seconds: 30                     # HTTP request timeout

server:
  health_check_port: 5555                 # Port for health check HTTP server
  shutdown_timeout_seconds: 300           # Graceful shutdown timeout (5 minutes)

logging:
  level: "info"                           # Log level: debug, info, warn, error
  file: "installation-service.log"        # Log file path (empty for console only)
  max_size_mb: 100                        # Max log file size before rotation
  max_backups: 5                          # Number of old log files to keep
  max_age_days: 30                        # Max age of log files in days
  compress: true                          # Compress rotated log files

# Environment variable overrides:
# - REDIS_HOST
# - REDIS_PORT
# - REDIS_PASSWORD
# - INSTALLATION_SERVICE_TOKEN (overrides orchestrator.api_token)
# - ORCHESTRATOR_API_URL (overrides orchestrator.api_url)
# - CONFIG_PATH (path to config file, default: config.yaml)
