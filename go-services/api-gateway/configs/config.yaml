# API Gateway Configuration
# Most settings are loaded from environment variables
# This file is for static configuration that rarely changes

server:
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

cors:
  allowed_origins:
    - "http://localhost:15173"
    - "http://127.0.0.1:15173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Requested-With

# Gateway request-budget isolation is configured via shared env/runtime config
# (`go-services/shared/config` and checked-in `.env*.example` files).
# Keep this file free from unused rate-limit knobs so checked-in config does not
# drift away from runtime behavior.
