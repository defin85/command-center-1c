# API Gateway Configuration
# Most settings are loaded from environment variables
# This file is for static configuration that rarely changes

server:
  read_timeout: 30s
  write_timeout: 30s
  idle_timeout: 120s

cors:
  allowed_origins:
    - "http://localhost:5173"
  allowed_methods:
    - GET
    - POST
    - PUT
    - DELETE
    - PATCH
    - OPTIONS
  allowed_headers:
    - Authorization
    - Content-Type
    - X-Requested-With

rate_limiting:
  default:
    requests_per_minute: 100
  operations:
    requests_per_minute: 50
